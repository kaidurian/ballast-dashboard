<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ballast Publisher</title>
<style>
    :root {
        --bg-dark: #0f141c;
        --panel-bg: #161d26;
        --panel-border: #242f41;
        --text-main: #e2e8f0;
        --text-muted: #94a3b8;
        --accent-blue: #38bdf8;
        --accent-green: #10b981;
        --input-bg: rgba(15,20,28,0.9);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Calibri','Segoe UI',sans-serif; }
    body {
        background: var(--bg-dark);
        color: var(--text-main);
        padding: 16px;
        max-width: 480px;
        margin: 0 auto;
    }
    h1 {
        font-size: 18px;
        margin-bottom: 4px;
    }
    .subtitle {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 16px;
    }
    .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 14px;
    }
    .panel-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 10px;
        border-left: 3px solid var(--accent-blue);
        padding-left: 8px;
    }
    .field-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
    }
    .field-row label {
        font-size: 13px;
        color: var(--text-main);
        flex: 1;
    }
    .field-row input {
        width: 100px;
        background: var(--input-bg);
        border: 1px solid var(--panel-border);
        color: var(--text-main);
        text-align: center;
        font-size: 14px;
        padding: 6px 4px;
        border-radius: 6px;
    }
    .field-row input:focus {
        outline: none;
        border-color: var(--accent-blue);
    }
    .tank-grid-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 14px;
    }
    .tank-field {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-bottom: 6px;
    }
    .tank-field label {
        font-size: 11px;
        color: var(--text-muted);
    }
    .tank-field input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--panel-border);
        color: var(--text-main);
        text-align: center;
        font-size: 13px;
        padding: 6px 2px;
        border-radius: 6px;
    }
    .publish-btn {
        width: 100%;
        background: var(--accent-green);
        color: #0b1f17;
        font-weight: bold;
        font-size: 15px;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 6px;
    }
    .publish-btn:active {
        opacity: 0.85;
    }
    .status-msg {
        text-align: center;
        font-size: 13px;
        margin-top: 10px;
        min-height: 18px;
    }
    .status-ok { color: var(--accent-green); }
    .status-err { color: #ef4444; }
    .status-sending { color: #eab308; }
</style>
</head>
<body>
    <h1>⚓ Ballast Publisher</h1>
    <div class="subtitle">Type new values, then tap Publish. Updates the public dashboard for everyone.</div>

    <div class="panel">
        <div class="panel-title">Barge attitude</div>
        <div class="field-row">
            <label for="in_trim">Trim (degrees)</label>
            <input type="number" step="any" id="in_trim" value="0">
        </div>
        <div class="field-row">
            <label for="in_heel">Heel (degrees)</label>
            <input type="number" step="any" id="in_heel" value="0">
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Tank weights (tonnes)</div>
        <div class="tank-grid-2col" id="tankFields"></div>
    </div>

    <button class="publish-btn" onclick="publishData()">↑ Publish to Dashboard</button>
    <div class="status-msg" id="statusMsg"></div>

    <script>
        // Must match the same tank list used in the dashboard
        const TANK_CONFIG = [
            { id: 14, name: "AFT P" }, { id: 15, name: "AFT C" }, { id: 16, name: "AFT S" },
            { id: 17, name: "C8 P" }, { id: 18, name: "C8 C" }, { id: 19, name: "C8 S" },
            { id: 20, name: "C7 P" }, { id: 21, name: "C7 C" }, { id: 22, name: "C7 S" },
            { id: 23, name: "C6 P" }, { id: 24, name: "C6 C" }, { id: 25, name: "C6 S" },
            { id: 26, name: "C5 P" }, { id: 27, name: "C5 C" }, { id: 28, name: "C5 S" },
            { id: 29, name: "C4 P" }, { id: 30, name: "C4 C" }, { id: 31, name: "C4 S" },
            { id: 32, name: "C3 P" }, { id: 33, name: "C3 C" }, { id: 34, name: "C3 S" },
            { id: 35, name: "C2 P" }, { id: 36, name: "C2 C" }, { id: 37, name: "C2 S" },
            { id: 38, name: "FWD P" }, { id: 39, name: "FWD C" }, { id: 40, name: "FWD S" },
        ];

        // ====== YOUR FIREBASE DATABASE ======
        const FIREBASE_URL = "https://ballast-dashboard-default-rtdb.firebaseio.com";
        // =====================================

        function buildFields() {
            const container = document.getElementById('tankFields');
            TANK_CONFIG.forEach(t => {
                const wrap = document.createElement('div');
                wrap.className = 'tank-field';
                wrap.innerHTML = `
                    <label for="in_tank_${t.id}">${t.name} (row ${t.id})</label>
                    <input type="number" step="any" id="in_tank_${t.id}" value="0">
                `;
                container.appendChild(wrap);
            });
        }

        async function loadCurrentValues() {
            try {
                const res = await fetch(`${FIREBASE_URL}/ballast.json`);
                const data = await res.json();
                if (!data) return;
                if (data.trim !== undefined) document.getElementById('in_trim').value = data.trim;
                if (data.heel !== undefined) document.getElementById('in_heel').value = data.heel;
                if (data.tanks) {
                    TANK_CONFIG.forEach(t => {
                        const el = document.getElementById(`in_tank_${t.id}`);
                        if (el && data.tanks[t.id] !== undefined) el.value = data.tanks[t.id];
                    });
                }
            } catch (e) {
                console.warn("Could not load current values", e);
            }
        }

        async function publishData() {
            const statusEl = document.getElementById('statusMsg');
            statusEl.textContent = "Publishing...";
            statusEl.className = "status-msg status-sending";

            const tanks = {};
            TANK_CONFIG.forEach(t => {
                const el = document.getElementById(`in_tank_${t.id}`);
                tanks[t.id] = parseFloat(el.value) || 0;
            });

            const payload = {
                trim: parseFloat(document.getElementById('in_trim').value) || 0,
                heel: parseFloat(document.getElementById('in_heel').value) || 0,
                tanks: tanks,
                updatedAt: new Date().toISOString(),
                source: "mobile-publisher"
            };

            try {
                const res = await fetch(`${FIREBASE_URL}/ballast.json`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Request failed: " + res.status);
                statusEl.textContent = "✓ Published — dashboard updated";
                statusEl.className = "status-msg status-ok";
            } catch (e) {
                statusEl.textContent = "✗ Failed to publish — check connection";
                statusEl.className = "status-msg status-err";
                console.error(e);
            }
        }

        buildFields();
        loadCurrentValues();
    </script>
</body>
</html>
