<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barge Ballast – Compact Header</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161d26;
            --panel-border: #242f41;
            --tank-box-bg: #1c2532;
            --input-bg: rgba(15,20,28,0.9);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --tank-water: rgba(56,189,248,0.25);
            --tank-water-solid: #38bdf8;
            --quay-bg: #2d3748;
            --quay-border: #4a5568;
            --quay-text: #cbd5e1;
            --tank-gap: 15px;
            --badge-bg: rgba(0,0,0,0.35);
            --badge-text: var(--accent-blue);
        }

        body.light-theme {
            --bg-dark: #f1f5f9;
            --panel-bg: #ffffff;
            --panel-border: #cbd5e1;
            --tank-box-bg: #f8fafc;
            --input-bg: rgba(255,255,255,0.95);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --accent-green: #16a34a;
            --tank-water: rgba(2,132,199,0.15);
            --tank-water-solid: #0284c7;
            --quay-bg: #e2e8f0;
            --quay-border: #cbd5e1;
            --quay-text: #475569;
            --badge-bg: #e2e8f0;
            --badge-text: #0c4a6e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Calibri','Segoe UI',sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 100vh;
            font-size: 13px;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--panel-border);
            flex-wrap: wrap;
            gap: 8px 16px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

            header h1 {
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.3px;
                color: var(--text-main);
                white-space: nowrap;
            }

        .header-subtitle {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
            white-space: nowrap;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .theme-toggle-container, .toggle-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #242f41;
            transition: .3s;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 10px;
                width: 10px;
                left: 3px;
                bottom: 3px;
                background-color: #38bdf8;
                transition: .3s;
                border-radius: 50%;
            }

        input:checked + .slider {
            background-color: #cbd5e1;
        }

            input:checked + .slider:before {
                transform: translateX(16px);
                background-color: #0284c7;
            }

        .sync-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--accent-blue);
            padding: 2px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

            .sync-btn:hover {
                background: rgba(56,189,248,0.1);
            }

        #connectionStatus {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .grid-attitude-mini {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .grid-attitude-block {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.15);
            padding: 3px 6px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
        }

        .grid-side-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .grid-side-label-active {
            color: #fff7ed;
            background: #f97316;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 800;
        }

        .attitude-canvas-mini {
            background: #0b0f19;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
            width: 100px;
            height: 38px;
            display: block;
        }

        .tank-grid-wrap {
            position: relative;
            min-width: 800px;
            padding: 10px 0;
        }

        .tank-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-x: auto;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-left: 3px solid var(--accent-blue);
            padding-left: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tank-grid {
            position: relative;
            min-width: 800px;
            min-height: 280px;
            padding-right: 5px;
        }

        .tank-control-box {
            position: absolute;
            background: var(--tank-box-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2px 3px;
            overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

            .tank-control-box:hover {
                z-index: 10;
                box-shadow: 0 0 20px rgba(56,189,248,0.2);
            }

        .tank-water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--tank-water);
            border-top: 2px solid var(--tank-water-solid);
            z-index: 1;
            transition: height 0.3s ease-out;
        }

        .tank-water-high {
            background: rgba(249,115,22,0.32) !important;
            border-top: 2px solid #f97316 !important;
        }

        .tank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
            gap: 1px;
            min-width: 0;
        }

        .tank-name {
            font-size: 9px;
            font-weight: bold;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tank-coords-badge {
            font-size: 7px;
            background: var(--badge-bg);
            padding: 1px 3px;
            border-radius: 3px;
            color: var(--badge-text);
            font-family: monospace;
            white-space: nowrap;
        }

        .tank-inputs {
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .weight-input {
            width: 100%;
            min-width: 0;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            text-align: center;
            font-size: 9px;
            padding: 1px 0;
            border-radius: 3px;
        }

        .weight-input-over {
            border-color: #ef4444 !important;
            background: rgba(239,68,68,0.12) !important;
            box-shadow: 0 0 0 1px rgba(239,68,68,0.5);
        }

        .weight-input-disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--panel-border) !important;
        }

        .load-percentage-label {
            font-size: 8px;
            text-align: center;
            color: var(--accent-blue);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tank-warning {
            font-size: 7px;
            font-weight: 700;
            color: #ef4444;
            text-align: center;
            line-height: 1.2;
        }

        .quay-structure-box {
            position: absolute;
            background: var(--quay-bg);
            border: 2px dashed var(--quay-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .quay-title {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--quay-text);
            transform: rotate(270deg);
        }

        .barge-corner-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--badge-text);
            background: var(--badge-bg);
            padding: 1px 5px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 15;
            pointer-events: none;
        }

        .barge-end-label {
            position: absolute;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            white-space: nowrap;
            z-index: 15;
            pointer-events: none;
        }

        .barge-end-label-active {
            color: #fff7ed;
            background: #f97316;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 800;
        }

        .pump-marker {
            position: absolute;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            gap: 2px;
            z-index: 16;
            pointer-events: none;
        }

        .pump-marker-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #a855f7;
            border: 1px solid #f5f3ff;
            box-shadow: 0 0 4px rgba(168,85,247,0.8);
        }

        .pump-marker-label {
            font-size: 7px;
            font-weight: 700;
            color: #f5f3ff;
            background: #7e22ce;
            padding: 0 3px;
            border-radius: 2px;
            white-space: nowrap;
        }

        .axle-overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 20;
        }

        .toggle-container input {
            accent-color: var(--accent-blue);
            width: 14px;
            height: 14px;
            cursor: pointer;
            margin-right: 2px;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 3px;
        }

        @media (max-width: 700px) {
            header {
                gap: 4px 8px;
            }

                header h1 {
                    font-size: 11px;
                }

            .header-subtitle {
                font-size: 8px;
            }

            .header-controls {
                gap: 4px;
            }

            .theme-toggle-container, .toggle-container {
                font-size: 8px;
                gap: 3px;
            }

            .switch {
                width: 28px;
                height: 16px;
            }

            .slider:before {
                height: 8px;
                width: 8px;
                left: 2px;
                bottom: 2px;
            }

            input:checked + .slider:before {
                transform: translateX(12px);
            }

            .sync-btn {
                font-size: 9px;
                padding: 1px 6px;
            }

            .attitude-canvas-mini {
                width: 80px;
                height: 30px;
            }

            .tank-grid {
                min-width: 600px;
                min-height: 220px;
            }

            .tank-name {
                font-size: 7px;
            }

            .weight-input {
                font-size: 7px;
            }

            .load-percentage-label {
                font-size: 6px;
            }

            .tank-coords-badge {
                font-size: 6px;
            }

            .barge-corner-label {
                font-size: 8px;
            }

            .barge-end-label {
                font-size: 8px;
            }

            .pump-marker-label {
                font-size: 6px;
            }

            .quay-title {
                font-size: 8px;
            }
        }

        @media (max-width: 500px) {
            header h1 {
                font-size: 10px;
            }

            .header-subtitle {
                display: none;
            }

            .theme-toggle-container, .toggle-container {
                font-size: 7px;
            }

            .switch {
                width: 24px;
                height: 14px;
            }

            .slider:before {
                height: 6px;
                width: 6px;
                left: 2px;
                bottom: 2px;
            }

            input:checked + .slider:before {
                transform: translateX(10px);
            }

            .sync-btn {
                font-size: 8px;
                padding: 1px 4px;
            }

            .attitude-canvas-mini {
                width: 60px;
                height: 24px;
            }

            .tank-grid {
                min-width: 480px;
                min-height: 180px;
            }
        }
    </style>
</head>
<body class="light-theme">
    <header>
        <div>
            <h1>⚓ Barge Ballast</h1>
            <div class="header-subtitle" id="bargeInfoNote">CREST_301 · 113.0m (9) × 29.0m (3)</div>
        </div>
        <div class="header-controls">
            <div class="theme-toggle-container">
                <span>Day</span>
                <label class="switch"><input type="checkbox" id="themeToggleCheckbox" checked onchange="toggleDashboardTheme()"><span class="slider"></span></label>
            </div>
            <div class="toggle-container">
                <span>🚛 Trailer</span>
                <input type="checkbox" id="trailerToggleCheckbox" checked onchange="toggleTrailerOverlay()">
            </div>
            <div class="toggle-container">
                <span>📐 Dims</span>
                <input type="checkbox" id="dimensionToggleCheckbox" onchange="toggleDimensionLabels()">
            </div>
            <div class="toggle-container">
                <span>⚡ Pump</span>
                <input type="checkbox" id="pumpInputToggleCheckbox" onchange="togglePumpOnlyInput()">
            </div>
            <div id="connectionStatus" style="font-size:9px; color:var(--text-muted);">Status: <span style="color:#ef4444;">● Offline</span></div>
            <button class="sync-btn" onclick="pullExcelTankData()">↻ Sync</button>
        </div>
    </header>
    <div class="main-layout">
        <div class="tank-grid-container">
            <div class="section-title" style="justify-content:center; border-left:none; padding-left:0;">
                <div class="grid-attitude-mini">
                    <div class="grid-attitude-block">
                        <span class="grid-side-label" id="lbl_GridAFT">AFT</span>
                        <canvas id="trimCanvas" class="attitude-canvas-mini" width="120" height="50"></canvas>
                        <span class="grid-side-label" id="lbl_GridFWD">FWD</span>
                    </div>
                    <div class="grid-attitude-block">
                        <span class="grid-side-label" id="lbl_GridPS">PS</span>
                        <canvas id="heelCanvas" class="attitude-canvas-mini" width="120" height="50"></canvas>
                        <span class="grid-side-label" id="lbl_GridSB">SB</span>
                    </div>
                </div>
            </div>
            <div class="tank-grid-wrap" id="tankGridWrap">
                <div class="tank-grid" id="tankContainer"></div>
                <canvas id="axleOverlayCanvas" class="axle-overlay-canvas"></canvas>
            </div>
        </div>
    </div>
    <script>
    // ---------- CONFIG ----------
    const CREST_SHEET_NAME = "CREST_301";
    const CREST_START_ROW = 30;
    const CREST_MAX_ROWS = 200;
    const EXCEL_START_ROW = 14;
    const AXLE_START_ROW = 124;
    const AXLE_MAX_ROWS = 60;
    const PUMP_SHEET_NAME = "BALLASTPLAN(mT)";
    const PUMP_START_ROW = 33;
    const PUMP_MAX_ROWS = 200;
    const PLAN_PX_PER_METER = 9;
    const PLAN_MARGIN_PX = 8;
    const QUAY_X_START = -11.2;
    const QUAY_X_END = -1.2;
    const AXLE_WIDTH_X = 0.86;
    const AXLE_HEIGHT_Y = 0.945;

    // ---------- STATE ----------
    let TANK_CONFIG = [];
    let tankData = [];
    let BARGE_X_MIN = 0, BARGE_X_MAX = 113, BARGE_Y_MIN = -14.5, BARGE_Y_MAX = 14.5;
    let BARGE_NAME = CREST_SHEET_NAME;
    let currentTrimDegrees = 0.0, currentHeelDegrees = 0.0;
    let trailerAxles = [];
    let pumpLocations = [];
    let bargeCornerLabels = ['', '', '', '', '', ''];
    let tanksWithPump = new Set();
    let showTrailer = true, showDimensions = false, pumpOnlyInput = false;
    let isOfficeInitialized = false;

    // ---------- HELPERS ----------
    function getTankGeometry(tankId) {
        const cfg = TANK_CONFIG.find(t => t.id === tankId);
        if (!cfg) return null;
        return { x: cfg.x, y: cfg.y, width: cfg.width, height: cfg.height, capacity: cfg.capacity };
    }
    function normalizeTankName(name) {
        return String(name || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    function shortenTankName(name) {
        if (!name) return name;
        const m = String(name).match(/^WB-?(\d+)-(?:PS|SB|C)\.([A-Z])$/i);
        if (!m) return name;
        return `${parseInt(m[1],10)}${m[2].toUpperCase()}`;
    }
    function formatCornerLabelText(text) {
        if (!text) return text;
        return String(text).replace(/-?\d+(\.\d+)?/g, m => parseFloat(m).toFixed(2));
    }
    function getTankColor(cap) {
        if (cap > 250) return '#10b981';
        if (cap > 150) return '#38bdf8';
        if (cap > 50) return '#f59e0b';
        return '#94a3b8';
    }
    function worldToScreen(x, y) {
        const container = document.getElementById('tankContainer');
        const cssW = container ? container.clientWidth : 900;
        const cssH = container ? container.clientHeight : 280;
        const worldXMin = QUAY_X_START;
        const worldXMax = BARGE_X_MAX;
        const worldW = worldXMax - worldXMin;
        const plottableW = cssW - PLAN_MARGIN_PX * 2;
        const plottableH = cssH - PLAN_MARGIN_PX * 2;
        const xFrac = (x - worldXMin) / worldW;
        const sx = PLAN_MARGIN_PX + xFrac * plottableW;
        const yFrac = (BARGE_Y_MAX - y) / (BARGE_Y_MAX - BARGE_Y_MIN);
        const sy = PLAN_MARGIN_PX + yFrac * plottableH;
        return { sx, sy };
    }
    function getPlanScale() {
        const container = document.getElementById('tankContainer');
        const cssW = container ? container.clientWidth : 900;
        const cssH = container ? container.clientHeight : 280;
        const worldW = BARGE_X_MAX - QUAY_X_START;
        const plottableW = cssW - PLAN_MARGIN_PX * 2;
        const plottableH = cssH - PLAN_MARGIN_PX * 2;
        return { scaleX: plottableW / worldW, scaleY: plottableH / (BARGE_Y_MAX - BARGE_Y_MIN) };
    }
    function recomputeBargeExtents() {
        if (!TANK_CONFIG.length) return;
        BARGE_X_MIN = Math.min(...TANK_CONFIG.map(t => t.x_start));
        BARGE_X_MAX = Math.max(...TANK_CONFIG.map(t => t.x_end));
        BARGE_Y_MIN = Math.min(...TANK_CONFIG.map(t => t.y_start));
        BARGE_Y_MAX = Math.max(...TANK_CONFIG.map(t => t.y_end));
    }
    function computeTotalTankSpan() {
        if (!TANK_CONFIG.length) return { totalLength: 0, totalWidth: 0, numCols: 0, numRows: 0 };
        const key = v => Math.round(v * 1000) / 1000;
        const colMap = new Map();
        TANK_CONFIG.forEach(t => { const k = `${key(t.x_start)}_${key(t.x_end)}`; if (!colMap.has(k)) colMap.set(k, Math.abs(t.width)); });
        const rowMap = new Map();
        TANK_CONFIG.forEach(t => { const k = `${key(t.y_start)}_${key(t.y_end)}`; if (!rowMap.has(k)) rowMap.set(k, Math.abs(t.height)); });
        return { totalLength: [...colMap.values()].reduce((s,w) => s + w, 0), totalWidth: [...rowMap.values()].reduce((s,h) => s + h, 0), numCols: colMap.size, numRows: rowMap.size };
    }
    function updateBargeInfoNote() {
        const note = document.getElementById('bargeInfoNote');
        if (!note) return;
        const { totalLength, totalWidth, numCols, numRows } = computeTotalTankSpan();
        note.textContent = `${BARGE_NAME} · ${totalLength.toFixed(1)}m (${numCols}) × ${totalWidth.toFixed(1)}m (${numRows})`;
    }
    function buildTankConfigFromCrest(geometryRows, nameWeightRows) {
        return geometryRows.map((g, idx) => {
            const q = g.q, r = g.r, s = g.s, t = g.t;
            const w = Math.abs(r - q), h = Math.abs(t - s);
            const x = q + w/2, y = s + h/2;
            const extra = (nameWeightRows && nameWeightRows[idx]) ? nameWeightRows[idx] : null;
            return {
                id: EXCEL_START_ROW + idx,
                crestRow: CREST_START_ROW + idx,
                name: (extra && extra.name) ? extra.name : `TANK ${idx+1}`,
                x_start: Math.min(q,r), x_end: Math.max(q,r),
                y_start: Math.min(s,t), y_end: Math.max(s,t),
                width: w, height: h, x, y,
                capacity: (extra && extra.capacity) ? extra.capacity : 0
            };
        });
    }
    function rebuildTankDataFromConfig() {
        tankData = TANK_CONFIG.map(cfg => ({
            row: cfg.id,
            name: cfg.name,
            weight: 0,
            percent: 0,
            capacity: cfg.capacity,
            geometry: getTankGeometry(cfg.id)
        }));
    }

    // ---------- DRAW HULL OUTLINE (for attitude canvases) ----------
    function drawHullOutline(ctx, w, h, fillStyle, strokeStyle, lineWidth) {
        const bowTaper = w * 0.10, sternCut = w * 0.09, sternRound = h * 0.18;
        const left = -w/2, right = w/2, top = -h/2, bottom = h/2;
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(right, top);
        ctx.lineTo(right - bowTaper, bottom);
        ctx.lineTo(left + sternCut + sternRound, bottom);
        ctx.quadraticCurveTo(left + sternCut, bottom, left + sternCut * 0.3, bottom - sternRound * 0.8);
        ctx.lineTo(left, top);
        ctx.closePath();
        if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }
        if (strokeStyle) { ctx.strokeStyle = strokeStyle; ctx.lineWidth = lineWidth || 2; ctx.stroke(); }
    }

    // ---------- RENDER TANKS ----------
    function initTankMatrix() {
        const container = document.getElementById('tankContainer');
        container.innerHTML = '';
        if (!TANK_CONFIG.length) return;
        sizeTankPlanView();
        const { scaleX, scaleY } = getPlanScale();
        const gapPx = parseFloat(getComputedStyle(container).getPropertyValue('--tank-gap')) || 15;
        const inset = Math.min(gapPx / 4, 5);

        // Quay
        const quayBox = document.createElement('div');
        quayBox.className = 'quay-structure-box';
        const qTL = worldToScreen(QUAY_X_START, BARGE_Y_MAX);
        const qBR = worldToScreen(QUAY_X_END, BARGE_Y_MIN);
        quayBox.style.left = qTL.sx + 'px';
        quayBox.style.top = qTL.sy + 'px';
        quayBox.style.width = Math.max(qBR.sx - qTL.sx, 30) + 'px';
        quayBox.style.height = Math.max(qBR.sy - qTL.sy, 40) + 'px';
        quayBox.innerHTML = `<div class="quay-title">QUAY</div>`;
        container.appendChild(quayBox);

        TANK_CONFIG.forEach((cfg, idx) => {
            const geo = getTankGeometry(cfg.id);
            if (!geo) return;
            const excelRow = EXCEL_START_ROW + idx;
            const tank = tankData.find(t => t.row === cfg.id);
            const pct = tank ? tank.percent * 100 : 0;
            const weight = tank ? tank.weight : 0;
            const isOver = parseFloat(weight) > cfg.capacity;
            const xS = geo.x - geo.width/2, xE = geo.x + geo.width/2;
            const yT = geo.y + geo.height/2, yB = geo.y - geo.height/2;
            const tl = worldToScreen(xS, yT);
            const br = worldToScreen(xE, yB);
            const pxL = tl.sx + inset, pxT = tl.sy + inset;
            const pxW = Math.max(br.sx - tl.sx - inset*2, 20);
            const pxH = Math.max(br.sy - tl.sy - inset*2, 16);

            const box = document.createElement('div');
            box.className = 'tank-control-box';
            box.id = `tank_card_${cfg.id}`;
            box.style.left = pxL + 'px';
            box.style.top = pxT + 'px';
            box.style.width = pxW + 'px';
            box.style.height = pxH + 'px';
            box.style.borderColor = getTankColor(cfg.capacity);
            box.style.borderWidth = '1.5px';

            const waterClass = pct >= 85 ? 'tank-water-level tank-water-high' : 'tank-water-level';
            const shortName = shortenTankName(cfg.name);
            box.innerHTML = `
                <div class="${waterClass}" style="height:${pct}%"></div>
                <div class="tank-header">
                    <span class="tank-name">${shortName}</span>
                    <span class="tank-coords-badge tank-dim-label" style="display:${showDimensions?'':'none'}">${geo.width.toFixed(1)}×${geo.height.toFixed(1)}</span>
                </div>
                <div class="tank-inputs">
                    <input type="number" step="any" class="weight-input${isOver?' weight-input-over':''}"
                           id="txt_Row${cfg.id}" value="${weight}"
                           onclick="this.select()" onchange="updateTankFill(${cfg.id}, this.value)">
                    <div class="load-percentage-label" id="lbl_Load${cfg.id}">${pct.toFixed(0)}% (Cap.${cfg.capacity}t)</div>
                    <div class="tank-warning" id="warn_Row${cfg.id}" style="display:${isOver?'':'none'};">${isOver?`⚠ Exceeds (${cfg.capacity}t)`:''}</div>
                </div>
            `;
            box.title = `${cfg.name} — ${geo.width.toFixed(2)}×${geo.height.toFixed(2)}m @ (${geo.x.toFixed(2)}, ${geo.y.toFixed(2)})`;
            container.appendChild(box);
        });
        renderBargeCornerLabels(container);
        renderPumpMarkers(container);
        applyPumpInputRestriction();
        applyDimensionVisibility();
    }

    function sizeTankPlanView() {
        const container = document.getElementById('tankContainer');
        if (!container || !TANK_CONFIG.length) return;
        const worldW = (BARGE_X_MAX - BARGE_X_MIN) + (QUAY_X_END - QUAY_X_START);
        const worldH = (BARGE_Y_MAX - BARGE_Y_MIN);
        const pxW = Math.max(700, Math.round(worldW * PLAN_PX_PER_METER) + PLAN_MARGIN_PX * 2);
        const pxH = Math.max(240, Math.round(worldH * PLAN_PX_PER_METER) + PLAN_MARGIN_PX * 2);
        container.style.width = pxW + 'px';
        container.style.height = pxH + 'px';
    }

    function renderBargeCornerLabels(container) {
        container.querySelectorAll('.barge-corner-label, .barge-end-label').forEach(el => el.remove());
        const midX = (BARGE_X_MIN + BARGE_X_MAX)/2;
        const anchors = [
            { text: bargeCornerLabels[0], x: BARGE_X_MIN, y: BARGE_Y_MAX, h:'left', v:'top' },
            { text: bargeCornerLabels[1], x: midX, y: BARGE_Y_MAX, h:'center', v:'top' },
            { text: bargeCornerLabels[2], x: BARGE_X_MAX, y: BARGE_Y_MAX, h:'right', v:'top' },
            { text: bargeCornerLabels[3], x: BARGE_X_MIN, y: BARGE_Y_MIN, h:'left', v:'bottom' },
            { text: bargeCornerLabels[4], x: midX, y: BARGE_Y_MIN, h:'center', v:'bottom' },
            { text: bargeCornerLabels[5], x: BARGE_X_MAX, y: BARGE_Y_MIN, h:'right', v:'bottom' }
        ];
        const outside = 6;
        anchors.forEach(a => {
            if (!a.text) return;
            const p = worldToScreen(a.x, a.y);
            const lbl = document.createElement('div');
            lbl.className = 'barge-corner-label';
            lbl.textContent = formatCornerLabelText(a.text);
            lbl.style.position = 'absolute';
            lbl.style.left = p.sx + 'px';
            if (a.h === 'left') { lbl.style.transform = 'translateX(0)'; lbl.style.textAlign = 'left'; }
            else if (a.h === 'right') { lbl.style.transform = 'translateX(-100%)'; lbl.style.textAlign = 'right'; }
            else { lbl.style.transform = 'translateX(-50%)'; lbl.style.textAlign = 'center'; }
            if (a.v === 'top') { lbl.style.top = (p.sy - outside) + 'px'; lbl.style.transform += ' translateY(-100%)'; }
            else { lbl.style.top = (p.sy + outside) + 'px'; }
            container.appendChild(lbl);
        });
        // AFT / FWD / PS / SB
        const aftP = worldToScreen(BARGE_X_MIN, (BARGE_Y_MIN+BARGE_Y_MAX)/2);
        const fwdP = worldToScreen(BARGE_X_MAX, (BARGE_Y_MIN+BARGE_Y_MAX)/2);
        const psP = worldToScreen((BARGE_X_MIN+BARGE_X_MAX)/2, BARGE_Y_MAX);
        const sbP = worldToScreen((BARGE_X_MIN+BARGE_X_MAX)/2, BARGE_Y_MIN);
        const aft = document.createElement('div'); aft.className = 'barge-end-label'; aft.id='lbl_PlanAFT'; aft.textContent='AFT';
        aft.style.left=(aftP.sx-6)+'px'; aft.style.top=aftP.sy+'px'; aft.style.transform='translate(-100%,-50%) rotate(-90deg)';
        container.appendChild(aft);
        const fwd = document.createElement('div'); fwd.className = 'barge-end-label'; fwd.id='lbl_PlanFWD'; fwd.textContent='FWD';
        fwd.style.left=(fwdP.sx+6)+'px'; fwd.style.top=fwdP.sy+'px'; fwd.style.transform='translate(0,-50%) rotate(90deg)';
        container.appendChild(fwd);
        const ps = document.createElement('div'); ps.className = 'barge-end-label'; ps.id='lbl_PlanPS'; ps.textContent='PS';
        ps.style.left=(psP.sx+30)+'px'; ps.style.top=(psP.sy-outside)+'px'; ps.style.transform='translateY(-100%)';
        container.appendChild(ps);
        const sb = document.createElement('div'); sb.className = 'barge-end-label'; sb.id='lbl_PlanSB'; sb.textContent='SB';
        sb.style.left=(sbP.sx+30)+'px'; sb.style.top=(sbP.sy+outside)+'px';
        container.appendChild(sb);
        updateTrimHeelGridLabels();
    }

    function renderPumpMarkers(container) {
        container.querySelectorAll('.pump-marker').forEach(el => el.remove());
        tanksWithPump = new Set();
        if (!pumpLocations.length || !TANK_CONFIG.length) { applyPumpInputRestriction(); return; }
        pumpLocations.forEach(pump => {
            const targetNorm = normalizeTankName(pump.tankName);
            const cfg = TANK_CONFIG.find(t => normalizeTankName(t.name) === targetNorm);
            if (!cfg) return;
            const geo = getTankGeometry(cfg.id);
            if (!geo) return;
            tanksWithPump.add(cfg.id);
            const topRightX = geo.x + geo.width/2;
            const topRightY = geo.y + geo.height/2;
            const p = worldToScreen(topRightX, topRightY);
            const marker = document.createElement('div');
            marker.className = 'pump-marker';
            marker.style.right = (container.clientWidth - p.sx + 3) + 'px';
            marker.style.top = (p.sy + 3) + 'px';
            marker.innerHTML = `<span class="pump-marker-label">${pump.pumpName}</span><span class="pump-marker-dot"></span>`;
            container.appendChild(marker);
        });
        applyPumpInputRestriction();
    }

    // ---------- ATTITUDE GRAPHICS ----------
    function drawAttitudeGraphics() {
        const isLight = document.body.classList.contains('light-theme');
        const hullColor = isLight ? '#0284c7' : '#38bdf8';
        const waterlineColor = '#10b981';
        const textColor = isLight ? '#0f172a' : '#94a3b8';
        // Trim
        const trimCanvas = document.getElementById('trimCanvas');
        if (trimCanvas) {
            const ctx = trimCanvas.getContext('2d');
            const cw = trimCanvas.width, ch = trimCanvas.height;
            const waterY = ch * 0.6;
            ctx.clearRect(0,0,cw,ch);
            ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
            ctx.fillRect(0, waterY, cw, ch-waterY);
            ctx.strokeStyle = waterlineColor; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(4, waterY); ctx.lineTo(cw-4, waterY); ctx.stroke();
            ctx.save();
            ctx.translate(cw/2, waterY);
            ctx.rotate((currentTrimDegrees * Math.PI / 180) * -1);
            drawHullOutline(ctx, cw*0.7, ch*0.3, isLight?'#cbd5e1':'#1e293b', hullColor, 1.5);
            ctx.fillStyle = textColor; ctx.font = 'bold 7px sans-serif';
            ctx.fillText("AFT", -cw*0.28, -2); ctx.fillText("FWD", cw*0.18, -2);
            ctx.restore();
            let trimText = `${Math.abs(currentTrimDegrees).toFixed(1)}° `;
            if (currentTrimDegrees > 0.02) trimText += "AFT";
            else if (currentTrimDegrees < -0.02) trimText += "FWD";
            else trimText += "EVEN";
            document.getElementById('lbl_GridAFT').textContent = currentTrimDegrees > 0.02 ? `AFT ${Math.abs(currentTrimDegrees).toFixed(1)}°` : 'AFT';
            document.getElementById('lbl_GridFWD').textContent = currentTrimDegrees < -0.02 ? `FWD ${Math.abs(currentTrimDegrees).toFixed(1)}°` : 'FWD';
            document.getElementById('lbl_GridAFT').classList.toggle('grid-side-label-active', currentTrimDegrees > 0.02);
            document.getElementById('lbl_GridFWD').classList.toggle('grid-side-label-active', currentTrimDegrees < -0.02);
        }
        // Heel
        const heelCanvas = document.getElementById('heelCanvas');
        if (heelCanvas) {
            const ctx = heelCanvas.getContext('2d');
            const cw = heelCanvas.width, ch = heelCanvas.height;
            const waterY = ch * 0.6;
            ctx.clearRect(0,0,cw,ch);
            ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
            ctx.fillRect(0, waterY, cw, ch-waterY);
            ctx.strokeStyle = waterlineColor; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(4, waterY); ctx.lineTo(cw-4, waterY); ctx.stroke();
            ctx.save();
            ctx.translate(cw/2, waterY);
            ctx.rotate((currentHeelDegrees * Math.PI / 180) * -1);
            ctx.strokeStyle = hullColor; ctx.lineWidth = 1.5;
            ctx.fillStyle = isLight ? '#cbd5e1' : '#1e293b';
            ctx.beginPath(); ctx.rect(-cw*0.32, -ch*0.16, cw*0.64, ch*0.32); ctx.fill(); ctx.stroke();
            ctx.fillStyle = textColor; ctx.font = 'bold 7px sans-serif';
            ctx.fillText("PS", -cw*0.28, -2); ctx.fillText("SB", cw*0.18, -2);
            ctx.restore();
            document.getElementById('lbl_GridPS').textContent = currentHeelDegrees > 0.02 ? `PS ${Math.abs(currentHeelDegrees).toFixed(1)}°` : 'PS';
            document.getElementById('lbl_GridSB').textContent = currentHeelDegrees < -0.02 ? `SB ${Math.abs(currentHeelDegrees).toFixed(1)}°` : 'SB';
            document.getElementById('lbl_GridPS').classList.toggle('grid-side-label-active', currentHeelDegrees > 0.02);
            document.getElementById('lbl_GridSB').classList.toggle('grid-side-label-active', currentHeelDegrees < -0.02);
        }
        updateTrimHeelGridLabels();
    }

    function updateTrimHeelGridLabels() {
        const planAft = document.getElementById('lbl_PlanAFT');
        const planFwd = document.getElementById('lbl_PlanFWD');
        const planPs = document.getElementById('lbl_PlanPS');
        const planSb = document.getElementById('lbl_PlanSB');
        const trimAbs = Math.abs(currentTrimDegrees).toFixed(1)+'°';
        const heelAbs = Math.abs(currentHeelDegrees).toFixed(1)+'°';
        if (planAft && planFwd) {
            planAft.textContent = currentTrimDegrees > 0.02 ? `AFT ${trimAbs}` : 'AFT';
            planFwd.textContent = currentTrimDegrees < -0.02 ? `FWD ${trimAbs}` : 'FWD';
            planAft.classList.toggle('barge-end-label-active', currentTrimDegrees > 0.02);
            planFwd.classList.toggle('barge-end-label-active', currentTrimDegrees < -0.02);
        }
        if (planPs && planSb) {
            planPs.textContent = currentHeelDegrees > 0.02 ? `PS ${heelAbs}` : 'PS';
            planSb.textContent = currentHeelDegrees < -0.02 ? `SB ${heelAbs}` : 'SB';
            planPs.classList.toggle('barge-end-label-active', currentHeelDegrees > 0.02);
            planSb.classList.toggle('barge-end-label-active', currentHeelDegrees < -0.02);
        }
    }

    // ---------- TRAILER OVERLAY ----------
    function drawAxleOverlay() {
        const wrap = document.getElementById('tankGridWrap');
        const gridEl = document.getElementById('tankContainer');
        const canvas = document.getElementById('axleOverlayCanvas');
        if (!wrap || !gridEl || !canvas) return;
        const rect = gridEl.getBoundingClientRect();
        const wrapRect = wrap.getBoundingClientRect();
        const cssW = rect.width, cssH = rect.height;
        if (cssW===0 || cssH===0) return;
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
        canvas.style.left = (rect.left - wrapRect.left) + 'px';
        canvas.style.top = (rect.top - wrapRect.top) + 'px';
        canvas.width = cssW * dpr; canvas.height = cssH * dpr;
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr,0,0,dpr,0,0);
        ctx.clearRect(0,0,cssW,cssH);
        if (!showTrailer || !TANK_CONFIG.length) return;
        const isLight = document.body.classList.contains('light-theme');
        const { scaleX, scaleY } = getPlanScale();
        const halfW = Math.max((AXLE_WIDTH_X/2) * scaleX, 2);
        const halfH = Math.max((AXLE_HEIGHT_Y/2) * scaleY, 2);
        const fill = isLight ? 'rgba(245,158,11,0.25)' : 'rgba(245,158,11,0.2)';
        const border = isLight ? '#b45309' : '#fbbf24';
        trailerAxles.forEach(axle => {
            const p = worldToScreen(axle.x, axle.y);
            ctx.save();
            ctx.fillStyle = fill;
            ctx.strokeStyle = border;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.rect(p.sx - halfW, p.sy - halfH, halfW*2, halfH*2);
            ctx.fill(); ctx.stroke();
            ctx.restore();
        });
    }

    function toggleTrailerOverlay() { showTrailer = document.getElementById('trailerToggleCheckbox').checked; drawAxleOverlay(); }

    // ---------- UPDATE TANK FILL ----------
    async function updateTankFill(row, value) {
        const parsed = parseFloat(value);
        if (isNaN(parsed)) return;
        const cfg = TANK_CONFIG.find(t => t.id === row);
        if (!cfg) return;
        const mockMax = cfg.capacity || 1000;
        const isOver = parsed > mockMax;
        let pctNum = Math.max(0, Math.min(parsed / mockMax, 1.0)) * 100;
        const card = document.getElementById(`tank_card_${row}`);
        if (!card) return;
        const water = card.querySelector('.tank-water-level');
        const label = document.getElementById(`lbl_Load${row}`);
        const input = document.getElementById(`txt_Row${row}`);
        const warning = document.getElementById(`warn_Row${row}`);
        if (water) { water.style.height = `${pctNum}%`; water.classList.toggle('tank-water-high', pctNum >= 85); }
        if (label) label.textContent = `${pctNum.toFixed(0)}% (Cap.${cfg.capacity}t)`;
        if (input) input.classList.toggle('weight-input-over', isOver);
        if (warning) { warning.style.display = isOver ? '' : 'none'; warning.textContent = isOver ? `⚠ Exceeds (${cfg.capacity}t)` : ''; }
        if (!isOfficeInitialized) return;
        try {
            await Excel.run(async (context) => {
                const sheet = context.workbook.worksheets.getItem("Load_Editor");
                const cell = sheet.getRange(`D${row}`);
                cell.values = [[parsed]];
                await context.sync();
                setTimeout(pullExcelTankData, 300);
            });
        } catch(e) { console.warn("Excel write error", e); }
    }

    // ---------- THEME ----------
    function toggleDashboardTheme() {
        const checked = document.getElementById('themeToggleCheckbox').checked;
        document.body.classList.toggle('light-theme', checked);
        drawAttitudeGraphics();
        drawAxleOverlay();
    }

    // ---------- EXCEL SYNC ----------
    async function pullExcelTankData() {
        if (!isOfficeInitialized) { generateMockSystemValues(); return; }
        try {
            await Excel.run(async (context) => {
                const crestSheet = context.workbook.worksheets.getItem(CREST_SHEET_NAME);
                const editorSheet = context.workbook.worksheets.getItem("Load_Editor");
                crestSheet.load("name");
                const crestEndRow = CREST_START_ROW + CREST_MAX_ROWS - 1;
                const rangeCrest = crestSheet.getRange(`Q${CREST_START_ROW}:T${crestEndRow}`);
                rangeCrest.load("values");
                const cellTrim = editorSheet.getRange("E8");
                const cellHeel = editorSheet.getRange("E9");
                cellTrim.load("values"); cellHeel.load("values");
                const rangeCornerLabels = editorSheet.getRange("I1:I6");
                rangeCornerLabels.load("values");
                const axleEndRow = AXLE_START_ROW + AXLE_MAX_ROWS - 1;
                const rangeAxles = editorSheet.getRange(`E${AXLE_START_ROW}:F${axleEndRow}`);
                rangeAxles.load("values");
                let rangePumps = null;
                try {
                    const pumpSheet = context.workbook.worksheets.getItem(PUMP_SHEET_NAME);
                    const pumpEndRow = PUMP_START_ROW + PUMP_MAX_ROWS - 1;
                    rangePumps = pumpSheet.getRange(`A${PUMP_START_ROW}:E${pumpEndRow}`);
                    rangePumps.load("values");
                } catch(e) {}
                await context.sync();
                BARGE_NAME = crestSheet.name || CREST_SHEET_NAME;
                currentTrimDegrees = parseFloat(cellTrim.values[0][0] || 0);
                currentHeelDegrees = parseFloat(cellHeel.values[0][0] || 0);
                bargeCornerLabels = rangeCornerLabels.values.map(row => (row[0]!==null && row[0]!==undefined) ? String(row[0]) : '');
                if (rangePumps) {
                    const pv = rangePumps.values;
                    const parsed = [];
                    for (let i=0; i<pv.length; i++) {
                        const rawTank = pv[i][0];
                        const rawPump = pv[i][4];
                        if (rawTank === '' || rawTank === null || rawTank === undefined) break;
                        if (rawPump !== '' && rawPump !== null && rawPump !== undefined)
                            parsed.push({ tankName: String(rawTank), pumpName: String(rawPump) });
                    }
                    pumpLocations = parsed;
                } else { pumpLocations = []; }
                const crestValues = rangeCrest.values;
                const geometryRows = [];
                for (let i=0; i<crestValues.length; i++) {
                    const [rawQ, rawR, rawS, rawT] = crestValues[i];
                    if ([rawQ,rawR,rawS,rawT].every(v => v==='' || v===null || v===undefined)) break;
                    const q=parseFloat(rawQ), r=parseFloat(rawR), s=parseFloat(rawS), t=parseFloat(rawT);
                    if ([q,r,s,t].some(isNaN)) continue;
                    geometryRows.push({ q, r, s, t });
                }
                let nameWeightRows = [];
                if (geometryRows.length > 0) {
                    const editorEndRow = EXCEL_START_ROW + geometryRows.length - 1;
                    const rangeEditor = editorSheet.getRange(`B${EXCEL_START_ROW}:E${editorEndRow}`);
                    rangeEditor.load("values");
                    await context.sync();
                    const ev = rangeEditor.values;
                    nameWeightRows = ev.map(row => ({
                        name: row[0] || null,
                        weight: parseFloat(row[2] || 0),
                        percent: parseFloat(row[3] || 0),
                        capacity: parseFloat(row[1] || 0) || 0
                    }));
                }
                TANK_CONFIG = buildTankConfigFromCrest(geometryRows, nameWeightRows);
                recomputeBargeExtents();
                rebuildTankDataFromConfig();
                updateBargeInfoNote();
                tankData.forEach((tank, idx) => {
                    const extra = nameWeightRows[idx];
                    if (extra) { tank.weight = extra.weight.toFixed(2); tank.percent = extra.percent > 1 ? extra.percent/100 : extra.percent; }
                });
                const axleValues = rangeAxles.values;
                const parsedAxles = [];
                for (let i=0; i<axleValues.length; i++) {
                    const rawX = axleValues[i][0], rawY = axleValues[i][1];
                    if ((rawX===''||rawX===null||rawX===undefined) && (rawY===''||rawY===null||rawY===undefined)) break;
                    const x = parseFloat(rawX), y = parseFloat(rawY);
                    if (isNaN(x) || isNaN(y)) continue;
                    parsedAxles.push({ row: AXLE_START_ROW + i, x, y });
                }
                trailerAxles = parsedAxles;
                initTankMatrix();
                drawAttitudeGraphics();
                drawAxleOverlay();
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color:var(--accent-green);">● Excel</span>';
            });
        } catch(e) { console.warn("Excel sync error", e); generateMockSystemValues(); }
    }

    // ---------- MOCK DATA ----------
    function generateMockSystemValues() {
        const mockCrest = [
            { q:0, r:14, s:5, t:14.5 }, { q:0, r:14, s:-4.5, t:4.5 }, { q:0, r:14, s:-14.5, t:-5 },
            { q:15.5, r:29, s:5, t:14 }, { q:15.5, r:29, s:-4, t:4 }, { q:15.5, r:29, s:-14, t:-5 },
            { q:30.5, r:44, s:5.5, t:14 }, { q:30.5, r:44, s:-4, t:4 }, { q:30.5, r:44, s:-14, t:-5.5 },
            { q:45.5, r:58, s:5, t:13.5 }, { q:45.5, r:58, s:-3.5, t:3.5 }, { q:45.5, r:58, s:-13.5, t:-5 },
            { q:59.5, r:71, s:4.5, t:13 }, { q:59.5, r:71, s:-3.5, t:3.5 }, { q:59.5, r:71, s:-13, t:-4.5 },
            { q:72.5, r:83, s:4, t:12 }, { q:72.5, r:83, s:-3, t:3 }, { q:72.5, r:83, s:-12, t:-4 },
            { q:84.5, r:94, s:3.5, t:11 }, { q:84.5, r:94, s:-2.5, t:2.5 }, { q:84.5, r:94, s:-11, t:-3.5 },
            { q:95.5, r:104, s:3, t:10 }, { q:95.5, r:104, s:-2.5, t:2.5 }, { q:95.5, r:104, s:-10, t:-3 },
            { q:105.5, r:113, s:2.5, t:9 }, { q:105.5, r:113, s:-2, t:2 }, { q:105.5, r:113, s:-9, t:-2.5 }
        ];
        const mockNames = ["AFT P","AFT C","AFT S","C8 P","C8 C","C8 S","C7 P","C7 C","C7 S","C6 P","C6 C","C6 S","C5 P","C5 C","C5 S","C4 P","C4 C","C4 S","C3 P","C3 C","C3 S","C2 P","C2 C","C2 S","FWD P","FWD C","FWD S"];
        const mockCaps = [280,380,280,240,320,240,220,300,220,200,270,200,180,250,180,150,210,150,130,180,130,110,150,110,90,120,90];
        const nameWeightRows = mockCrest.map((_,i) => ({ name: mockNames[i]||`TANK ${i+1}`, weight: 0, percent: 0, capacity: mockCaps[i]||0 }));
        BARGE_NAME = CREST_SHEET_NAME;
        bargeCornerLabels = ['Draft FWD','Draft MID','Draft AFT','Starboard','Centre','Port'];
        pumpLocations = [
            { tankName: 'AFT C', pumpName: 'P1' }, { tankName: 'C7 C', pumpName: 'P2' },
            { tankName: 'C5 C', pumpName: 'P3' }, { tankName: 'C3 C', pumpName: 'P4' }, { tankName: 'FWD C', pumpName: 'P5' }
        ];
        TANK_CONFIG = buildTankConfigFromCrest(mockCrest, nameWeightRows);
        recomputeBargeExtents();
        rebuildTankDataFromConfig();
        updateBargeInfoNote();
        tankData.forEach((t, i) => { t.weight = (60 + i*7 + (i%5)*1.8).toFixed(2); t.percent = Math.min(0.10 + i*0.025, 0.90); });
        currentTrimDegrees = 2.8; currentHeelDegrees = -1.9;
        trailerAxles = [
            { row: AXLE_START_ROW, x: 30, y: 3.2 }, { row: AXLE_START_ROW+1, x: 30, y: -3.2 },
            { row: AXLE_START_ROW+2, x: 45, y: 3.2 }, { row: AXLE_START_ROW+3, x: 45, y: -3.2 },
            { row: AXLE_START_ROW+4, x: 60, y: 3.2 }, { row: AXLE_START_ROW+5, x: 60, y: -3.2 }
        ];
        initTankMatrix();
        drawAttitudeGraphics();
        drawAxleOverlay();
        document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color:#eab308;">● Mock</span>';
    }

    // ---------- OFFICE INIT ----------
    Office.onReady((info) => {
        if (info.host === Office.HostType.Excel) {
            isOfficeInitialized = true;
            document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color:var(--accent-green);">● Excel</span>';
            pullExcelTankData();
            registerExcelAutoTrack();
        } else {
            document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color:#eab308;">● Demo</span>';
            generateMockSystemValues();
        }
    });

    async function registerExcelAutoTrack() {
        try {
            await Excel.run(async (context) => {
                const sheet = context.workbook.worksheets.getItem("Load_Editor");
                sheet.onChanged.add(async () => { await pullExcelTankData(); });
                await context.sync();
            });
        } catch(e) {}
    }

    window.addEventListener('load', () => { if (!isOfficeInitialized) generateMockSystemValues(); });
    window.addEventListener('resize', () => drawAxleOverlay());
    </script>
</body>
</html>
