<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barge Ballast · Custom Tank Dimensions</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161d26;
            --panel-border: #242f41;
            --tank-box-bg: #1c2532;
            --input-bg: rgba(15,20,28,0.9);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --tank-water: rgba(56,189,248,0.25);
            --tank-water-solid: #38bdf8;
            --quay-bg: #2d3748;
            --quay-border: #4a5568;
            --quay-text: #cbd5e1;
            /* Gap between tank cards in the grid (both row + column gap).
               Change this ONE value to make tanks sit closer together or
               further apart. Increase for more breathing room, decrease
               (even down to 0) to pack tanks tightly. */
            --tank-gap: 15px;
        }

        body.light-theme {
            --bg-dark: #f1f5f9;
            --panel-bg: #ffffff;
            --panel-border: #cbd5e1;
            --tank-box-bg: #f8fafc;
            --input-bg: rgba(255,255,255,0.95);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --accent-green: #16a34a;
            --tank-water: rgba(2,132,199,0.15);
            --tank-water-solid: #0284c7;
            --quay-bg: #e2e8f0;
            --quay-border: #cbd5e1;
            --quay-text: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Calibri','Segoe UI',sans-serif;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--panel-border);
            flex-wrap: wrap;
            gap: 10px;
        }

            header h1 {
                font-size: 16px;
                font-weight: 600;
                letter-spacing: 0.5px;
                color: var(--text-main);
            }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .theme-toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #242f41;
            transition: .3s;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 12px;
                width: 12px;
                left: 3px;
                bottom: 3px;
                background-color: #38bdf8;
                transition: .3s;
                border-radius: 50%;
            }

        input:checked + .slider {
            background-color: #cbd5e1;
        }

            input:checked + .slider:before {
                transform: translateX(18px);
                background-color: #0284c7;
            }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .attitude-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .attitude-display-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-around;
        }

        .visual-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.15);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            flex: 1;
            min-width: 280px;
        }

        .visual-title {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .attitude-value-badge {
            font-size: 13px;
            font-weight: bold;
            color: var(--accent-green);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .attitude-canvas {
            background: #0b0f19;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
            width: 100%;
            height: auto;
            max-width: 320px;
            aspect-ratio: 320/110;
        }

        /* ---- Tank grid + trailer axle overlay (same coordinate space, meters) ---- */
        .tank-grid-wrap {
            position: relative;
            min-width: 1100px;
        }

        .axle-overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 20;
        }

        .tank-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-x: auto;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-left: 3px solid var(--accent-blue);
            padding-left: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tank-grid {
            display: grid;
            grid-template-columns: 90px repeat(9, 1fr);
            grid-template-rows: repeat(3, 105px);
            min-width: 1100px;
            gap: var(--tank-gap);
            padding-right: 5px;
        }

        .quay-structure-box {
            grid-column: 1;
            grid-row: 1 / span 3;
            background: var(--quay-bg);
            border: 2px dashed var(--quay-border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        .quay-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--quay-text);
        }

        .quay-dims {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .quay-coords-badge {
            font-size: 9px;
            margin-top: 8px;
            background: rgba(0,0,0,0.4);
            padding: 2px 5px;
            border-radius: 3px;
            color: #f43f5e;
            font-family: monospace;
        }

        .tank-control-box {
            background: var(--tank-box-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            position: relative;
            height: 105px;
            width: 100%;
            align-self: stretch;
            justify-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

            .tank-control-box:hover {
                z-index: 10;
                box-shadow: 0 0 25px rgba(56,189,248,0.25);
            }

        .tank-water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--tank-water);
            border-top: 2px solid var(--tank-water-solid);
            z-index: 1;
            transition: height 0.4s ease-out;
        }

        .tank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
            gap: 2px;
        }

        .tank-name {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .tank-coords-badge {
            font-size: 8px;
            background: rgba(0,0,0,0.35);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--accent-blue);
            font-family: monospace;
        }

        .tank-inputs {
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .weight-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            text-align: center;
            font-size: 11px;
            padding: 2px 0;
            border-radius: 4px;
        }

            .weight-input:focus {
                outline: none;
                border-color: var(--accent-blue);
            }

        .load-percentage-label {
            font-size: 9px;
            text-align: center;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .tank-capacity-badge {
            font-size: 8px;
            background: rgba(0,0,0,0.4);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--accent-green);
            font-family: monospace;
        }

        .sync-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--accent-blue);
            padding: 2px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

            .sync-btn:hover {
                background: rgba(56,189,248,0.1);
            }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 3px;
        }

        @media (max-width: 700px) {
            .tank-grid {
                min-width: 700px;
            }
        }

        .coords-note {
            font-size: 10px;
            color: var(--text-muted);
            padding: 4px 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            display: inline-block;
            margin-left: 8px;
        }

        .tank-size-indicator {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 10;
        }

        .excel-row-badge {
            font-size: 8px;
            background: rgba(0,0,0,0.3);
            padding: 1px 4px;
            border-radius: 3px;
            color: #f59e0b;
            font-family: monospace;
        }

        /* new toggle for trailer overlay */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

            .toggle-container input {
                margin-right: 4px;
                accent-color: var(--accent-blue);
                width: 16px;
                height: 16px;
                cursor: pointer;
            }
    </style>
</head>
<body>
    <header>
        <h1>⚓ BARGE BALLAST · custom tank dimensions</h1>
        <div class="header-controls">
            <div class="theme-toggle-container">
                <span>Day</span>
                <label class="switch"><input type="checkbox" id="themeToggleCheckbox" onchange="toggleDashboardTheme()"><span class="slider"></span></label>
            </div>
            <!-- new toggle for trailer overlay -->
            <div class="toggle-container">
                <span>🚛 Trailer</span>
                <input type="checkbox" id="trailerToggleCheckbox" checked onchange="toggleTrailerOverlay()">
            </div>
            <div id="connectionStatus" style="font-size: 11px; color: var(--text-muted);">Status: <span style="color: #ef4444;">● Offline</span></div>
            <button class="sync-btn" onclick="pullExcelTankData()">↻ Sync</button>
        </div>
    </header>
    <div class="main-layout">
        <div class="attitude-panel">
            <div class="section-title">Barge attitude · real coordinates</div>
            <div class="attitude-display-container">
                <div class="visual-container">
                    <div class="visual-title">Trim (longitudinal)</div>
                    <div class="attitude-value-badge" id="lbl_TrimValue">0.00°</div>
                    <canvas id="trimCanvas" class="attitude-canvas" width="320" height="110"></canvas>
                </div>
                <div class="visual-container">
                    <div class="visual-title">Heel (transverse)</div>
                    <div class="attitude-value-badge" id="lbl_HeelValue">0.00°</div>
                    <canvas id="heelCanvas" class="attitude-canvas" width="320" height="110"></canvas>
                </div>
            </div>
        </div>

        <div class="tank-grid-container">
            <div class="section-title">
                <span>🔹 Custom tank layout · each tank has unique size & position</span>
                <span class="coords-note" id="bargeInfoNote">dimensions in meters · geometry linked to CREST_301!Q30:T (until blank)</span>
            </div>
            <div class="tank-grid-wrap" id="tankGridWrap">
                <div class="tank-grid" id="tankContainer"></div>
                <canvas id="axleOverlayCanvas" class="axle-overlay-canvas"></canvas>
            </div>
        </div>
    </div>
    <script>
        // ============================================================
        // 1. CUSTOM TANK CONFIGURATION — geometry is now LINKED to the
        //    Excel sheet "CREST_301", columns Q:T, starting at row 30
        //    and continuing down until the first fully blank row.
        //
        //    Column Q = x_start ("Q")
        //    Column R = x_end   ("R")
        //    Column S = y_start ("S")
        //    Column T = y_end   ("T")
        //
        //    Derived per-tank geometry:
        //      width  = R - Q
        //      height = T - S
        //      x (location) = Q + ((R - Q) / 2)
        //      y (location) = S + ((T - S) / 2)
        //
        //    name/weight/percent/capacity still come from the existing
        //    Load_Editor sheet (B:E, rows 14+) and are matched to the
        //    CREST_301 geometry rows by position (1st geometry row pairs
        //    with the 1st Load_Editor row, etc). If CREST_301 has fewer
        //    or more rows than Load_Editor, TANK_CONFIG length follows
        //    CREST_301 (the geometry source), and any unmatched
        //    name/weight/capacity falls back to a generic placeholder.
        // ============================================================
        const CREST_SHEET_NAME = "CREST_301";
        const CREST_START_ROW = 30;     // first geometry row
        const CREST_MAX_ROWS = 200;     // generous over-read, trimmed at first blank row
        const CREST_COL_RANGE = "Q:T";  // Q=x_start, R=x_end, S=y_start, T=y_end

        // TANK_CONFIG is now populated dynamically at runtime (see
        // buildTankConfigFromCrest / pullExcelTankData). It starts empty
        // and is filled in before first render.
        let TANK_CONFIG = [];

        // ---- derived constants (recomputed whenever TANK_CONFIG changes) ----
        let totalTanks = 0;
        const GRID_COLS = 9;      // visual grid columns (2-10)
        const GRID_ROWS = 3;      // visual grid rows (1-3)
        const EXCEL_START_ROW = 14; // Load_Editor name/weight/capacity rows

        // ---- trailer axle constants ----
        const AXLE_WIDTH_X = 0.86;
        const AXLE_HEIGHT_Y = 0.945;
        const AXLE_START_ROW = 124;
        const AXLE_MAX_ROWS = 60;

        // Trailer axle rectangle appearance — edit these values to change
        // colour, transparency, or border of the amber overlay rectangles.
        // No other code needs to change; drawAxleOverlay() reads this object.
        //
        //   fillColorDark / fillColorLight : "R,G,B" string, e.g. "239,68,68" for red
        //   fillOpacityDark / fillOpacityLight : 0 (invisible) .. 1 (solid fill)
        //   borderColorDark / borderColorLight : any CSS colour, e.g. "#22d3ee"
        //   borderWidth : stroke thickness in pixels (0 = no border at all)
        //
        // Example — solid red, no transparency, thicker cyan border:
        //   fillColorDark: '239,68,68', fillOpacityDark: 1,
        //   borderColorDark: '#22d3ee', borderWidth: 3
        const AXLE_STYLE = {
            fillColorDark: '245,158,11',   // RGB for dark theme fill (amber)
            fillColorLight: '245,158,11',  // RGB for light theme fill
            fillOpacityDark: 0.4,          // 0 = fully transparent, 1 = solid
            fillOpacityLight: 0.45,
            borderColorDark: '#fbbf24',    // border/stroke colour, dark theme
            borderColorLight: '#b45309',   // border/stroke colour, light theme
            borderWidth: 1.5               // border thickness in px
        };

        // Barge extents (derived from TANK_CONFIG once loaded). Default to a
        // sane placeholder range until the real CREST_301 data arrives.
        let BARGE_X_MIN = 0;
        let BARGE_X_MAX = 113;
        let BARGE_Y_MIN = -14.5;
        let BARGE_Y_MAX = 14.5;

        // Barge identity: name = the source worksheet name (CREST_301, or
        // whatever sheet the geometry actually came from).
        let BARGE_NAME = CREST_SHEET_NAME;

        function recomputeBargeExtents() {
            if (!TANK_CONFIG.length) return;
            BARGE_X_MIN = Math.min(...TANK_CONFIG.map(t => t.x_start));
            BARGE_X_MAX = Math.max(...TANK_CONFIG.map(t => t.x_end));
            BARGE_Y_MIN = Math.min(...TANK_CONFIG.map(t => t.y_start));
            BARGE_Y_MAX = Math.max(...TANK_CONFIG.map(t => t.y_end));
        }

        // Total barge length = sum of each DISTINCT COLUMN's width, counted
        // ONCE per column — a "column" being a group of tanks that share the
        // same X-span (x_start/x_end), e.g. Port/Centre/Starboard tanks in
        // the same bay. We detect columns by clustering on (x_start, x_end)
        // rather than assuming a fixed "every GRID_ROWS tanks = 1 column",
        // since real CREST_301 data may not be perfectly grouped that way
        // (e.g. 8 bays of one size + 1 different-sized bay).
        //
        // Total barge width = sum of each DISTINCT ROW's height, counted
        // ONCE per row — a "row" being tanks that share the same Y-span
        // (y_start/y_end) across the barge's beam (e.g. Port row, Centre
        // row, Starboard row).
        function computeTotalTankSpan() {
            if (!TANK_CONFIG.length) return { totalLength: 0, totalWidth: 0, numCols: 0, numRows: 0 };

            // Round to avoid floating-point near-duplicates creating false
            // distinct groups (e.g. 9.143999999 vs 9.144).
            const key = v => Math.round(v * 1000) / 1000;

            // --- Columns: cluster by (x_start, x_end) ---
            const colMap = new Map();
            TANK_CONFIG.forEach(t => {
                const k = `${key(t.x_start)}_${key(t.x_end)}`;
                if (!colMap.has(k)) colMap.set(k, Math.abs(t.width));
            });
            const totalLength = [...colMap.values()].reduce((sum, w) => sum + w, 0);

            // --- Rows: cluster by (y_start, y_end) ---
            const rowMap = new Map();
            TANK_CONFIG.forEach(t => {
                const k = `${key(t.y_start)}_${key(t.y_end)}`;
                if (!rowMap.has(k)) rowMap.set(k, Math.abs(t.height));
            });
            const totalWidth = [...rowMap.values()].reduce((sum, h) => sum + h, 0);

            return { totalLength, totalWidth, numCols: colMap.size, numRows: rowMap.size };
        }

        // Update the on-screen note: "<Barge Name> · total length X m ×
        // total width Y m (sum of all tank dimensions) · geometry source"
        function updateBargeInfoNote() {
            const note = document.getElementById('bargeInfoNote');
            if (!note) return;
            const { totalLength, totalWidth, numCols, numRows } = computeTotalTankSpan();
            note.textContent =
                `${BARGE_NAME} · total tank length ${totalLength.toFixed(1)}m (${numCols} cols) × ` +
                `total tank width ${totalWidth.toFixed(1)}m (${numRows} rows) ` +
                `· geometry linked to ${CREST_SHEET_NAME}!Q${CREST_START_ROW}:T (until blank)`;
        }

        // ---- state ----
        let isOfficeInitialized = false;
        let currentTrimDegrees = 0.0;
        let currentHeelDegrees = 0.0;
        let trailerAxles = []; // [{ name, x, y }]
        let showTrailer = true;  // new state for trailer toggle

        // tank data store (synced with config) — (re)built whenever
        // TANK_CONFIG is (re)built from CREST_301.
        let tankData = [];

        function rebuildTankDataFromConfig() {
            tankData = TANK_CONFIG.map(cfg => ({
                row: cfg.id,
                name: cfg.name,
                weight: 0,
                percent: 0.0,
                capacity: cfg.capacity,
                geometry: getTankGeometry(cfg.id)
            }));
        }

        // ============================================================
        // 1b. BUILD TANK_CONFIG FROM CREST_301 Q:T GEOMETRY ROWS
        //     geometryRows: array of { q, r, s, t } read from the sheet,
        //     in row order, already trimmed to stop at the first blank row.
        //     nameWeightRows: optional parallel array of { name, weight,
        //     percent, capacity } pulled from Load_Editor, matched by index.
        // ============================================================
        function buildTankConfigFromCrest(geometryRows, nameWeightRows) {
            const config = geometryRows.map((g, idx) => {
                const q = g.q, r = g.r, s = g.s, t = g.t;
                const width = r - q;
                const height = t - s;
                const xLoc = q + ((r - q) / 2);
                const yLoc = s + ((t - s) / 2);

                const extra = (nameWeightRows && nameWeightRows[idx]) ? nameWeightRows[idx] : null;
                const fallbackName = `TANK ${idx + 1}`;

                return {
                    id: EXCEL_START_ROW + idx,           // Load_Editor row alignment
                    crestRow: CREST_START_ROW + idx,      // source row in CREST_301
                    name: extra && extra.name ? extra.name : fallbackName,
                    // Keep x_start/x_end/y_start/y_end for backward-compat
                    // (capacity badges, color-by-capacity, etc. don't need
                    // these, but other code may read them).
                    x_start: Math.min(q, r),
                    x_end: Math.max(q, r),
                    y_start: Math.min(s, t),
                    y_end: Math.max(s, t),
                    // explicit derived geometry per the requested formulas
                    width: Math.abs(width),
                    height: Math.abs(height),
                    x: xLoc,
                    y: yLoc,
                    capacity: extra && extra.capacity ? extra.capacity : 0
                };
            });
            return config;
        }

        // ============================================================
        // 2. GEOMETRY HELPERS
        // ============================================================
        function getTankGeometry(tankId) {
            const cfg = TANK_CONFIG.find(t => t.id === tankId);
            if (!cfg) return null;
            // Prefer the explicit CREST-derived x/y/width/height if present,
            // otherwise fall back to computing from start/end pairs.
            const cx = (cfg.x !== undefined) ? cfg.x : (cfg.x_start + cfg.x_end) / 2;
            const cy = (cfg.y !== undefined) ? cfg.y : (cfg.y_start + cfg.y_end) / 2;
            const w = (cfg.width !== undefined) ? cfg.width : (cfg.x_end - cfg.x_start);
            const h = (cfg.height !== undefined) ? cfg.height : (cfg.y_end - cfg.y_start);
            return { x: cx, y: cy, width: w, height: h, capacity: cfg.capacity };
        }

        // Map tank index to visual grid column/row.
        // Adapts to however many tanks CREST_301 actually defines: lays
        // tanks out in groups of GRID_ROWS per visual column, aft-most
        // group on the left-most usable column, working toward the front.
        function getTankGridPosition(index) {
            const numGroups = Math.max(1, Math.ceil(totalTanks / GRID_ROWS));
            const colIndex = Math.floor(index / GRID_ROWS);      // 0 = first (aft) group
            const rowIndex = index % GRID_ROWS;                  // 0=top, 1=middle, 2=bottom
            // Column 1 of the grid is the quay box; tank groups occupy
            // columns 2..(1+numGroups). Group 0 (aft-most) goes in the
            // right-most tank column, working leftward toward the bow,
            // matching the original aft-on-the-left / fwd-on-the-right reading.
            const gridCol = (1 + numGroups) - colIndex;
            const gridRow = rowIndex + 1;
            return { gridCol, gridRow, excelRow: EXCEL_START_ROW + index };
        }

        // Colour based on capacity
        function getTankColor(capacity) {
            if (capacity > 250) return '#10b981';   // green - large
            if (capacity > 150) return '#38bdf8';   // blue - medium
            if (capacity > 50) return '#f59e0b';   // amber - small
            return '#94a3b8';                       // grey - void / special
        }

        // ============================================================
        // 3. RENDER TANKS
        // ============================================================
        function initTankMatrix() {
            totalTanks = TANK_CONFIG.length;
            const container = document.getElementById('tankContainer');
            container.innerHTML = '';

            // Adjust the visual grid's column template to fit however many
            // tank-groups CREST_301 actually produced (label column + one
            // column per group of up to GRID_ROWS tanks).
            const numGroups = Math.max(1, Math.ceil(totalTanks / GRID_ROWS));
            container.style.gridTemplateColumns = `90px repeat(${numGroups}, 1fr)`;

            // Quay wall
            const quayBox = document.createElement('div');
            quayBox.className = 'quay-structure-box';
            quayBox.innerHTML = `
                    <div class="quay-title">QUAY WALL</div>
                    <div class="quay-dims">L=20m · W=60m</div>
                    <div class="quay-coords-badge">X: -1.2 .. -21.2</div>
                `;
            container.appendChild(quayBox);

            // Render each tank from config (in order: col9→col1, top→bottom)
            TANK_CONFIG.forEach((cfg, index) => {
                const geo = getTankGeometry(cfg.id);
                if (!geo) return;
                const { gridCol, gridRow, excelRow } = getTankGridPosition(index);

                // find data
                const tank = tankData.find(t => t.row === cfg.id);
                const pct = tank ? tank.percent * 100 : 0;
                const pctString = pct.toFixed(0) + '%';
                const weight = tank ? tank.weight : 0;

                const box = document.createElement('div');
                box.className = 'tank-control-box';
                box.id = `tank_card_${cfg.id}`;
                box.style.gridColumn = gridCol;
                box.style.gridRow = gridRow;

                // Each card simply fills its own grid cell at 100% width and
                // the grid's row height — NO per-tank scale-by-area sizing.
                //
                // (Previously, a card's width was set as a PERCENTAGE of its
                // own grid cell, scaled against the AVERAGE width across all
                // tanks. A narrower-than-average tank — e.g. a 6.1m column
                // next to a run of 10.7m columns — would then only fill
                // ~73% of its cell, leaving real estate empty inside that
                // cell. That empty space sat right next to the normal
                // --tank-gap, so the gap AFTER that narrow column looked
                // noticeably bigger than every other gap, even though the
                // actual CSS gap value never changed. Filling every cell at
                // 100% removes that illusion — every gap you see is exactly
                // --tank-gap, nothing more. Each tank's true real-world size
                // is still shown honestly via the W×H label on the card.)
                box.style.width = '100%';
                box.style.height = '100%';

                // border colour by capacity
                const borderColor = getTankColor(cfg.capacity);
                box.style.borderColor = borderColor;
                box.style.borderWidth = '2px';

                // capacity dot
                const dot = document.createElement('span');
                dot.className = 'tank-size-indicator';
                dot.style.background = borderColor;
                box.appendChild(dot);

                box.innerHTML += `
                        <div class="tank-water-level" style="height: ${pct}%"></div>
                        <div class="tank-header">
                            <span class="tank-name">${cfg.name}</span>
                            <span class="tank-coords-badge">${geo.width.toFixed(1)}×${geo.height.toFixed(1)}m</span>
                        </div>
                        <div class="tank-inputs">
                            <div style="display:flex; justify-content:space-between; font-size:8px; color:var(--text-muted);">
                                <span>Row ${excelRow}</span>
                                <span class="tank-capacity-badge">${cfg.capacity}t</span>
                            </div>
                            <input type="number" step="any" class="weight-input"
                                   id="txt_Row${cfg.id}" value="${weight}"
                                   onchange="updateTankFill(${cfg.id}, this.value)">
                            <div class="load-percentage-label" id="lbl_Load${cfg.id}">
                                ${weight} (${pctString})
                            </div>
                        </div>
                    `;
                container.appendChild(box);
            });
        }

        // ============================================================
        // 4. ATTITUDE CANVASES
        // ============================================================
        function drawAttitudeGraphics() {
            const isLight = document.body.classList.contains('light-theme');
            const hullColor = isLight ? '#0284c7' : '#38bdf8';
            const waterlineColor = '#10b981';
            const textColor = isLight ? '#0f172a' : '#94a3b8';

            // Trim
            const trimCanvas = document.getElementById('trimCanvas');
            if (trimCanvas) {
                const ctx = trimCanvas.getContext('2d');
                ctx.clearRect(0, 0, trimCanvas.width, trimCanvas.height);
                ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
                ctx.fillRect(0, 55, trimCanvas.width, 55);
                ctx.strokeStyle = waterlineColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(10, 55);
                ctx.lineTo(310, 55);
                ctx.stroke();
                ctx.save();
                ctx.translate(160, 55);
                const trimRad = (currentTrimDegrees * Math.PI / 180) * -1;
                ctx.rotate(trimRad);
                ctx.strokeStyle = hullColor;
                ctx.lineWidth = 3;
                ctx.fillStyle = isLight ? '#cbd5e1' : '#1e293b';
                ctx.beginPath();
                ctx.rect(-100, -15, 200, 30);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.font = 'bold 9px sans-serif';
                ctx.fillText("AFT", -90, -4);
                ctx.fillText("FWD", 70, -4);
                ctx.restore();
                let trimText = `${Math.abs(currentTrimDegrees).toFixed(2)}° `;
                if (currentTrimDegrees > 0) trimText += "AFT TRIM";
                else if (currentTrimDegrees < 0) trimText += "FWD TRIM";
                else trimText += "EVEN KEEL";
                document.getElementById('lbl_TrimValue').textContent = trimText;
            }

            // Heel
            const heelCanvas = document.getElementById('heelCanvas');
            if (heelCanvas) {
                const ctx = heelCanvas.getContext('2d');
                ctx.clearRect(0, 0, heelCanvas.width, heelCanvas.height);
                ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
                ctx.fillRect(0, 55, heelCanvas.width, 55);
                ctx.strokeStyle = waterlineColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(10, 55);
                ctx.lineTo(310, 55);
                ctx.stroke();
                ctx.save();
                ctx.translate(160, 55);
                const heelRad = (currentHeelDegrees * Math.PI / 180) * -1;
                ctx.rotate(heelRad);
                ctx.strokeStyle = hullColor;
                ctx.lineWidth = 3;
                ctx.fillStyle = isLight ? '#cbd5e1' : '#1e293b';
                ctx.beginPath();
                ctx.rect(-70, -18, 140, 36);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.font = 'bold 9px sans-serif';
                ctx.fillText("PORT (P)", -62, -4);
                ctx.fillText("STBD (S)", 18, -4);
                ctx.restore();
                let heelText = `${Math.abs(currentHeelDegrees).toFixed(2)}° `;
                if (currentHeelDegrees > 0) heelText += "PORT HEEL";
                else if (currentHeelDegrees < 0) heelText += "STBD HEEL";
                else heelText += "UPRIGHT";
                document.getElementById('lbl_HeelValue').textContent = heelText;
            }
        }

        // ============================================================
        // 4b. TRAILER AXLE OVERLAY — drawn on top of the tank grid, in the
        //     SAME real-world coordinate space (meters) as the tanks.
        //     Respects showTrailer flag.
        // ============================================================
        function drawAxleOverlay() {
            const wrap = document.getElementById('tankGridWrap');
            const gridEl = document.getElementById('tankContainer');
            const canvas = document.getElementById('axleOverlayCanvas');
            if (!wrap || !gridEl || !canvas) return;

            // Match the overlay canvas to the tank grid's actual rendered box
            const rect = gridEl.getBoundingClientRect();
            const wrapRect = wrap.getBoundingClientRect();
            const cssW = rect.width;
            const cssH = rect.height;
            if (cssW === 0 || cssH === 0) return; // not laid out yet (e.g. hidden tab)

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = cssW + 'px';
            canvas.style.height = cssH + 'px';
            canvas.style.left = (rect.left - wrapRect.left) + 'px';
            canvas.style.top = (rect.top - wrapRect.top) + 'px';
            canvas.width = cssW * dpr;
            canvas.height = cssH * dpr;

            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, cssW, cssH);

            // if trailer overlay is hidden, just return (canvas cleared)
            if (!showTrailer) return;

            // Tank grid layout constants (must match .tank-grid CSS):
            // 90px label column, then 9 equal 1fr tank columns, gap read
            // live from --tank-gap so this stays correct if that's tuned.
            const labelColPx = 90;
            const gapPx = parseFloat(
                getComputedStyle(gridEl).getPropertyValue('--tank-gap')
            ) || 15;
            const plottableW = cssW - labelColPx - gapPx;

            // World X spans the full barge length (BARGE_X_MIN..BARGE_X_MAX),
            // mapped left(AFT)->right(FWD) across the 9 tank columns, matching
            // the existing visual order (aft tanks on the left).
            // World Y spans the full barge beam (BARGE_Y_MIN..BARGE_Y_MAX),
            // mapped top(PORT, +)->bottom(STBD, -) across the full grid height.
            function worldToScreen(x, y) {
                const xFrac = (x - BARGE_X_MIN) / (BARGE_X_MAX - BARGE_X_MIN);
                const sx = labelColPx + gapPx + xFrac * plottableW;
                const yFrac = (BARGE_Y_MAX - y) / (BARGE_Y_MAX - BARGE_Y_MIN);
                const sy = yFrac * cssH;
                return { sx, sy };
            }

            const isLight = document.body.classList.contains('light-theme');

            // Pixel-per-meter scale, independent per axis (X and Y tracks are
            // sized differently), so the axle footprint reads at true scale.
            const scaleX = plottableW / (BARGE_X_MAX - BARGE_X_MIN);
            const scaleY = cssH / (BARGE_Y_MAX - BARGE_Y_MIN);

            const halfW = Math.max((AXLE_WIDTH_X / 2) * scaleX, 3);
            const halfH = Math.max((AXLE_HEIGHT_Y / 2) * scaleY, 3);

            trailerAxles.forEach((axle) => {
                const p = worldToScreen(axle.x, axle.y);
                const x0 = p.sx - halfW;
                const y0 = p.sy - halfH;
                const w = halfW * 2;
                const h = halfH * 2;

                // Fill/border driven by AXLE_STYLE above — edit those
                // constants to change colour, transparency, or border.
                ctx.save();
                ctx.fillStyle = isLight
                    ? `rgba(${AXLE_STYLE.fillColorLight},${AXLE_STYLE.fillOpacityLight})`
                    : `rgba(${AXLE_STYLE.fillColorDark},${AXLE_STYLE.fillOpacityDark})`;
                ctx.strokeStyle = isLight ? AXLE_STYLE.borderColorLight : AXLE_STYLE.borderColorDark;
                ctx.lineWidth = AXLE_STYLE.borderWidth;
                ctx.beginPath();
                ctx.rect(x0, y0, w, h);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });
        }

        function refreshPlanView() {
            drawAxleOverlay();
            // Re-measure one frame later too, in case fonts/scrollbars shift
            // the grid's rendered box right after the initial paint.
            requestAnimationFrame(() => drawAxleOverlay());
        }

        // Recompute overlay alignment whenever the layout reflows
        window.addEventListener('resize', () => drawAxleOverlay());

        // ============================================================
        // 5. EXCEL SYNC (with custom tank mapping + trailer axles)
        // ============================================================
        async function pullExcelTankData() {
            if (!isOfficeInitialized) {
                generateMockSystemValues();
                return;
            }
            try {
                await Excel.run(async (context) => {
                    const crestSheet = context.workbook.worksheets.getItem(CREST_SHEET_NAME);
                    const editorSheet = context.workbook.worksheets.getItem("Load_Editor");

                    crestSheet.load("name");

                    // --- 1) Geometry source: CREST_301, Q:T, rows 30..30+N ---
                    const crestEndRow = CREST_START_ROW + CREST_MAX_ROWS - 1;
                    const rangeCrest = crestSheet.getRange(`Q${CREST_START_ROW}:T${crestEndRow}`);
                    rangeCrest.load("values");

                    const cellTrim = editorSheet.getRange("E8");
                    const cellHeel = editorSheet.getRange("E9");
                    cellTrim.load("values");
                    cellHeel.load("values");

                    // Trailer axle X/Y block: E124:F(124+N)
                    const axleEndRow = AXLE_START_ROW + AXLE_MAX_ROWS - 1;
                    const rangeAxles = editorSheet.getRange(`E${AXLE_START_ROW}:F${axleEndRow}`);
                    rangeAxles.load("values");

                    await context.sync();

                    BARGE_NAME = crestSheet.name || CREST_SHEET_NAME;
                    currentTrimDegrees = parseFloat(cellTrim.values[0][0] || 0.0);
                    currentHeelDegrees = parseFloat(cellHeel.values[0][0] || 0.0);

                    // --- Parse CREST_301 geometry rows until first fully-blank row ---
                    const crestValues = rangeCrest.values;
                    const geometryRows = [];
                    for (let i = 0; i < crestValues.length; i++) {
                        const [rawQ, rawR, rawS, rawT] = crestValues[i];
                        const allEmpty = [rawQ, rawR, rawS, rawT].every(
                            v => v === '' || v === null || v === undefined
                        );
                        if (allEmpty) break; // stop at first fully blank row
                        const q = parseFloat(rawQ), r = parseFloat(rawR);
                        const s = parseFloat(rawS), t = parseFloat(rawT);
                        if ([q, r, s, t].some(isNaN)) continue; // skip malformed row, keep scanning
                        geometryRows.push({ q, r, s, t });
                    }

                    // --- 2) Load_Editor: name/weight/percent/capacity, matched by index ---
                    let nameWeightRows = [];
                    if (geometryRows.length > 0) {
                        const editorEndRow = EXCEL_START_ROW + geometryRows.length - 1;
                        const rangeEditor = editorSheet.getRange(`B${EXCEL_START_ROW}:E${editorEndRow}`);
                        rangeEditor.load("values");
                        await context.sync();
                        const editorValues = rangeEditor.values;
                        nameWeightRows = editorValues.map(row => ({
                            name: row[0] || null,
                            weight: parseFloat(row[2] || 0),
                            percent: parseFloat(row[3] || 0),
                            capacity: parseFloat(row[1] || 0) || 0
                        }));
                    }

                    // --- 3) Build TANK_CONFIG from CREST geometry (+ Load_Editor extras) ---
                    TANK_CONFIG = buildTankConfigFromCrest(geometryRows, nameWeightRows);
                    recomputeBargeExtents();
                    rebuildTankDataFromConfig();
                    updateBargeInfoNote();

                    tankData.forEach((tank, idx) => {
                        const extra = nameWeightRows[idx];
                        if (extra) {
                            tank.weight = extra.weight.toFixed(2);
                            tank.percent = extra.percent > 1 ? extra.percent / 100 : extra.percent;
                        }
                    });

                    // Parse trailer axle rows until first blank pair (E and F both empty)
                    const axleValues = rangeAxles.values;
                    const parsedAxles = [];
                    for (let i = 0; i < axleValues.length; i++) {
                        const rawX = axleValues[i][0];
                        const rawY = axleValues[i][1];
                        const xEmpty = (rawX === '' || rawX === null || rawX === undefined);
                        const yEmpty = (rawY === '' || rawY === null || rawY === undefined);
                        if (xEmpty && yEmpty) break; // stop at first fully blank row
                        const x = parseFloat(rawX);
                        const y = parseFloat(rawY);
                        if (isNaN(x) || isNaN(y)) continue; // skip malformed row, keep scanning
                        parsedAxles.push({ row: AXLE_START_ROW + i, x, y });
                    }
                    trailerAxles = parsedAxles;

                    initTankMatrix();
                    drawAttitudeGraphics();
                    refreshPlanView();
                });
            } catch (e) {
                console.warn("Excel sync error, using mock", e);
                generateMockSystemValues();
            }
        }

        // ============================================================
        // 7. UPDATE TANK FILL (with Excel write)
        // ============================================================
        async function updateTankFill(row, value) {
            const parsed = parseFloat(value);
            if (isNaN(parsed)) return;
            const cfg = TANK_CONFIG.find(t => t.id === row);
            if (!cfg) return;
            const mockMax = cfg.capacity || 1000;
            let targetPct = Math.max(0, Math.min(parsed / mockMax, 1.0));

            const card = document.getElementById(`tank_card_${row}`);
            if (!card) return;
            const water = card.querySelector('.tank-water-level');
            const label = document.getElementById(`lbl_Load${row}`);
            if (water) water.style.height = `${targetPct * 100}%`;
            if (label) {
                const pctStr = (targetPct * 100).toFixed(0) + '%';
                label.textContent = `${parsed.toFixed(2)} (${pctStr})`;
            }

            if (!isOfficeInitialized) return;
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getItem("Load_Editor");
                    const cell = sheet.getRange(`D${row}`);
                    cell.values = [[parsed]];
                    await context.sync();
                    setTimeout(pullExcelTankData, 300);
                });
            } catch (e) { console.warn("Excel write error", e); }
        }

        // 8. THEME TOGGLE
        // ============================================================
        function toggleDashboardTheme() {
            const checked = document.getElementById('themeToggleCheckbox').checked;
            document.body.classList.toggle('light-theme', checked);
            drawAttitudeGraphics();
            drawAxleOverlay();
        }

        // ============================================================
        // 9. TRAILER OVERLAY TOGGLE (NEW)
        // ============================================================
        function toggleTrailerOverlay() {
            const checked = document.getElementById('trailerToggleCheckbox').checked;
            showTrailer = checked;
            drawAxleOverlay();  // immediately show/hide
        }

        // ============================================================
        // 10. OFFICE INIT
        // ============================================================
        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                isOfficeInitialized = true;
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: var(--accent-green);">● Excel connected</span>';
                pullExcelTankData();
                registerExcelAutoTrack();
            } else {
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: #eab308;">● Demo mode</span>';

        async function registerExcelAutoTrack() {
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getItem("Load_Editor");
                    sheet.onChanged.add(async () => { await pullExcelTankData(); });
                    await context.sync();
                });
            } catch (e) { /* ignore */ }
        }

        // initial render fallback
        window.addEventListener('load', () => {
            if (!isOfficeInitialized) generateMockSystemValues();
