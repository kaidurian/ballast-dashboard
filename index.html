<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Editor · Editable Table with Excel-like formulas</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f4f6fb;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .editor-card {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25);
            padding: 1.8rem 2rem 2.5rem;
            transition: 0.2s;
        }
        h1 {
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            color: #0b1b33;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.2rem;
            margin-bottom: 0.3rem;
        }
        .subhead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e9edf4;
            padding-bottom: 0.8rem;
        }
        .subhead small {
            color: #4a5b7a;
            background: #f0f4fe;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #dfe6f0;
            background: #ffffff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 600px;
        }
        th {
            background: #f8faff;
            color: #1f2a44;
            font-weight: 600;
            padding: 0.9rem 0.6rem;
            border-bottom: 2px solid #d6dfec;
            text-align: center;
            letter-spacing: 0.3px;
            font-size: 0.9rem;
        }
        td {
            border: 1px solid #e3eaf3;
            padding: 0;
            height: 48px;
            min-width: 80px;
            background: white;
            transition: background 0.1s;
        }
        td:focus-within {
            background: #fbfdff;
            box-shadow: inset 0 0 0 2px #2a6df4;
            z-index: 2;
            position: relative;
        }
        td .cell-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            padding: 0 12px;
            font-size: 0.95rem;
            font-weight: 450;
            color: #111c33;
            outline: none;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            letter-spacing: 0.2px;
            transition: 0.1s;
            text-align: left;
        }
        td .cell-input::placeholder {
            color: #b0bed6;
            font-weight: 300;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            opacity: 0.6;
        }
        td .cell-input:focus {
            background: #ffffff;
        }
        /* excel-style formula hint */
        .formula-bar {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            background: #f1f6fd;
            padding: 0.65rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #dce4f0;
        }
        .formula-bar span {
            font-weight: 500;
            color: #1a2b4a;
            font-size: 0.9rem;
        }
        .formula-bar code {
            background: #eef3fc;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #0047b3;
            border: 1px solid #cdddf5;
        }
        .formula-bar .example {
            color: #2c3e66;
            font-size: 0.85rem;
        }
        .footer-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }
        .btn {
            background: white;
            border: 1px solid #ccd9eb;
            padding: 0.45rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1a2b4a;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .btn-primary {
            background: #1f2f4e;
            border: 1px solid #1f2f4e;
            color: white;
            box-shadow: 0 4px 8px -4px rgba(20, 50, 100, 0.2);
        }
        .btn-primary:hover {
            background: #14223b;
            transform: scale(0.97);
        }
        .btn-outline:hover {
            background: #f2f7ff;
            border-color: #9bb1d4;
        }
        .status-badge {
            font-size: 0.8rem;
            background: #e3ecfa;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #1a3870;
        }
        @media (max-width: 650px) {
            .editor-card { padding: 1rem; }
            th, td { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="editor-card">
    <div class="subhead">
        <h1>📊 Load Editor</h1>
        <small>⚡ Excel‑like formulas · click to edit</small>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
        <table id="loadTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Tax (10%)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- rows will be injected by JS -->
            </tbody>
        </table>
    </div>

    <!-- Formula hint & status -->
    <div class="formula-bar">
        <span>📐</span>
        <code>=</code>
        <span class="example">直接输入公式，例如 <strong>=A2*B2</strong> 或 <strong>=SUM(C2:C4)</strong></span>
        <span style="margin-left: auto; display: flex; gap: 0.5rem;">
            <span class="status-badge" id="formulaStatus">就绪</span>
        </span>
    </div>

    <!-- actions -->
    <div class="footer-actions">
        <button class="btn btn-outline" id="resetBtn">↻ 重置数据</button>
        <button class="btn btn-primary" id="recalcBtn">⟳ 重新计算</button>
    </div>
</div>
<script>
    (function() {
        // ----- define initial data (Excel style) -----
        // We'll store rows as objects with id, qty, price, total, tax
        // total = qty * price   (if both numeric)
        // tax   = total * 0.10
        // but we also allow direct formula override: cells can contain formulas starting with '='
        // We'll store cell values as plain strings (or numbers) in the DOM.
        // Each td holds an input element .cell-input

        // initial raw data (numbers)
        const initialData = [
            { item: 'Laptop', qty: 3, price: 1200 },
            { item: 'Monitor', qty: 5, price: 350 },
            { item: 'Keyboard', qty: 12, price: 45 },
            { item: 'Mouse', qty: 8, price: 25 },
            { item: 'Desk', qty: 2, price: 890 }
        ];

        // helper: get all row inputs (td inputs) 
        function getTableInputs() {
            return document.querySelectorAll('#loadTable tbody td .cell-input');
        }

        // compute total and tax from qty & price (if no formula)
        function computeRowValues(qtyVal, priceVal) {
            const q = parseFloat(qtyVal);
            const p = parseFloat(priceVal);
            if (!isNaN(q) && !isNaN(p)) {
                const total = q * p;
                const tax = total * 0.10;
                return { total, tax };
            }
            return { total: NaN, tax: NaN };
        }

        // evaluate a formula string (supports: =A2*B2, =SUM(C2:C4), simple arithmetic)
        // returns evaluated number or null if error
        function evaluateFormula(formulaStr, allCells) {
            if (!formulaStr || typeof formulaStr !== 'string' || !formulaStr.startsWith('=')) return null;
            let expr = formulaStr.substring(1).trim().toUpperCase();

            // ----- replace cell references (A1, B2, C4) with actual numeric values -----
            // first, map all cell references: A1, B2, C3, D4, E5 (columns A-E, rows 1-5)
            // we have 5 columns: A (item) , B (qty), C (price), D (total), E (tax)
            // but formulas usually refer to numeric cells: B, C, D, E
            // we'll replace e.g., B2 with the numeric value from that cell.
            // We'll get all cell inputs and map by col/row
            const cellMap = new Map();
            const rows = document.querySelectorAll('#loadTable tbody tr');
            rows.forEach((row, rowIdx) => {
                const inputs = row.querySelectorAll('.cell-input');
                // column mapping: 0:A(item), 1:B(qty), 2:C(price), 3:D(total), 4:E(tax)
                inputs.forEach((input, colIdx) => {
                    const colLetter = String.fromCharCode(65 + colIdx); // A,B,C,D,E
                    const rowNum = rowIdx + 1; // 1-based
                    const ref = colLetter + rowNum;
                    let val = input.value.trim();
                    // try to parse as number
                    const num = parseFloat(val);
                    cellMap.set(ref, isNaN(num) ? 0 : num);
                });
            });

            // replace all cell references like A1, B2, C3 ... with their numeric values
            // match pattern: [A-E][1-9][0-9]? (support row up to 99)
            const refRegex = /([A-E])([1-9][0-9]?)/g;
            let match;
            let replacedExpr = expr;
            const refsFound = [];
            while ((match = refRegex.exec(expr)) !== null) {
                const fullRef = match[0];
                const colLetter = match[1];
                const rowNum = parseInt(match[2], 10);
                // validate row exists
                const rowCount = document.querySelectorAll('#loadTable tbody tr').length;
                if (rowNum >= 1 && rowNum <= rowCount) {
                    const colIdx = colLetter.charCodeAt(0) - 65; // A=0
                    if (colIdx >= 0 && colIdx <= 4) {
                        const ref = colLetter + rowNum;
                        const val = cellMap.get(ref) ?? 0;
                        // replace the reference with the numeric value (string)
                        // we need to replace only this occurrence; we'll use a function.
                        // but we have to escape special regex chars? we'll do per occurrence.
                        // simpler: replace all references with their values using a replacer function.
                        // we will rebuild using a replacer on the original expr
                    }
                }
            }

            // safer: replace all using a replacer function with the original expr
            const replaced = expr.replace(/([A-E])([1-9][0-9]?)/g, (match, colLetter, rowNum) => {
                const rowIdx = parseInt(rowNum, 10) - 1;
                const colIdx = colLetter.charCodeAt(0) - 65;
                if (rowIdx < 0 || rowIdx >= document.querySelectorAll('#loadTable tbody tr').length) return '0';
                if (colIdx < 0 || colIdx > 4) return '0';
                const row = document.querySelectorAll('#loadTable tbody tr')[rowIdx];
                if (!row) return '0';
                const inputs = row.querySelectorAll('.cell-input');
                if (colIdx >= inputs.length) return '0';
                const val = inputs[colIdx].value.trim();
                const num = parseFloat(val);
                return isNaN(num) ? '0' : num.toString();
            });

            // now we have an expression with numbers and operators
            // evaluate safely (only arithmetic, no assignment, no functions)
            // we also need to support SUM() , AVERAGE? we support SUM, AVERAGE, MIN, MAX, COUNT
            // but to keep it simple and excel-like, we'll implement SUM and basic arithmetic.
            // Actually we can evaluate using Function constructor but we must sanitize.
            // we'll implement a simple evaluator that supports + - * / ( ) and SUM, AVERAGE.
            // For safety, we'll use a lightweight approach.

            // first, handle SUM, AVERAGE, etc. We'll replace with computed values.
            // example: SUM(B2:B4) => sum of B2,B3,B4
            // we'll parse range: (B2:B4) => B2,B3,B4
            // we'll replace SUM(...) with the sum.
            function evalRangeFunction(exprWithFunc) {
                // match SUM, AVERAGE, MIN, MAX, COUNT
                const funcRegex = /(SUM|AVERAGE|MIN|MAX|COUNT)\(([A-E][1-9][0-9]?):([A-E][1-9][0-9]?)\)/gi;
                let newExpr = exprWithFunc;
                let m;
                // we need to process all occurrences
                while ((m = funcRegex.exec(exprWithFunc)) !== null) {
                    const fullMatch = m[0];
                    const funcName = m[1].toUpperCase();
                    const startRef = m[2];
                    const endRef = m[3];
                    // parse start and end row/col
                    const startCol = startRef.charAt(0);
                    const startRow = parseInt(startRef.substring(1), 10);
                    const endCol = endRef.charAt(0);
                    const endRow = parseInt(endRef.substring(1), 10);
                    const colStartIdx = startCol.charCodeAt(0) - 65;
                    const colEndIdx = endCol.charCodeAt(0) - 65;
                    const rowStart = startRow;
                    const rowEnd = endRow;
                    // collect values from cells in range (only numeric)
                    const values = [];
                    const rows = document.querySelectorAll('#loadTable tbody tr');
                    for (let r = rowStart - 1; r <= rowEnd - 1 && r < rows.length; r++) {
                        const row = rows[r];
                        if (!row) continue;
                        const inputs = row.querySelectorAll('.cell-input');
                        for (let c = Math.min(colStartIdx, colEndIdx); c <= Math.max(colStartIdx, colEndIdx); c++) {
                            if (c >= inputs.length) continue;
                            const val = inputs[c].value.trim();
                            const num = parseFloat(val);
                            if (!isNaN(num)) values.push(num);
                        }
                    }
                    let result = 0;
                    if (funcName === 'SUM') result = values.reduce((a,b) => a + b, 0);
                    else if (funcName === 'AVERAGE') result = values.length ? values.reduce((a,b) => a + b, 0) / values.length : 0;
                    else if (funcName === 'MIN') result = values.length ? Math.min(...values) : 0;
                    else if (funcName === 'MAX') result = values.length ? Math.max(...values) : 0;
                    else if (funcName === 'COUNT') result = values.length;
                    // replace the fullMatch with the result in newExpr
                    newExpr = newExpr.replace(fullMatch, result.toString());
                }
                return newExpr;
            }

            // first replace SUM/AVERAGE etc.
            let evalExpr = evalRangeFunction(replaced);

            // now we have a simple arithmetic expression with numbers and operators
            // we'll evaluate using Function constructor but we must ensure only safe chars
            // allow: 0-9 . + - * / ( ) space
            const safe = evalExpr.replace(/[^0-9+\-*/().]/g, '');
            if (!safe.trim()) return 0;
            try {
                const result = new Function(`return (${safe})`)();
                if (typeof result === 'number' && !isNaN(result)) return result;
                return null;
            } catch (e) {
                return null;
            }
        }

        // update all rows: compute total & tax from qty & price, but only if no formula present in total or tax cells
        function recalcAll() {
            const rows = document.querySelectorAll('#loadTable tbody tr');
            rows.forEach((row, index) => {
                const inputs = row.querySelectorAll('.cell-input');
                // inputs: [item, qty, price, total, tax]
                if (inputs.length < 5) return;
                const qtyInput = inputs[1];
                const priceInput = inputs[2];
                const totalInput = inputs[3];
                const taxInput = inputs[4];

                // if total cell starts with '=', evaluate formula
                let totalVal = totalInput.value.trim();
                let taxVal = taxInput.value.trim();

                // if total has formula, evaluate it
                if (totalVal.startsWith('=')) {
                    const result = evaluateFormula(totalVal, null);
                    if (result !== null && !isNaN(result)) {
                        totalInput.value = result;
                    } else {
                        // keep as is? we set to error indicator? we keep as string.
                    }
                } else {
                    // else compute from qty*price
                    const q = parseFloat(qtyInput.value);
                    const p = parseFloat(priceInput.value);
                    if (!isNaN(q) && !isNaN(p)) {
                        const total = q * p;
                        totalInput.value = total;
                    } else {
                        // if qty or price not numeric, leave total as is
                    }
                }

                // tax: if tax has formula, evaluate
                if (taxVal.startsWith('=')) {
                    const result = evaluateFormula(taxVal, null);
                    if (result !== null && !isNaN(result)) {
                        taxInput.value = result;
                    }
                } else {
                    // compute tax from total (if total numeric)
                    const totalNum = parseFloat(totalInput.value);
                    if (!isNaN(totalNum)) {
                        taxInput.value = totalNum * 0.10;
                    } else {
                        // leave as is
                    }
                }
            });
            // update status
            document.getElementById('formulaStatus').innerText = '✅ 已更新';
        }

        // build table from initialData
        function buildTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach((row, idx) => {
                const tr = document.createElement('tr');
                // item
                const itemTd = document.createElement('td');
                const itemInput = document.createElement('input');
                itemInput.type = 'text';
                itemInput.className = 'cell-input';
                itemInput.value = row.item;
                itemInput.placeholder = 'item';
                itemTd.appendChild(itemInput);
                // qty
                const qtyTd = document.createElement('td');
                const qtyInput = document.createElement('input');
                qtyInput.type = 'text';
                qtyInput.className = 'cell-input';
                qtyInput.value = row.qty;
                qtyInput.placeholder = 'qty';
                qtyTd.appendChild(qtyInput);
                // price
                const priceTd = document.createElement('td');
                const priceInput = document.createElement('input');
                priceInput.type = 'text';
                priceInput.className = 'cell-input';
                priceInput.value = row.price;
                priceInput.placeholder = 'price';
                priceTd.appendChild(priceInput);
                // total
                const totalTd = document.createElement('td');
                const totalInput = document.createElement('input');
                totalInput.type = 'text';
                totalInput.className = 'cell-input';
                totalInput.placeholder = '=formula';
                totalTd.appendChild(totalInput);
                // tax
                const taxTd = document.createElement('td');
                const taxInput = document.createElement('input');
                taxInput.type = 'text';
                taxInput.className = 'cell-input';
                taxInput.placeholder = '=formula';
                taxTd.appendChild(taxInput);

                tr.appendChild(itemTd);
                tr.appendChild(qtyTd);
                tr.appendChild(priceTd);
                tr.appendChild(totalTd);
                tr.appendChild(taxTd);
                tbody.appendChild(tr);
            });
            // initial recalc
            recalcAll();
        }

        // reset to initial data (clear formulas)
        function resetData() {
            const rows = document.querySelectorAll('#loadTable tbody tr');
            rows.forEach((row, idx) => {
                if (idx >= initialData.length) return;
                const inputs = row.querySelectorAll('.cell-input');
                if (inputs.length < 5) return;
                inputs[0].value = initialData[idx].item;
                inputs[1].value = initialData[idx].qty;
                inputs[2].value = initialData[idx].price;
                inputs[3].value = '';   // clear total
                inputs[4].value = '';   // clear tax
            });
            recalcAll();
            document.getElementById('formulaStatus').innerText = '↻ 重置完成';
        }

        // initial build
        buildTable(initialData);

        // event listeners: recalc on blur
        document.addEventListener('blur', function(e) {
            if (e.target.classList && e.target.classList.contains('cell-input')) {
                // if user types a formula, we recalc all
                const val = e.target.value.trim();
                if (val.startsWith('=')) {
                    recalcAll();
                } else {
                    // also recalc on any change (qty/price)
                    recalcAll();
                }
            }
        }, true);

        // recalc button
        document.getElementById('recalcBtn').addEventListener('click', function() {
            recalcAll();
            document.getElementById('formulaStatus').innerText = '⟳ 重新计算';
        });

        // reset button
        document.getElementById('resetBtn').addEventListener('click', function() {
            resetData();
        });

        // additional: recalc on input (but we use blur to avoid excessive)
        // also catch formula on enter
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.classList && e.target.classList.contains('cell-input')) {
                recalcAll();
            }
        });

        window.recalcAll = recalcAll; // for debugging

        console.log('✅ Load Editor ready — 输入 =A2*B2 或 =SUM(C2:C4)');
    })();
</script>
</body>
</html>
