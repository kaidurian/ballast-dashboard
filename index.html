<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barge Ballast · Custom Tank Dimensions</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161d26;
            --panel-border: #242f41;
            --tank-box-bg: #1c2532;
            --input-bg: rgba(15,20,28,0.9);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --tank-water: rgba(56,189,248,0.25);
            --tank-water-solid: #38bdf8;
            --quay-bg: #2d3748;
            --quay-border: #4a5568;
            --quay-text: #cbd5e1;
            --tank-gap: 15px;
            --label-bg: rgba(15,20,28,0.7);
            --label-border: #38bdf8;
        }

        body.light-theme {
            --bg-dark: #f1f5f9;
            --panel-bg: #ffffff;
            --panel-border: #cbd5e1;
            --tank-box-bg: #f8fafc;
            --input-bg: rgba(255,255,255,0.95);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --accent-green: #16a34a;
            --tank-water: rgba(2,132,199,0.15);
            --tank-water-solid: #0284c7;
            --quay-bg: #e2e8f0;
            --quay-border: #cbd5e1;
            --quay-text: #475569;
            --label-bg: rgba(255,255,255,0.8);
            --label-border: #0284c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Calibri','Segoe UI',sans-serif;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--panel-border);
            flex-wrap: wrap;
            gap: 6px;
        }

            header h1 {
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.3px;
                color: var(--text-main);
                opacity: 0.9;
            }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .theme-toggle-container, .toggle-container {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #242f41;
            transition: .3s;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 10px;
                width: 10px;
                left: 3px;
                bottom: 3px;
                background-color: #38bdf8;
                transition: .3s;
                border-radius: 50%;
            }

        input:checked + .slider {
            background-color: #cbd5e1;
        }

            input:checked + .slider:before {
                transform: translateX(16px);
                background-color: #0284c7;
            }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .attitude-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .attitude-display-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-around;
        }

        .visual-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.1);
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
            flex: 1;
            min-width: 200px;
        }

        .visual-title {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .attitude-value-badge {
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-green);
            background: rgba(0,0,0,0.2);
            padding: 1px 6px;
            border-radius: 3px;
            margin-bottom: 4px;
            font-family: monospace;
        }

        .attitude-canvas {
            background: #0b0f19;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
            width: 100%;
            height: auto;
            max-width: 260px;
            aspect-ratio: 260/80;
        }

        .tank-grid-wrap {
            position: relative;
            min-width: 900px;
        }

        .axle-overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 20;
        }

        .tank-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-x: auto;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-muted);
            border-left: 3px solid var(--accent-blue);
            padding-left: 6px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tank-grid {
            position: relative;
            min-width: 900px;
            min-height: 280px;
            padding-right: 5px;
        }

        .quay-structure-box {
            position: absolute;
            background: var(--quay-bg);
            border: 2px dashed var(--quay-border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .quay-title {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--quay-text);
        }

        .barge-corner-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-main);
            background: var(--label-bg);
            border: 1px solid var(--label-border);
            padding: 1px 5px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 15;
            pointer-events: none;
        }

        .barge-end-label {
            position: absolute;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-muted);
            white-space: nowrap;
            z-index: 15;
            pointer-events: none;
            background: var(--label-bg);
            padding: 1px 4px;
            border-radius: 2px;
        }

        .tank-control-box {
            position: absolute;
            background: var(--tank-box-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2px 3px;
            overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

            .tank-control-box:hover {
                z-index: 10;
                box-shadow: 0 0 20px rgba(56,189,248,0.2);
            }

        .tank-water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--tank-water);
            border-top: 2px solid var(--tank-water-solid);
            z-index: 1;
            transition: height 0.4s ease-out;
        }

        .tank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
            gap: 1px;
            min-width: 0;
        }

        .tank-name {
            font-size: 8px;
            font-weight: bold;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            max-width: 50px;
        }

        .tank-coords-badge {
            font-size: 7px;
            background: rgba(0,0,0,0.3);
            padding: 0px 3px;
            border-radius: 2px;
            color: var(--accent-blue);
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .tank-inputs {
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .weight-input {
            width: 100%;
            min-width: 0;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            text-align: center;
            font-size: 9px;
            padding: 0px 0;
            border-radius: 3px;
            height: 16px;
        }

            .weight-input:focus {
                outline: none;
                border-color: var(--accent-blue);
            }

        .load-percentage-label {
            font-size: 7px;
            text-align: center;
            color: var(--accent-blue);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .tank-capacity-badge {
            font-size: 7px;
            background: rgba(0,0,0,0.4);
            padding: 0px 3px;
            border-radius: 2px;
            color: var(--accent-green);
            font-family: monospace;
        }

        .sync-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--accent-blue);
            padding: 1px 8px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: 0.2s;
        }

            .sync-btn:hover {
                background: rgba(56,189,248,0.1);
            }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 2px;
        }

        @media (max-width: 700px) {
            .tank-grid {
                min-width: 700px;
            }
        }

        .coords-note {
            font-size: 9px;
            color: var(--text-muted);
            padding: 2px 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            display: inline-block;
            margin-left: 6px;
        }

        .excel-row-badge {
            font-size: 7px;
            background: rgba(0,0,0,0.3);
            padding: 0px 3px;
            border-radius: 2px;
            color: #f59e0b;
            font-family: monospace;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

            .toggle-container input {
                margin-right: 2px;
                accent-color: var(--accent-blue);
                width: 14px;
                height: 14px;
                cursor: pointer;
            }

        .barge-info-note {
            font-size: 9px;
            color: var(--text-muted);
            padding: 2px 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            display: inline-block;
        }

        .ps-sb-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--accent-blue);
            background: var(--label-bg);
            border: 1px solid var(--label-border);
            padding: 1px 5px;
            border-radius: 3px;
            position: absolute;
            z-index: 15;
            pointer-events: none;
        }

        .pump-location {
            font-size: 7px;
            color: #f59e0b;
            background: rgba(0,0,0,0.5);
            padding: 0px 3px;
            border-radius: 2px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚓ BARGE BALLAST · custom tank dims</h1>
        <div class="header-controls">
            <span class="barge-info-note" id="bargeInfoNote">Loading geometry...</span>
            <div class="theme-toggle-container">
                <span>Day</span>
                <label class="switch"><input type="checkbox" id="themeToggleCheckbox" onchange="toggleDashboardTheme()"><span class="slider"></span></label>
            </div>
            <div class="toggle-container">
                <span>🚛 Trailer</span>
                <input type="checkbox" id="trailerToggleCheckbox" checked onchange="toggleTrailerOverlay()">
            </div>
            <div class="toggle-container">
                <span>📐 Dims</span>
                <input type="checkbox" id="dimensionToggleCheckbox" checked onchange="toggleDimensionLabels()">
            </div>
            <div id="connectionStatus" style="font-size: 10px; color: var(--text-muted);">Status: <span style="color: #ef4444;">● Offline</span></div>
            <button class="sync-btn" onclick="pullExcelTankData()">↻ Sync</button>
        </div>
    </header>
    <div class="main-layout">
        <div class="tank-grid-container">
            <div class="section-title" style="justify-content: flex-end;"></div>
            <div class="tank-grid-wrap" id="tankGridWrap">
                <div class="tank-grid" id="tankContainer"></div>
                <canvas id="axleOverlayCanvas" class="axle-overlay-canvas"></canvas>
            </div>
        </div>

        <div class="attitude-panel">
            <div class="attitude-display-container">
                <div class="visual-container">
                    <div class="visual-title">Trim (longitudinal)</div>
                    <div class="attitude-value-badge" id="lbl_TrimValue">0.00°</div>
                    <canvas id="trimCanvas" class="attitude-canvas" width="260" height="80"></canvas>
                </div>
                <div class="visual-container">
                    <div class="visual-title">Heel (transverse)</div>
                    <div class="attitude-value-badge" id="lbl_HeelValue">0.00°</div>
                    <canvas id="heelCanvas" class="attitude-canvas" width="260" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script>
        // ============================================================
        // 1. CUSTOM TANK CONFIGURATION — geometry linked to CREST_301
        // ============================================================
        const CREST_SHEET_NAME = "CREST_301";
        const CREST_START_ROW = 30;
        const CREST_MAX_ROWS = 200;
        const CREST_COL_RANGE = "Q:T";

        let TANK_CONFIG = [];
        let totalTanks = 0;
        const GRID_COLS = 9;
        const GRID_ROWS = 3;
        const EXCEL_START_ROW = 14;

        const AXLE_WIDTH_X = 0.86;
        const AXLE_HEIGHT_Y = 0.945;
        const AXLE_START_ROW = 124;
        const AXLE_MAX_ROWS = 60;

        const AXLE_STYLE = {
            fillColorDark: '245,158,11',
            fillColorLight: '245,158,11',
            fillOpacityDark: 0.4,
            fillOpacityLight: 0.45,
            borderColorDark: '#fbbf24',
            borderColorLight: '#b45309',
            borderWidth: 1.5
        };

        let BARGE_X_MIN = 0;
        let BARGE_X_MAX = 113;
        let BARGE_Y_MIN = -14.5;
        let BARGE_Y_MAX = 14.5;
        let BARGE_NAME = CREST_SHEET_NAME;

        function recomputeBargeExtents() {
            if (!TANK_CONFIG.length) return;
            BARGE_X_MIN = Math.min(...TANK_CONFIG.map(t => t.x_start));
            BARGE_X_MAX = Math.max(...TANK_CONFIG.map(t => t.x_end));
            BARGE_Y_MIN = Math.min(...TANK_CONFIG.map(t => t.y_start));
            BARGE_Y_MAX = Math.max(...TANK_CONFIG.map(t => t.y_end));
        }

        function computeTotalTankSpan() {
            if (!TANK_CONFIG.length) return { totalLength: 0, totalWidth: 0, numCols: 0, numRows: 0 };
            const key = v => Math.round(v * 1000) / 1000;
            const colMap = new Map();
            TANK_CONFIG.forEach(t => {
                const k = `${key(t.x_start)}_${key(t.x_end)}`;
                if (!colMap.has(k)) colMap.set(k, Math.abs(t.width));
            });
            const totalLength = [...colMap.values()].reduce((sum, w) => sum + w, 0);
            const rowMap = new Map();
            TANK_CONFIG.forEach(t => {
                const k = `${key(t.y_start)}_${key(t.y_end)}`;
                if (!rowMap.has(k)) rowMap.set(k, Math.abs(t.height));
            });
            const totalWidth = [...rowMap.values()].reduce((sum, h) => sum + h, 0);
            return { totalLength, totalWidth, numCols: colMap.size, numRows: rowMap.size };
        }

        function updateBargeInfoNote() {
            const note = document.getElementById('bargeInfoNote');
            if (!note) return;
            const { totalLength, totalWidth, numCols, numRows } = computeTotalTankSpan();
            note.textContent =
                `${BARGE_NAME} · ${totalLength.toFixed(1)}m (${numCols} tanks) × ${totalWidth.toFixed(1)}m (${numRows} tanks)`;
        }

        let isOfficeInitialized = false;
        let currentTrimDegrees = 0.0;
        let currentHeelDegrees = 0.0;
        let trailerAxles = [];
        let showTrailer = true;
        let bargeCornerLabels = ['', '', '', '', '', ''];
        let tankData = [];

        function rebuildTankDataFromConfig() {
            tankData = TANK_CONFIG.map(cfg => ({
                row: cfg.id,
                name: cfg.name,
                weight: 0,
                percent: 0.0,
                capacity: cfg.capacity,
                geometry: getTankGeometry(cfg.id)
            }));
        }

        function buildTankConfigFromCrest(geometryRows, nameWeightRows) {
            const config = geometryRows.map((g, idx) => {
                const q = g.q, r = g.r, s = g.s, t = g.t;
                const width = r - q;
                const height = t - s;
                const xLoc = q + ((r - q) / 2);
                const yLoc = s + ((t - s) / 2);
                const extra = (nameWeightRows && nameWeightRows[idx]) ? nameWeightRows[idx] : null;
                const fallbackName = `TANK ${idx + 1}`;
                return {
                    id: EXCEL_START_ROW + idx,
                    crestRow: CREST_START_ROW + idx,
                    name: extra && extra.name ? extra.name : fallbackName,
                    x_start: Math.min(q, r),
                    x_end: Math.max(q, r),
                    y_start: Math.min(s, t),
                    y_end: Math.max(s, t),
                    width: Math.abs(width),
                    height: Math.abs(height),
                    x: xLoc,
                    y: yLoc,
                    capacity: extra && extra.capacity ? extra.capacity : 0
                };
            });
            return config;
        }

        function getTankGeometry(tankId) {
            const cfg = TANK_CONFIG.find(t => t.id === tankId);
            if (!cfg) return null;
            const cx = (cfg.x !== undefined) ? cfg.x : (cfg.x_start + cfg.x_end) / 2;
            const cy = (cfg.y !== undefined) ? cfg.y : (cfg.y_start + cfg.y_end) / 2;
            const w = (cfg.width !== undefined) ? cfg.width : (cfg.x_end - cfg.x_start);
            const h = (cfg.height !== undefined) ? cfg.height : (cfg.y_end - cfg.y_start);
            return { x: cx, y: cy, width: w, height: h, capacity: cfg.capacity };
        }

        function getTankColor(capacity) {
            if (capacity > 250) return '#10b981';
            if (capacity > 150) return '#38bdf8';
            if (capacity > 50) return '#f59e0b';
            return '#94a3b8';
        }

        const PLAN_PX_PER_METER = 8;
        const PLAN_MARGIN_PX = 8;
        const QUAY_X_START = -21.2;
        const QUAY_X_END = -1.2;

        function sizeTankPlanView() {
            const container = document.getElementById('tankContainer');
            if (!container || !TANK_CONFIG.length) return;
            const worldW = (BARGE_X_MAX - BARGE_X_MIN) + (QUAY_X_END - QUAY_X_START);
            const worldH = (BARGE_Y_MAX - BARGE_Y_MIN);
            const pxW = Math.max(700, Math.round(worldW * PLAN_PX_PER_METER) + PLAN_MARGIN_PX * 2);
            const pxH = Math.max(240, Math.round(worldH * PLAN_PX_PER_METER) + PLAN_MARGIN_PX * 2);
            container.style.width = pxW + 'px';
            container.style.height = pxH + 'px';
        }

        function worldToScreen(x, y) {
            const container = document.getElementById('tankContainer');
            const cssW = container ? container.clientWidth : 900;
            const cssH = container ? container.clientHeight : 280;
            const worldXMin = QUAY_X_START;
            const worldXMax = BARGE_X_MAX;
            const worldW = worldXMax - worldXMin;
            const plottableW = cssW - PLAN_MARGIN_PX * 2;
            const plottableH = cssH - PLAN_MARGIN_PX * 2;
            const xFrac = (x - worldXMin) / worldW;
            const sx = PLAN_MARGIN_PX + xFrac * plottableW;
            const yFrac = (BARGE_Y_MAX - y) / (BARGE_Y_MAX - BARGE_Y_MIN);
            const sy = PLAN_MARGIN_PX + yFrac * plottableH;
            return { sx, sy };
        }

        function getPlanScale() {
            const container = document.getElementById('tankContainer');
            const cssW = container ? container.clientWidth : 900;
            const cssH = container ? container.clientHeight : 280;
            const worldW = BARGE_X_MAX - QUAY_X_START;
            const plottableW = cssW - PLAN_MARGIN_PX * 2;
            const plottableH = cssH - PLAN_MARGIN_PX * 2;
            return {
                scaleX: plottableW / worldW,
                scaleY: plottableH / (BARGE_Y_MAX - BARGE_Y_MIN)
            };
        }

        function renderBargeOutline(container) {
            const old = container.querySelector('.barge-outline-svg');
            if (old) old.remove();

            const tl = worldToScreen(BARGE_X_MIN, BARGE_Y_MAX);
            const br = worldToScreen(BARGE_X_MAX, BARGE_Y_MIN);
            const left = tl.sx, top = tl.sy, right = br.sx, bottom = br.sy;
            const w = right - left, h = bottom - top;
            if (w <= 0 || h <= 0) return;

            const bowTaper = w * 0.10;
            const sternCut = w * 0.09;
            const sternRound = h * 0.18;

            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('class', 'barge-outline-svg');
            svg.setAttribute('width', w);
            svg.setAttribute('height', h);
            svg.style.position = 'absolute';
            svg.style.left = left + 'px';
            svg.style.top = top + 'px';
            svg.style.zIndex = '0';

                const excelRow = EXCEL_START_ROW + index;

                const pct = tank ? tank.percent * 100 : 0;
                const pctString = pct.toFixed(0) + '%';
                const weight = tank ? tank.weight : 0;

                const xStart = geo.x - geo.width / 2;
                const xEnd = geo.x + geo.width / 2;
                const yTop = geo.y + geo.height / 2;
                const yBot = geo.y - geo.height / 2;
                const topLeft = worldToScreen(xStart, yTop);
                const botRight = worldToScreen(xEnd, yBot);

                const pxLeft = topLeft.sx + inset;
                const pxTop = topLeft.sy + inset;
                const pxW = Math.max(botRight.sx - topLeft.sx - inset * 2, 20);
                const pxH = Math.max(botRight.sy - topLeft.sy - inset * 2, 14);

                box.style.top = pxTop + 'px';
                box.style.width = pxW + 'px';
                box.style.height = pxH + 'px';

                box.style.borderColor = borderColor;
                box.style.borderWidth = '1.5px';

                let shortName = cfg.name;
                if (shortName.includes('-')) {
                    const parts = shortName.split('-');

                const ctx = trimCanvas.getContext('2d');

                ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
                ctx.fillRect(0, 40, trimCanvas.width, 40);
                ctx.strokeStyle = waterlineColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(10, 40);
                ctx.lineTo(250, 40);
                ctx.stroke();
                ctx.save();
                ctx.translate(130, 40);
                const trimRad = (currentTrimDegrees * Math.PI / 180) * -1;
                ctx.rotate(trimRad);
                ctx.strokeStyle = hullColor;
                ctx.lineWidth = 2.5;
                ctx.fillStyle = isLight ? '#cbd5e1' : '#1e293b';
                ctx.beginPath();
                ctx.rect(-80, -12, 160, 24);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.font = 'bold 8px sans-serif';
                ctx.fillText("AFT", -72, -3);
                ctx.fillText("FWD", 56, -3);
                ctx.restore();
                let trimText = `${Math.abs(currentTrimDegrees).toFixed(2)}° `;

                else if (currentTrimDegrees < -0.05) trimText += "FWD TRIM";

                document.getElementById('lbl_TrimValue').textContent = trimText;

            const heelCanvas = document.getElementById('heelCanvas');

                ctx.beginPath();
                ctx.moveTo(10, 40);
                ctx.lineTo(250, 40);
                ctx.stroke();
                ctx.save();

        function drawAxleOverlay() {
            const wrap = document.getElementById('tankGridWrap');
            const gridEl = document.getElementById('tankContainer');
            const canvas = document.getElementById('axleOverlayCanvas');
            if (!wrap || !gridEl || !canvas) return;

            const rect = gridEl.getBoundingClientRect();
            const wrapRect = wrap.getBoundingClientRect();
            const cssW = rect.width;
            const cssH = rect.height;
            if (cssW === 0 || cssH === 0) return;

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = cssW + 'px';
            canvas.style.height = cssH + 'px';
            canvas.style.left = (rect.left - wrapRect.left) + 'px';
            canvas.style.top = (rect.top - wrapRect.top) + 'px';
            canvas.width = cssW * dpr;
            canvas.height = cssH * dpr;

            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, cssW, cssH);

            if (!showTrailer) return;
            if (!TANK_CONFIG.length) return;

            const isLight = document.body.classList.contains('light-theme');
            const { scaleX, scaleY } = getPlanScale();
            const halfW = Math.max((AXLE_WIDTH_X / 2) * scaleX, 2);
            const halfH = Math.max((AXLE_HEIGHT_Y / 2) * scaleY, 2);

            trailerAxles.forEach((axle) => {
                const p = worldToScreen(axle.x, axle.y);
                const x0 = p.sx - halfW;
                const y0 = p.sy - halfH;
                const w = halfW * 2;
                const h = halfH * 2;

                ctx.save();
                ctx.fillStyle = isLight
                    ? `rgba(${AXLE_STYLE.fillColorLight},${AXLE_STYLE.fillOpacityLight})`
                    : `rgba(${AXLE_STYLE.fillColorDark},${AXLE_STYLE.fillOpacityDark})`;
                ctx.strokeStyle = isLight ? AXLE_STYLE.borderColorLight : AXLE_STYLE.borderColorDark;
                ctx.lineWidth = AXLE_STYLE.borderWidth;
                ctx.beginPath();
                ctx.rect(x0, y0, w, h);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });
        }

        function refreshPlanView() {
            drawAxleOverlay();
            requestAnimationFrame(() => drawAxleOverlay());
        }

        window.addEventListener('resize', () => drawAxleOverlay());

        async function pullExcelTankData() {
            if (!isOfficeInitialized) {
                generateMockSystemValues();
                return;
            }
            try {
                await Excel.run(async (context) => {
                    const crestSheet = context.workbook.worksheets.getItem(CREST_SHEET_NAME);
                    const editorSheet = context.workbook.worksheets.getItem("Load_Editor");

                    crestSheet.load("name");

                    const crestEndRow = CREST_START_ROW + CREST_MAX_ROWS - 1;
                    const rangeCrest = crestSheet.getRange(`Q${CREST_START_ROW}:T${crestEndRow}`);
                    rangeCrest.load("values");

                    const cellTrim = editorSheet.getRange("E8");
                    const cellHeel = editorSheet.getRange("E9");
                    cellTrim.load("values");
                    cellHeel.load("values");

                    const rangeCornerLabels = editorSheet.getRange("I1:I6");
                    rangeCornerLabels.load("values");

                    const axleEndRow = AXLE_START_ROW + AXLE_MAX_ROWS - 1;
                    const rangeAxles = editorSheet.getRange(`E${AXLE_START_ROW}:F${axleEndRow}`);
                    rangeAxles.load("values");

                    await context.sync();

                    BARGE_NAME = crestSheet.name || CREST_SHEET_NAME;
                    currentTrimDegrees = parseFloat(cellTrim.values[0][0] || 0.0);
                    currentHeelDegrees = parseFloat(cellHeel.values[0][0] || 0.0);
                    bargeCornerLabels = rangeCornerLabels.values.map(row => (row[0] !== null && row[0] !== undefined) ? String(row[0]) : '');

                    const crestValues = rangeCrest.values;
                    const geometryRows = [];
                    for (let i = 0; i < crestValues.length; i++) {
                        const [rawQ, rawR, rawS, rawT] = crestValues[i];
                        const allEmpty = [rawQ, rawR, rawS, rawT].every(
                            v => v === '' || v === null || v === undefined
                        );
                        if (allEmpty) break;
                        const q = parseFloat(rawQ), r = parseFloat(rawR);
                        const s = parseFloat(rawS), t = parseFloat(rawT);
                        if ([q, r, s, t].some(isNaN)) continue;
                        geometryRows.push({ q, r, s, t });
                    }

                    let nameWeightRows = [];
                    if (geometryRows.length > 0) {
                        const editorEndRow = EXCEL_START_ROW + geometryRows.length - 1;
                        const rangeEditor = editorSheet.getRange(`B${EXCEL_START_ROW}:E${editorEndRow}`);
                        rangeEditor.load("values");
                        await context.sync();
                        const editorValues = rangeEditor.values;
                        nameWeightRows = editorValues.map(row => ({
                            name: row[0] || null,
                            weight: parseFloat(row[2] || 0),
                            percent: parseFloat(row[3] || 0),
                            capacity: parseFloat(row[1] || 0) || 0
                        }));
                    }

                    TANK_CONFIG = buildTankConfigFromCrest(geometryRows, nameWeightRows);
                    recomputeBargeExtents();
                    rebuildTankDataFromConfig();
                    updateBargeInfoNote();

                    tankData.forEach((tank, idx) => {
                        const extra = nameWeightRows[idx];
                        if (extra) {
                            tank.weight = extra.weight.toFixed(2);
                            tank.percent = extra.percent > 1 ? extra.percent / 100 : extra.percent;
                        }
                    });

                    const axleValues = rangeAxles.values;
                    const parsedAxles = [];
                    for (let i = 0; i < axleValues.length; i++) {
                        const rawX = axleValues[i][0];
                        const rawY = axleValues[i][1];
                        const xEmpty = (rawX === '' || rawX === null || rawX === undefined);
                        const yEmpty = (rawY === '' || rawY === null || rawY === undefined);
                        if (xEmpty && yEmpty) break;
                        const x = parseFloat(rawX);
                        const y = parseFloat(rawY);
                        if (isNaN(x) || isNaN(y)) continue;
                        parsedAxles.push({ row: AXLE_START_ROW + i, x, y });
                    }
                    trailerAxles = parsedAxles;

                    initTankMatrix();
                    drawAttitudeGraphics();
                    refreshPlanView();
                });
            } catch (e) {
                console.warn("Excel sync error, using mock", e);
                generateMockSystemValues();
            }
        }

                "WB-01-PS.P", "WB-01-C", "WB-01-SB.S",
                "WB-02-PS.P", "WB-02-C", "WB-02-SB.S",
                "WB-03-PS.P", "WB-03-C", "WB-03-SB.S",
                "WB-04-PS.P", "WB-04-C", "WB-04-SB.S",
                "WB-05-PS.P", "WB-05-C", "WB-05-SB.S",
                "WB-06-PS.P", "WB-06-C", "WB-06-SB.S",
                "WB-07-PS.P", "WB-07-C", "WB-07-SB.S",
                "WB-08-PS.P", "WB-08-C", "WB-08-SB.S",
                "WB-09-PS.P", "WB-09-C", "WB-09-SB.S"
            ];
            const mockCapacities = [
                280, 380, 280,
                240, 320, 240,
                220, 300, 220,
                200, 270, 200,
                180, 250, 180,
                150, 210, 150,
                130, 180, 130,
                110, 150, 110,
                90, 120, 90
            ];

            const mockNameWeightRows = mockCrestRows.map((_, i) => ({
                name: mockNames[i] || `TANK ${i + 1}`,
                weight: 0,
                percent: 0,
                capacity: mockCapacities[i] || 0
            }));

            BARGE_NAME = CREST_SHEET_NAME;
            bargeCornerLabels = ['Label1', 'Label2', 'Label3', 'Label4', 'Label5', 'Label6'];
            TANK_CONFIG = buildTankConfigFromCrest(mockCrestRows, mockNameWeightRows);
            recomputeBargeExtents();
            rebuildTankDataFromConfig();
            updateBargeInfoNote();

            tankData.forEach((tank, i) => {
                const base = 60 + (i * 7);
                tank.weight = (base + (i % 5) * 1.8).toFixed(2);
                tank.percent = Math.min(0.10 + (i * 0.025), 0.90);
            });
            currentTrimDegrees = 2.8;
            currentHeelDegrees = -1.9;

            trailerAxles = [
                { row: AXLE_START_ROW, x: 30, y: 3.2 },
                { row: AXLE_START_ROW + 1, x: 30, y: -3.2 },
                { row: AXLE_START_ROW + 2, x: 45, y: 3.2 },
                { row: AXLE_START_ROW + 3, x: 45, y: -3.2 },
                { row: AXLE_START_ROW + 4, x: 60, y: 3.2 },
                { row: AXLE_START_ROW + 5, x: 60, y: -3.2 }
            ];

            initTankMatrix();
            drawAttitudeGraphics();
            refreshPlanView();
            document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: #eab308;">● Mock (no Excel)</span>';
        }

        async function updateTankFill(row, value) {
            const parsed = parseFloat(value);
            if (isNaN(parsed)) return;
            const cfg = TANK_CONFIG.find(t => t.id === row);
            if (!cfg) return;
            const mockMax = cfg.capacity || 1000;
            let targetPct = Math.max(0, Math.min(parsed / mockMax, 1.0));

            const card = document.getElementById(`tank_card_${row}`);
            if (!card) return;
            const water = card.querySelector('.tank-water-level');
            const label = document.getElementById(`lbl_Load${row}`);
            if (water) {
                water.style.height = `${targetPct * 100}%`;
                if (targetPct >= 0.85) {
                    water.style.background = 'rgba(255,165,0,0.3)';
                    water.style.borderTopColor = '#ff8c00';
                } else {
                    water.style.background = 'var(--tank-water)';
                    water.style.borderTopColor = 'var(--tank-water-solid)';
                }
            }
            if (label) {
                const pctStr = (targetPct * 100).toFixed(0) + '%';
                const capLabel = cfg.capacity ? `3%(Cap.${cfg.capacity.toFixed(2)}t)` : '';
                label.textContent = `${capLabel} ${pctStr}`;
            }

            if (!isOfficeInitialized) return;
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getItem("Load_Editor");
                    const cell = sheet.getRange(`D${row}`);
                    cell.values = [[parsed]];
                    await context.sync();
                    setTimeout(pullExcelTankData, 300);
                });
            } catch (e) { console.warn("Excel write error", e); }
        }

        function toggleDashboardTheme() {
            const checked = document.getElementById('themeToggleCheckbox').checked;
            document.body.classList.toggle('light-theme', checked);
            drawAttitudeGraphics();
            drawAxleOverlay();
            // Re-render labels to match theme
            const container = document.getElementById('tankContainer');
            if (container) {
                renderBargeCornerLabels(container);
                renderPSLabels(container);
            }
        }

        function toggleTrailerOverlay() {
            const checked = document.getElementById('trailerToggleCheckbox').checked;
            showTrailer = checked;
            drawAxleOverlay();
        }

        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                isOfficeInitialized = true;
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: var(--accent-green);">● Excel connected</span>';
                pullExcelTankData();
                registerExcelAutoTrack();
            } else {
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: #eab308;">● Demo mode</span>';
                generateMockSystemValues();
            }
        });

        async function registerExcelAutoTrack() {
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getItem("Load_Editor");
                    sheet.onChanged.add(async () => { await pullExcelTankData(); });
                    await context.sync();
                });
            } catch (e) { /* ignore */ }
        }

        window.addEventListener('load', () => {
            if (!isOfficeInitialized) generateMockSystemValues();
        });
    </script>
</body>
</html>
