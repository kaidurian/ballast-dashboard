<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barge Ballast · Custom Tank Dimensions</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161d26;
            --panel-border: #242f41;
            --tank-box-bg: #1c2532;
            --input-bg: rgba(15,20,28,0.9);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --tank-water: rgba(56,189,248,0.25);
            --tank-water-solid: #38bdf8;
            --quay-bg: #2d3748;
            --quay-border: #4a5568;
            --quay-text: #cbd5e1;
            --tank-gap: 15px;
        }

        body.light-theme {
            --bg-dark: #f1f5f9;
            --panel-bg: #ffffff;
            --panel-border: #cbd5e1;
            --tank-box-bg: #f8fafc;
            --input-bg: rgba(255,255,255,0.95);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --accent-green: #16a34a;
            --tank-water: rgba(2,132,199,0.15);
            --tank-water-solid: #0284c7;
            --quay-bg: #e2e8f0;
            --quay-border: #cbd5e1;
            --quay-text: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Calibri','Segoe UI',sans-serif;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--panel-border);
            flex-wrap: wrap;
            gap: 8px;
        }

            header h1 {
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 0.5px;
                color: var(--text-main);
            }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .theme-toggle-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #242f41;
            transition: .3s;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 10px;
                width: 10px;
                left: 3px;
                bottom: 3px;
                background-color: #38bdf8;
                transition: .3s;
                border-radius: 50%;
            }

        input:checked + .slider {
            background-color: #cbd5e1;
        }

            input:checked + .slider:before {
                transform: translateX(16px);
                background-color: #0284c7;
            }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .attitude-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .attitude-display-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-around;
        }

        .visual-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.15);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            flex: 1;
            min-width: 200px;
        }

        .visual-title {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .attitude-value-badge {
            font-size: 12px;
            font-weight: bold;
            color: var(--accent-green);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-family: monospace;
        }

        .attitude-canvas {
            background: #0b0f19;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
            width: 100%;
            height: auto;
            max-width: 280px;
            aspect-ratio: 280/90;
        }

        .tank-grid-wrap {
            position: relative;
            min-width: 900px;
        }

        .axle-overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 20;
        }

        .tank-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-x: auto;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-left: 3px solid var(--accent-blue);
            padding-left: 8px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tank-grid {
            position: relative;
            min-width: 900px;
            min-height: 260px;
            padding-right: 5px;
        }

        .quay-structure-box {
            position: absolute;
            background: var(--quay-bg);
            border: 2px dashed var(--quay-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .quay-title {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--quay-text);
        }

        .barge-corner-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-main);
            background: rgba(0,0,0,0.4);
            padding: 1px 5px;
            border-radius: 3px;
            white-space: nowrap;
            z-index: 15;
            pointer-events: none;
        }

        .barge-end-label {
            position: absolute;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-muted);
            white-space: nowrap;
            z-index: 15;
            pointer-events: none;
        }

        .tank-control-box {
            position: absolute;
            background: var(--tank-box-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2px 3px;
            overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

            .tank-control-box:hover {
                z-index: 10;
                box-shadow: 0 0 20px rgba(56,189,248,0.2);
            }

        .tank-water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--tank-water);
            border-top: 2px solid var(--tank-water-solid);
            z-index: 1;
            transition: height 0.4s ease-out;
        }

        .tank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
            gap: 1px;
            min-width: 0;
        }

        .tank-name {
            font-size: 8px;
            font-weight: bold;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .tank-coords-badge {
            font-size: 7px;
            background: rgba(0,0,0,0.35);
            padding: 1px 3px;
            border-radius: 2px;
            color: var(--accent-blue);
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .tank-inputs {
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .weight-input {
            width: 100%;
            min-width: 0;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            text-align: center;
            font-size: 9px;
            padding: 0px;
            border-radius: 3px;
        }

            .weight-input:focus {
                outline: none;
                border-color: var(--accent-blue);
            }

        .load-percentage-label {
            font-size: 7px;
            text-align: center;
            color: var(--accent-blue);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sync-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--accent-blue);
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

            .sync-btn:hover {
                background: rgba(56,189,248,0.1);
            }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 3px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

            .toggle-container input {
                margin-right: 2px;
                accent-color: var(--accent-blue);
                width: 14px;
                height: 14px;
                cursor: pointer;
            }

        .trim-heel-label {
            font-size: 9px;
            font-weight: bold;
            color: var(--accent-green);
            background: rgba(0,0,0,0.25);
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 6px;
            font-family: monospace;
        }

        .barge-info-note {
            font-size: 9px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.15);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚓ BARGE BALLAST · custom tank dimensions</h1>
        <div class="header-controls">
            <span class="barge-info-note" id="bargeInfoNote">CREST_301 · 113.0m × 29.0m (9 tanks × 24 tanks)</span>
            <div class="theme-toggle-container">
                <span>Day</span>
                <label class="switch"><input type="checkbox" id="themeToggleCheckbox" onchange="toggleDashboardTheme()"><span class="slider"></span></label>
            </div>
            <div class="toggle-container">
                <span>🚛 Trailer</span>
                <input type="checkbox" id="trailerToggleCheckbox" checked onchange="toggleTrailerOverlay()">
            </div>
            <div id="connectionStatus" style="font-size: 10px; color: var(--text-muted);">Status: <span style="color: #ef4444;">● Offline</span></div>
            <button class="sync-btn" onclick="pullExcelTankData()">↻ Sync</button>
        </div>
    </header>
    <div class="main-layout">
        <div class="tank-grid-container">
            <div class="section-title">
                <span class="toggle-container">
                    <span>📐 Dimensions</span>
                    <input type="checkbox" id="dimensionToggleCheckbox" checked onchange="toggleDimensionLabels()">
                </span>
            </div>
            <div class="tank-grid-wrap" id="tankGridWrap">
                <div class="tank-grid" id="tankContainer"></div>
                <canvas id="axleOverlayCanvas" class="axle-overlay-canvas"></canvas>
            </div>
        </div>

        <div class="attitude-panel">
            <div class="attitude-display-container">
                <div class="visual-container">
                    <div class="visual-title">Trim (longitudinal)</div>
                    <div class="attitude-value-badge" id="lbl_TrimValue">0.00° EVEN KEEL</div>
                    <canvas id="trimCanvas" class="attitude-canvas" width="280" height="90"></canvas>
                </div>
                <div class="visual-container">
                    <div class="visual-title">Heel (transverse)</div>
                    <div class="attitude-value-badge" id="lbl_HeelValue">0.00° UPRIGHT</div>
                    <canvas id="heelCanvas" class="attitude-canvas" width="280" height="90"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script>
        // ============================================================
        // CONFIGURATION & STATE
        // ============================================================
        const CREST_SHEET_NAME = "CREST_301";
        const CREST_START_ROW = 30;
        const CREST_MAX_ROWS = 200;
        const EXCEL_START_ROW = 14;
        const AXLE_START_ROW = 124;
        const AXLE_MAX_ROWS = 60;
        const PLAN_PX_PER_METER = 8;
        const PLAN_MARGIN_PX = 10;
        const QUAY_X_START = -21.2;
        const QUAY_X_END = -1.2;

        let TANK_CONFIG = [];
        let tankData = [];
        let BARGE_X_MIN = 0, BARGE_X_MAX = 113, BARGE_Y_MIN = -14.5, BARGE_Y_MAX = 14.5;
        let BARGE_NAME = CREST_SHEET_NAME;
        let currentTrimDegrees = 0.0, currentHeelDegrees = 0.0;
        let trailerAxles = [];
        let showTrailer = true, showDimensions = true;
        let bargeCornerLabels = ['', '', '', '', '', ''];
        let isOfficeInitialized = false;

        function getTankGeometry(id) {
            const cfg = TANK_CONFIG.find(t => t.id === id);
            if (!cfg) return null;
            return { x: cfg.x, y: cfg.y, width: cfg.width, height: cfg.height, capacity: cfg.capacity };
        }

        function getTankColor(cap) {
            if (cap > 250) return '#10b981';
            if (cap > 150) return '#38bdf8';
            if (cap > 50) return '#f59e0b';
            return '#94a3b8';
        }

        function recomputeBargeExtents() {
            if (!TANK_CONFIG.length) return;
            BARGE_X_MIN = Math.min(...TANK_CONFIG.map(t => t.x_start));
            BARGE_X_MAX = Math.max(...TANK_CONFIG.map(t => t.x_end));
            BARGE_Y_MIN = Math.min(...TANK_CONFIG.map(t => t.y_start));
            BARGE_Y_MAX = Math.max(...TANK_CONFIG.map(t => t.y_end));
        }

        function computeTotalTankSpan() {
            if (!TANK_CONFIG.length) return { totalLength: 0, totalWidth: 0, numCols: 0, numRows: 0 };
            const key = v => Math.round(v * 1000) / 1000;
            const colMap = new Map(), rowMap = new Map();
            TANK_CONFIG.forEach(t => {
                const ck = `${key(t.x_start)}_${key(t.x_end)}`;
                if (!colMap.has(ck)) colMap.set(ck, Math.abs(t.width));
                const rk = `${key(t.y_start)}_${key(t.y_end)}`;
                if (!rowMap.has(rk)) rowMap.set(rk, Math.abs(t.height));
            });
            return {
                totalLength: [...colMap.values()].reduce((s, v) => s + v, 0),
                totalWidth: [...rowMap.values()].reduce((s, v) => s + v, 0),
                numCols: colMap.size,
                numRows: rowMap.size
            };
        }

        function updateBargeInfoNote() {
            const note = document.getElementById('bargeInfoNote');
            if (!note) return;
            const { totalLength, totalWidth, numCols, numRows } = computeTotalTankSpan();
            note.textContent = `${BARGE_NAME} · ${totalLength.toFixed(1)}m (${numCols} cols) × ${totalWidth.toFixed(1)}m (${numRows} rows)`;
        }

        function worldToScreen(x, y) {
            const container = document.getElementById('tankContainer');
            const cssW = container ? container.clientWidth : 900;
            const cssH = container ? container.clientHeight : 260;
            const worldXMin = QUAY_X_START;
            const worldXMax = BARGE_X_MAX;
            const worldW = worldXMax - worldXMin;
            const plottableW = cssW - PLAN_MARGIN_PX * 2;
            const plottableH = cssH - PLAN_MARGIN_PX * 2;
            const xFrac = (x - worldXMin) / worldW;
            const sx = PLAN_MARGIN_PX + xFrac * plottableW;
            const yFrac = (BARGE_Y_MAX - y) / (BARGE_Y_MAX - BARGE_Y_MIN);
            const sy = PLAN_MARGIN_PX + yFrac * plottableH;
            return { sx, sy };
        }

        function getPlanScale() {
            const container = document.getElementById('tankContainer');
            const cssW = container ? container.clientWidth : 900;
            const cssH = container ? container.clientHeight : 260;
            const worldW = BARGE_X_MAX - QUAY_X_START;
            const plottableW = cssW - PLAN_MARGIN_PX * 2;
            const plottableH = cssH - PLAN_MARGIN_PX * 2;
            return {
                scaleX: plottableW / worldW,
                scaleY: plottableH / (BARGE_Y_MAX - BARGE_Y_MIN)
            };
        }

        function sizeTankPlanView() {
            const container = document.getElementById('tankContainer');
            if (!container || !TANK_CONFIG.length) return;
            const worldW = (BARGE_X_MAX - BARGE_X_MIN) + (QUAY_X_END - QUAY_X_START);
            const worldH = (BARGE_Y_MAX - BARGE_Y_MIN);
            const pxW = Math.max(700, Math.round(worldW * PLAN_PX_PER_METER) + PLAN_MARGIN_PX * 2);
            const pxH = Math.max(220, Math.round(worldH * PLAN_PX_PER_METER) + PLAN_MARGIN_PX * 2);
            container.style.width = pxW + 'px';
            container.style.height = pxH + 'px';
        }

        function renderBargeOutline(container) {
            const old = container.querySelector('.barge-outline-svg');
            if (old) old.remove();
            const tl = worldToScreen(BARGE_X_MIN, BARGE_Y_MAX);
            const br = worldToScreen(BARGE_X_MAX, BARGE_Y_MIN);
            const left = tl.sx, top = tl.sy, right = br.sx, bottom = br.sy;
            const w = right - left, h = bottom - top;
            if (w <= 0 || h <= 0) return;
            const bowTaper = w * 0.10, sternCut = w * 0.09, sternRound = h * 0.18;
            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('class', 'barge-outline-svg');
            svg.setAttribute('width', w);
            svg.setAttribute('height', h);
            svg.style.position = 'absolute';
            svg.style.left = left + 'px';
            svg.style.top = top + 'px';
            svg.style.zIndex = '0';
            svg.style.pointerEvents = 'none';
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            const path = document.createElementNS(svgNS, 'path');
            const d = [
                `M 0 0`, `L ${w} 0`,
                `L ${w - bowTaper} ${h}`,
                `L ${sternCut + sternRound} ${h}`,
                `Q ${sternCut} ${h} ${sternCut * 0.3} ${h - sternRound * 0.8}`,
                `L 0 0`, 'Z'
            ].join(' ');
            path.setAttribute('d', d);
            path.setAttribute('fill', 'rgba(56,189,248,0.03)');
            path.setAttribute('stroke', 'var(--accent-blue)');
            path.setAttribute('stroke-width', '1.5');
            path.setAttribute('stroke-opacity', '0.5');
            svg.appendChild(path);
            container.appendChild(svg);
        }

        function renderBargeCornerLabels(container) {
            container.querySelectorAll('.barge-corner-label, .barge-end-label').forEach(el => el.remove());
            const midX = (BARGE_X_MIN + BARGE_X_MAX) / 2;
            const anchors = [
                { text: bargeCornerLabels[0], x: BARGE_X_MIN, y: BARGE_Y_MAX, h: 'left', v: 'top' },
                { text: bargeCornerLabels[1], x: midX, y: BARGE_Y_MAX, h: 'center', v: 'top' },
                { text: bargeCornerLabels[2], x: BARGE_X_MAX, y: BARGE_Y_MAX, h: 'right', v: 'top' },
                { text: bargeCornerLabels[3], x: BARGE_X_MIN, y: BARGE_Y_MIN, h: 'left', v: 'bottom' },
                { text: bargeCornerLabels[4], x: midX, y: BARGE_Y_MIN, h: 'center', v: 'bottom' },
                { text: bargeCornerLabels[5], x: BARGE_X_MAX, y: BARGE_Y_MIN, h: 'right', v: 'bottom' }
            ];
            anchors.forEach(a => {
                if (!a.text) return;
                const p = worldToScreen(a.x, a.y);
                const lbl = document.createElement('div');
                lbl.className = 'barge-corner-label';
                lbl.textContent = a.text;
                lbl.style.position = 'absolute';
                lbl.style.top = p.sy + 'px';
                lbl.style.left = p.sx + 'px';
                const pad = 3;
                if (a.h === 'left') { lbl.style.left = (p.sx + pad) + 'px'; lbl.style.textAlign = 'left'; }
                else if (a.h === 'right') { lbl.style.left = (p.sx - pad) + 'px'; lbl.style.transform = 'translateX(-100%)'; lbl.style.textAlign = 'right'; }
                else { lbl.style.transform = 'translateX(-50%)'; lbl.style.textAlign = 'center'; }
                if (a.v === 'top') { lbl.style.top = (p.sy + pad) + 'px'; }
                else { lbl.style.top = (p.sy - pad) + 'px'; lbl.style.transform += ' translateY(-100%)'; }
                container.appendChild(lbl);
            });
            // AFT / FWD
            const aftP = worldToScreen(BARGE_X_MIN, (BARGE_Y_MIN + BARGE_Y_MAX) / 2);
            const fwdP = worldToScreen(BARGE_X_MAX, (BARGE_Y_MIN + BARGE_Y_MAX) / 2);
            ['AFT', 'FWD'].forEach((label, i) => {
                const p = i === 0 ? aftP : fwdP;
                const lbl = document.createElement('div');
                lbl.className = 'barge-end-label';
                lbl.textContent = label;
                lbl.style.left = (p.sx + (i === 0 ? -4 : 4)) + 'px';
                lbl.style.top = p.sy + 'px';
                lbl.style.transform = `translate(${i === 0 ? '-100%' : '0'}, -50%) rotate(${i === 0 ? '-90' : '90'}deg)`;
                container.appendChild(lbl);
            });
            // PS / SB labels on port/starboard sides
            const psP = worldToScreen(BARGE_X_MIN + (BARGE_X_MAX - BARGE_X_MIN) * 0.3, BARGE_Y_MAX);
            const sbP = worldToScreen(BARGE_X_MIN + (BARGE_X_MAX - BARGE_X_MIN) * 0.3, BARGE_Y_MIN);
            ['PS', 'SB'].forEach((label, i) => {
                const p = i === 0 ? psP : sbP;
                const lbl = document.createElement('div');
                lbl.className = 'barge-corner-label';
                lbl.textContent = label;
                lbl.style.position = 'absolute';
                lbl.style.left = p.sx + 'px';
                lbl.style.top = (i === 0 ? p.sy - 10 : p.sy + 4) + 'px';
                lbl.style.transform = 'translateX(-50%)';
                lbl.style.fontSize = '8px';
                lbl.style.background = 'rgba(0,0,0,0.5)';
                container.appendChild(lbl);
            });
        }

        function initTankMatrix() {
            const container = document.getElementById('tankContainer');
            container.innerHTML = '';
            if (!TANK_CONFIG.length) return;
            sizeTankPlanView();
            renderBargeOutline(container);

            const gapPx = parseFloat(getComputedStyle(container).getPropertyValue('--tank-gap')) || 15;
            const inset = Math.min(gapPx / 4, 5);

            // Quay wall
            const quayBox = document.createElement('div');
            quayBox.className = 'quay-structure-box';
            const qTL = worldToScreen(QUAY_X_START, BARGE_Y_MAX);
            const qBR = worldToScreen(QUAY_X_END, BARGE_Y_MIN);
            quayBox.style.left = qTL.sx + 'px';
            quayBox.style.top = qTL.sy + 'px';
            quayBox.style.width = Math.max(qBR.sx - qTL.sx, 30) + 'px';
            quayBox.style.height = Math.max(qBR.sy - qTL.sy, 40) + 'px';
            quayBox.innerHTML = `<div class="quay-title">QUAY</div>`;
            container.appendChild(quayBox);

            TANK_CONFIG.forEach((cfg, idx) => {
                const geo = getTankGeometry(cfg.id);
                if (!geo) return;
                const excelRow = EXCEL_START_ROW + idx;
                const tank = tankData.find(t => t.row === cfg.id);
                const pct = tank ? tank.percent * 100 : 0;
                const weight = tank ? tank.weight : 0;
                const xStart = geo.x - geo.width / 2;
                const xEnd = geo.x + geo.width / 2;
                const yTop = geo.y + geo.height / 2;
                const yBot = geo.y - geo.height / 2;
                const tl = worldToScreen(xStart, yTop);
                const br = worldToScreen(xEnd, yBot);
                const pxL = tl.sx + inset, pxT = tl.sy + inset;
                const pxW = Math.max(br.sx - tl.sx - inset * 2, 20);
                const pxH = Math.max(br.sy - tl.sy - inset * 2, 14);

                const box = document.createElement('div');
                box.className = 'tank-control-box';
                box.id = `tank_card_${cfg.id}`;
                box.style.left = pxL + 'px';
                box.style.top = pxT + 'px';
                box.style.width = pxW + 'px';
                box.style.height = pxH + 'px';
                box.style.borderColor = getTankColor(cfg.capacity);
                box.style.borderWidth = '1.5px';

                const pctStr = pct.toFixed(0) + '%';
                const capStr = cfg.capacity ? `Cap.${cfg.capacity.toFixed(1)}t` : '';
                const dimStr = `${geo.width.toFixed(1)}×${geo.height.toFixed(1)}m`;
                box.innerHTML = `
                    <div class="tank-water-level" style="height: ${pct}%"></div>
                    <div class="tank-header">
                        <span class="tank-name">${cfg.name}</span>
                        <span class="tank-coords-badge tank-dim-label">${dimStr}</span>
                    </div>
                    <div class="tank-inputs">
                        <input type="number" step="any" class="weight-input" id="txt_Row${cfg.id}" value="${weight}" onchange="updateTankFill(${cfg.id}, this.value)">
                        <div class="load-percentage-label" id="lbl_Load${cfg.id}">${Number(weight).toFixed(1)} (${pctStr}) · ${capStr}</div>
                    </div>
                `;
                box.title = `${cfg.name} — Row ${excelRow} — ${dimStr} @ (${geo.x.toFixed(1)}, ${geo.y.toFixed(1)})`;
                container.appendChild(box);
            });
            renderBargeCornerLabels(container);
            applyDimensionVisibility();
            drawAxleOverlay();
        }

        function applyDimensionVisibility() {
            document.querySelectorAll('.tank-dim-label').forEach(el => {
                el.style.display = showDimensions ? '' : 'none';
            });
        }

        function toggleDimensionLabels() {
            showDimensions = document.getElementById('dimensionToggleCheckbox').checked;
            applyDimensionVisibility();
        }

        function drawAttitudeGraphics() {
            const isLight = document.body.classList.contains('light-theme');
            const hullColor = isLight ? '#0284c7' : '#38bdf8';
            const waterlineColor = '#10b981';
            const textColor = isLight ? '#0f172a' : '#94a3b8';

            // Trim
            const trimCanvas = document.getElementById('trimCanvas');
            if (trimCanvas) {
                const ctx = trimCanvas.getContext('2d');
                ctx.clearRect(0, 0, trimCanvas.width, trimCanvas.height);
                ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
                ctx.fillRect(0, 45, trimCanvas.width, 45);
                ctx.strokeStyle = waterlineColor;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(10, 45);
                ctx.lineTo(270, 45);
                ctx.stroke();
                ctx.save();
                ctx.translate(140, 45);
                const trimRad = (currentTrimDegrees * Math.PI / 180) * -1;
                ctx.rotate(trimRad);
                ctx.strokeStyle = hullColor;
                ctx.lineWidth = 2.5;
                ctx.fillStyle = isLight ? '#cbd5e1' : '#1e293b';
                ctx.beginPath();
                ctx.rect(-80, -12, 160, 24);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.font = 'bold 8px sans-serif';
                ctx.fillText("AFT", -70, -3);
                ctx.fillText("FWD", 55, -3);
                ctx.restore();
                let trimText = `${Math.abs(currentTrimDegrees).toFixed(2)}° `;
                if (currentTrimDegrees > 0.01) trimText += "AFT";
                else if (currentTrimDegrees < -0.01) trimText += "FWD";
                else trimText += "EVEN KEEL";
                document.getElementById('lbl_TrimValue').textContent = trimText;
            }

            // Heel
            const heelCanvas = document.getElementById('heelCanvas');
            if (heelCanvas) {
                const ctx = heelCanvas.getContext('2d');
                ctx.clearRect(0, 0, heelCanvas.width, heelCanvas.height);
                ctx.fillStyle = isLight ? 'rgba(2,132,199,0.05)' : 'rgba(14,116,144,0.2)';
                ctx.fillRect(0, 45, heelCanvas.width, 45);
                ctx.strokeStyle = waterlineColor;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(10, 45);
                ctx.lineTo(270, 45);
                ctx.stroke();
                ctx.save();
                ctx.translate(140, 45);
                const heelRad = (currentHeelDegrees * Math.PI / 180) * -1;
                ctx.rotate(heelRad);
                ctx.strokeStyle = hullColor;
                ctx.lineWidth = 2.5;
                ctx.fillStyle = isLight ? '#cbd5e1' : '#1e293b';
                ctx.beginPath();
                ctx.rect(-55, -14, 110, 28);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.font = 'bold 8px sans-serif';
                ctx.fillText("PS", -48, -3);
                ctx.fillText("SB", 15, -3);
                ctx.restore();
                let heelText = `${Math.abs(currentHeelDegrees).toFixed(2)}° `;
                if (currentHeelDegrees > 0.01) heelText += "PS";
                else if (currentHeelDegrees < -0.01) heelText += "SB";
                else heelText += "UPRIGHT";
                document.getElementById('lbl_HeelValue').textContent = heelText;
            }
        }

        function drawAxleOverlay() {
            const wrap = document.getElementById('tankGridWrap');
            const gridEl = document.getElementById('tankContainer');
            const canvas = document.getElementById('axleOverlayCanvas');
            if (!wrap || !gridEl || !canvas) return;
            const rect = gridEl.getBoundingClientRect();
            const wrapRect = wrap.getBoundingClientRect();
            const cssW = rect.width, cssH = rect.height;
            if (cssW === 0 || cssH === 0) return;
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = cssW + 'px';
            canvas.style.height = cssH + 'px';
            canvas.style.left = (rect.left - wrapRect.left) + 'px';
            canvas.style.top = (rect.top - wrapRect.top) + 'px';
            canvas.width = cssW * dpr;
            canvas.height = cssH * dpr;
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, cssW, cssH);
            if (!showTrailer || !TANK_CONFIG.length) return;
            const isLight = document.body.classList.contains('light-theme');
            const { scaleX, scaleY } = getPlanScale();
            const halfW = Math.max((0.86 / 2) * scaleX, 2);
            const halfH = Math.max((0.945 / 2) * scaleY, 2);
            const fillColor = isLight ? 'rgba(245,158,11,0.45)' : 'rgba(245,158,11,0.4)';
            const borderColor = isLight ? '#b45309' : '#fbbf24';
            trailerAxles.forEach(axle => {
                const p = worldToScreen(axle.x, axle.y);
                const x0 = p.sx - halfW, y0 = p.sy - halfH;
                ctx.save();
                ctx.fillStyle = fillColor;
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.rect(x0, y0, halfW * 2, halfH * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });
        }

        function refreshPlanView() {
            drawAxleOverlay();
            requestAnimationFrame(() => drawAxleOverlay());
        }

        async function pullExcelTankData() {
            if (!isOfficeInitialized) { generateMockSystemValues(); return; }
            try {
                await Excel.run(async (context) => {
                    const crestSheet = context.workbook.worksheets.getItem(CREST_SHEET_NAME);
                    const editorSheet = context.workbook.worksheets.getItem("Load_Editor");
                    crestSheet.load("name");
                    const crestRange = crestSheet.getRange(`Q${CREST_START_ROW}:T${CREST_START_ROW + CREST_MAX_ROWS - 1}`);
                    crestRange.load("values");
                    const trimCell = editorSheet.getRange("E8");
                    const heelCell = editorSheet.getRange("E9");
                    trimCell.load("values");
                    heelCell.load("values");
                    const cornerLabels = editorSheet.getRange("I1:I6");
                    cornerLabels.load("values");
                    const axleRange = editorSheet.getRange(`E${AXLE_START_ROW}:F${AXLE_START_ROW + AXLE_MAX_ROWS - 1}`);
                    axleRange.load("values");
                    await context.sync();

                    BARGE_NAME = crestSheet.name || CREST_SHEET_NAME;
                    currentTrimDegrees = parseFloat(trimCell.values[0][0] || 0);
                    currentHeelDegrees = parseFloat(heelCell.values[0][0] || 0);
                    bargeCornerLabels = cornerLabels.values.map(row => (row[0] !== undefined && row[0] !== null) ? String(row[0]) : '');

                    const crestValues = crestRange.values;
                    const geometryRows = [];
                    for (let i = 0; i < crestValues.length; i++) {
                        const [q, r, s, t] = crestValues[i];
                        if ([q, r, s, t].every(v => v === '' || v === null || v === undefined)) break;
                        const qn = parseFloat(q), rn = parseFloat(r), sn = parseFloat(s), tn = parseFloat(t);
                        if ([qn, rn, sn, tn].some(isNaN)) continue;
                        geometryRows.push({ q: qn, r: rn, s: sn, t: tn });
                    }

                    let nameWeightRows = [];
                    if (geometryRows.length) {
                        const editorEnd = EXCEL_START_ROW + geometryRows.length - 1;
                        const editorRange = editorSheet.getRange(`B${EXCEL_START_ROW}:E${editorEnd}`);
                        editorRange.load("values");
                        await context.sync();
                        nameWeightRows = editorRange.values.map(row => ({
                            name: row[0] || null,
                            weight: parseFloat(row[2] || 0),
                            percent: parseFloat(row[3] || 0),
                            capacity: parseFloat(row[1] || 0) || 0
                        }));
                    }

                    TANK_CONFIG = geometryRows.map((g, idx) => {
                        const extra = (nameWeightRows && nameWeightRows[idx]) ? nameWeightRows[idx] : null;
                        const w = g.r - g.q, h = g.t - g.s;
                        return {
                            id: EXCEL_START_ROW + idx,
                            name: (extra && extra.name) ? extra.name : `TANK ${idx+1}`,
                            x_start: Math.min(g.q, g.r), x_end: Math.max(g.q, g.r),
                            y_start: Math.min(g.s, g.t), y_end: Math.max(g.s, g.t),
                            width: Math.abs(w), height: Math.abs(h),
                            x: g.q + w/2, y: g.s + h/2,
                            capacity: (extra && extra.capacity) ? extra.capacity : 0
                        };
                    });
                    recomputeBargeExtents();
                    tankData = TANK_CONFIG.map(cfg => ({
                        row: cfg.id,
                        name: cfg.name,
                        weight: 0,
                        percent: 0,
                        capacity: cfg.capacity,
                        geometry: getTankGeometry(cfg.id)
                    }));
                    tankData.forEach((t, idx) => {
                        const extra = nameWeightRows[idx];
                        if (extra) {
                            t.weight = extra.weight.toFixed(2);
                            t.percent = extra.percent > 1 ? extra.percent / 100 : extra.percent;
                        }
                    });
                    updateBargeInfoNote();

                    const axleValues = axleRange.values;
                    const parsed = [];
                    for (let i = 0; i < axleValues.length; i++) {
                        const [x, y] = axleValues[i];
                        if ((x === '' || x === null || x === undefined) && (y === '' || y === null || y === undefined)) break;
                        const xn = parseFloat(x), yn = parseFloat(y);
                        if (isNaN(xn) || isNaN(yn)) continue;
                        parsed.push({ row: AXLE_START_ROW + i, x: xn, y: yn });
                    }
                    trailerAxles = parsed;
                    initTankMatrix();
                    drawAttitudeGraphics();
                    refreshPlanView();
                });
            } catch (e) {
                console.warn("Excel sync error, using mock", e);
                generateMockSystemValues();
            }
        }

        function generateMockSystemValues() {
            const mockCrest = [
                { q: 0, r: 14, s: 5, t: 14.5 }, { q: 0, r: 14, s: -4.5, t: 4.5 }, { q: 0, r: 14, s: -14.5, t: -5 },
                { q: 15.5, r: 29, s: 5, t: 14 }, { q: 15.5, r: 29, s: -4, t: 4 }, { q: 15.5, r: 29, s: -14, t: -5 },
                { q: 30.5, r: 44, s: 5.5, t: 14 }, { q: 30.5, r: 44, s: -4, t: 4 }, { q: 30.5, r: 44, s: -14, t: -5.5 },
                { q: 45.5, r: 58, s: 5, t: 13.5 }, { q: 45.5, r: 58, s: -3.5, t: 3.5 }, { q: 45.5, r: 58, s: -13.5, t: -5 },
                { q: 59.5, r: 71, s: 4.5, t: 13 }, { q: 59.5, r: 71, s: -3.5, t: 3.5 }, { q: 59.5, r: 71, s: -13, t: -4.5 },
                { q: 72.5, r: 83, s: 4, t: 12 }, { q: 72.5, r: 83, s: -3, t: 3 }, { q: 72.5, r: 83, s: -12, t: -4 },
                { q: 84.5, r: 94, s: 3.5, t: 11 }, { q: 84.5, r: 94, s: -2.5, t: 2.5 }, { q: 84.5, r: 94, s: -11, t: -3.5 },
                { q: 95.5, r: 104, s: 3, t: 10 }, { q: 95.5, r: 104, s: -2.5, t: 2.5 }, { q: 95.5, r: 104, s: -10, t: -3 },
                { q: 105.5, r: 113, s: 2.5, t: 9 }, { q: 105.5, r: 113, s: -2, t: 2 }, { q: 105.5, r: 113, s: -9, t: -2.5 }
            ];
            const mockNames = ["1PS","1C","1SB","2PS","2C","2SB","3PS","3C","3SB","4PS","4C","4SB","5PS","5C","5SB","6PS","6C","6SB","7PS","7C","7SB","8PS","8C","8SB","9PS","9C","9SB"];
            const mockCaps = [280,380,280,240,320,240,220,300,220,200,270,200,180,250,180,150,210,150,130,180,130,110,150,110,90,120,90];
            const nameWeightRows = mockCrest.map((_, i) => ({
                name: mockNames[i] || `T${i+1}`,
                weight: 0, percent: 0, capacity: mockCaps[i] || 0
            }));

            BARGE_NAME = CREST_SHEET_NAME;
            bargeCornerLabels = ['L1', 'L2', 'L3', 'L4', 'L5', 'L6'];
            TANK_CONFIG = mockCrest.map((g, idx) => {
                const extra = nameWeightRows[idx] || {};
                const w = g.r - g.q, h = g.t - g.s;
                return {
                    id: EXCEL_START_ROW + idx,
                    name: extra.name || `T${idx+1}`,
                    x_start: Math.min(g.q, g.r), x_end: Math.max(g.q, g.r),
                    y_start: Math.min(g.s, g.t), y_end: Math.max(g.s, g.t),
                    width: Math.abs(w), height: Math.abs(h),
                    x: g.q + w/2, y: g.s + h/2,
                    capacity: extra.capacity || 0
                };
            });
            recomputeBargeExtents();
            tankData = TANK_CONFIG.map(cfg => ({
                row: cfg.id, name: cfg.name, weight: 0, percent: 0, capacity: cfg.capacity,
                geometry: getTankGeometry(cfg.id)
            }));
            tankData.forEach((t, i) => {
                t.weight = (60 + i * 5 + (i % 3) * 2).toFixed(1);
                t.percent = Math.min(0.1 + i * 0.025, 0.85);
            });
            currentTrimDegrees = 2.8;
            currentHeelDegrees = -1.9;
            trailerAxles = [
                { row: 124, x: 30, y: 3.2 }, { row: 125, x: 30, y: -3.2 },
                { row: 126, x: 45, y: 3.2 }, { row: 127, x: 45, y: -3.2 },
                { row: 128, x: 60, y: 3.2 }, { row: 129, x: 60, y: -3.2 }
            ];
            updateBargeInfoNote();
            initTankMatrix();
            drawAttitudeGraphics();
            refreshPlanView();
            document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: #eab308;">● Mock</span>';
        }

        async function updateTankFill(row, value) {
            const parsed = parseFloat(value);
            if (isNaN(parsed)) return;
            const cfg = TANK_CONFIG.find(t => t.id === row);
            if (!cfg) return;
            const max = cfg.capacity || 1000;
            const pct = Math.max(0, Math.min(parsed / max, 1.0));
            const card = document.getElementById(`tank_card_${row}`);
            if (card) {
                const water = card.querySelector('.tank-water-level');
                const label = document.getElementById(`lbl_Load${row}`);
                if (water) water.style.height = `${pct * 100}%`;
                if (label) {
                    const pctStr = (pct * 100).toFixed(0) + '%';
                    const capStr = cfg.capacity ? `Cap.${cfg.capacity.toFixed(1)}t` : '';
                    label.textContent = `${parsed.toFixed(1)} (${pctStr}) · ${capStr}`;
                }
            }
            if (!isOfficeInitialized) return;
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getItem("Load_Editor");
                    sheet.getRange(`D${row}`).values = [[parsed]];
                    await context.sync();
                    setTimeout(pullExcelTankData, 300);
                });
            } catch (e) { console.warn("Excel write error", e); }
        }

        function toggleDashboardTheme() {
            document.body.classList.toggle('light-theme', document.getElementById('themeToggleCheckbox').checked);
            drawAttitudeGraphics();
            drawAxleOverlay();
        }

        function toggleTrailerOverlay() {
            showTrailer = document.getElementById('trailerToggleCheckbox').checked;
            drawAxleOverlay();
        }

        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                isOfficeInitialized = true;
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: var(--accent-green);">● Excel</span>';
                pullExcelTankData();
                registerExcelAutoTrack();
            } else {
                document.getElementById('connectionStatus').innerHTML = 'Status: <span style="color: #eab308;">● Demo</span>';
                generateMockSystemValues();
            }
        });

        async function registerExcelAutoTrack() {
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getItem("Load_Editor");
                    sheet.onChanged.add(async () => { await pullExcelTankData(); });
                    await context.sync();
                });
            } catch (e) { /* ignore */ }
        }

        window.addEventListener('load', () => {
            if (!isOfficeInitialized) generateMockSystemValues();
        });
        window.addEventListener('resize', () => drawAxleOverlay());
    </script>
