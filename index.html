<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barge Ballast</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161d26;
            --panel-border: #242f41;
            --tank-box-bg: #1c2532;
            --input-bg: rgba(15,20,28,0.9);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --tank-water: rgba(56,189,248,0.25);
            --tank-water-solid: #38bdf8;
            --quay-bg: #2d3748;
            --quay-border: #4a5568;
            --quay-text: #cbd5e1;
            --tank-gap: 15px;
            --badge-bg: rgba(0,0,0,0.35);
            --badge-text: var(--accent-blue);
        }

        body.light-theme {
            --bg-dark: #f1f5f9;
            --panel-bg: #ffffff;
            --panel-border: #cbd5e1;
            --tank-box-bg: #f8fafc;
            --input-bg: rgba(255,255,255,0.95);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --accent-green: #16a34a;
            --tank-water: rgba(2,132,199,0.15);
            --tank-water-solid: #0284c7;
            --quay-bg: #e2e8f0;
            --quay-border: #cbd5e1;
            --quay-text: #475569;
            --badge-bg: #e2e8f0;
            --badge-text: #0c4a6e;
        }

        * { box-sizing:border-box; margin:0; padding:0; font-family:'Calibri','Segoe UI',sans-serif; transition:background-color 0.2s,border-color 0.2s,color 0.2s; }
        body { background-color:var(--bg-dark); color:var(--text-main); padding:10px; display:flex; flex-direction:column; gap:10px; min-height:100vh; font-size:13px; }

        header { display:flex; justify-content:center; align-items:center; padding-bottom:8px; border-bottom:1px solid var(--panel-border); flex-wrap:wrap; gap:16px; max-width:900px; margin:0 auto; width:100%; }
        header h1 { font-size:13px; letter-spacing:0.3px; color:var(--text-main); }
        .header-subtitle { font-size:12px; font-weight:800; color:var(--text-muted); margin-top:1px; }
        .header-controls { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
        .theme-toggle-container { display:flex; align-items:center; gap:8px; font-size:10px; font-weight:bold; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
        .switch { position:relative; display:inline-block; width:38px; height:20px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#242f41; transition:.3s; border-radius:20px; border:1px solid var(--panel-border); }
        .slider:before { position:absolute; content:""; height:12px; width:12px; left:3px; bottom:3px; background-color:#38bdf8; transition:.3s; border-radius:50%; }
        input:checked + .slider { background-color:#cbd5e1; }
        input:checked + .slider:before { transform:translateX(18px); background-color:#0284c7; }

        .main-layout { display:flex; flex-direction:column; gap:10px; flex-grow:1; }
        .grid-attitude-mini { display:flex; gap:10px; flex-wrap:wrap; }
        .grid-attitude-block { display:flex; align-items:center; gap:4px; background:rgba(0,0,0,0.15); padding:4px 6px; border-radius:6px; border:1px solid var(--panel-border); }
        .grid-side-label { font-size:12px; font-weight:700; letter-spacing:0.5px; color:var(--text-muted); white-space:nowrap; }
        .grid-side-label-active { color:#fff7ed; background:#f97316; padding:1px 4px; border-radius:3px; font-weight:800; }
        .attitude-canvas-mini { background:#0b0f19; border-radius:4px; border:1px solid var(--panel-border); width:110px; height:46px; display:block; }

        .tank-grid-wrap { position:relative; min-width:1100px; padding:20px 0; }
        .axle-overlay-canvas { position:absolute; top:0; left:0; pointer-events:none; z-index:20; }
        .tank-grid-container { background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:6px; padding:10px; display:flex; flex-direction:column; gap:8px; overflow-x:auto; }
        .section-title { font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border-left:3px solid var(--accent-blue); padding-left:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .tank-grid { position:relative; min-width:1100px; min-height:320px; padding-right:5px; }
        .quay-structure-box { position:absolute; background:var(--quay-bg); border:2px dashed var(--quay-border); border-radius:6px; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:10px; text-align:center; box-shadow:inset 0 0 15px rgba(0,0,0,0.2); overflow:hidden; }
        .quay-title { font-size:12px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; color:var(--quay-text); transform:rotate(270deg); }
        .barge-corner-label { font-size:12px; font-weight:600; color:var(--badge-text); background:var(--badge-bg); padding:2px 6px; border-radius:3px; white-space:nowrap; z-index:15; pointer-events:none; }
        .barge-end-label { position:absolute; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--text-muted); white-space:nowrap; z-index:15; pointer-events:none; }
        .barge-end-label-active { color:#fff7ed; background:#f97316; padding:1px 4px; border-radius:3px; font-weight:800; }

        /* Axle 2D: now drawn as proper wheel-pair lines on canvas */
        .pump-marker { position:absolute; display:flex; flex-direction:row; align-items:center; justify-content:flex-end; gap:2px; z-index:16; pointer-events:none; }
        .pump-marker-dot { width:9px; height:9px; border-radius:50%; background:#a855f7; border:1.5px solid #f5f3ff; box-shadow:0 0 4px rgba(168,85,247,0.8); }
        .pump-marker-label { font-size:8px; font-weight:700; color:#f5f3ff; background:#7e22ce; padding:0 3px; border-radius:2px; white-space:nowrap; }

        .tank-control-box { position:absolute; background:var(--tank-box-bg); border:1px solid var(--panel-border); border-radius:6px; display:flex; flex-direction:column; justify-content:space-between; padding:3px 4px; overflow:hidden; transition:box-shadow 0.3s,border-color 0.3s; }
        .tank-control-box:hover { z-index:10; box-shadow:0 0 25px rgba(56,189,248,0.25); }
        .tank-water-level { position:absolute; bottom:0; left:0; width:100%; background:var(--tank-water); border-top:2px solid var(--tank-water-solid); z-index:1; transition:height 0.4s ease-out; }
        .tank-water-high { background:rgba(249,115,22,0.32)!important; border-top:2px solid #f97316!important; }
        .tank-header { display:flex; justify-content:space-between; align-items:center; z-index:5; flex-wrap:wrap; gap:2px; min-width:0; }
        .tank-name { font-size:10px; font-weight:bold; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
        .tank-coords-badge { font-size:8px; background:var(--badge-bg); padding:1px 4px; border-radius:3px; color:var(--badge-text); font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
        .tank-inputs { z-index:5; display:flex; flex-direction:column; gap:2px; min-width:0; }
        .weight-input { width:100%; min-width:0; background:var(--input-bg); border:1px solid var(--panel-border); color:var(--text-main); text-align:center; font-size:11px; padding:1px 0; border-radius:4px; }
        .weight-input-over { border-color:#ef4444!important; background:rgba(239,68,68,0.12)!important; box-shadow:0 0 0 1px rgba(239,68,68,0.5); }
        .weight-input-disabled { opacity:0.45; cursor:not-allowed; background:var(--panel-border)!important; }
        .tank-warning { font-size:8px; font-weight:700; color:#ef4444; text-align:center; line-height:1.2; }
        .weight-input:focus { outline:none; border-color:var(--accent-blue); }
        .load-percentage-label { font-size:9px; text-align:center; color:var(--accent-blue); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tank-capacity-badge { font-size:8px; background:var(--badge-bg); padding:1px 4px; border-radius:3px; color:var(--accent-green); font-family:monospace; }

        .sync-btn { background:transparent; border:1px solid var(--panel-border); color:var(--accent-blue); padding:2px 10px; font-size:11px; border-radius:4px; cursor:pointer; transition:0.2s; }
        .sync-btn:hover { background:rgba(56,189,248,0.1); }
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background:var(--panel-border); border-radius:3px; }
        @media (max-width:700px) { .tank-grid { min-width:700px; } }

        .toggle-container { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:bold; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
        .toggle-container input { margin-right:4px; accent-color:var(--accent-blue); width:16px; height:16px; cursor:pointer; }
    </style>

<body class="light-theme">
    <header>
        <h1>⚓ Barge Ballast</h1>
        <div class="header-subtitle" id="bargeInfoNote">CREST_301 · total length —m (0 tanks) × total width —m (0 tanks)</div>
        <div class="header-controls">
            <div class="theme-toggle-container">
                <span>Day</span>
                <label class="switch"><input type="checkbox" id="themeToggleCheckbox" checked onchange="toggleDashboardTheme()"><span class="slider"></span></label>
                <span>Night</span>
            </div>
            <div class="toggle-container">
                <span>🚛 Trailer</span>
                <input type="checkbox" id="trailerToggleCheckbox" checked onchange="toggleTrailerOverlay()">
            </div>
            <div class="toggle-container">
                <span>📐 Dimensions</span>
                <input type="checkbox" id="dimensionToggleCheckbox" onchange="toggleDimensionLabels()">
            </div>
            <div class="toggle-container">
                <span>⚡ Pump-only input</span>
                <input type="checkbox" id="pumpInputToggleCheckbox" onchange="togglePumpOnlyInput()">
            </div>
            <div id="connectionStatus" style="font-size:10px; color:var(--text-muted);">Status: <span style="color:#ef4444;">● Offline</span></div>
            <button class="sync-btn" onclick="pullExcelTankData()">↻ Sync</button>
        </div>
    </header>
    <div class="main-layout">
        <div class="tank-grid-container">
            <div class="section-title" style="justify-content:center; border-left:none; padding-left:0;">
                <div class="grid-attitude-mini">
                    <div class="grid-attitude-block">
                        <span class="grid-side-label" id="lbl_GridAFT">AFT</span>
                        <canvas id="trimCanvas" class="attitude-canvas-mini" width="120" height="50"></canvas>
                        <span class="grid-side-label" id="lbl_GridFWD">FWD</span>
                    </div>
                    <div class="grid-attitude-block">
                        <span class="grid-side-label" id="lbl_GridPS">PS</span>
                        <canvas id="heelCanvas" class="attitude-canvas-mini" width="120" height="50"></canvas>
                        <span class="grid-side-label" id="lbl_GridSB">SB</span>
                    </div>
                </div>
            </div>
            <div class="tank-grid-wrap" id="tankGridWrap">
                <div class="tank-grid" id="tankContainer"></div>
                <canvas id="axleOverlayCanvas" class="axle-overlay-canvas"></canvas>
            </div>
        </div>

        <!-- 3D VIEW -->
        <div class="tank-grid-container" id="view3dPanel">
            <div style="position:relative; width:100%; height:360px;">
                <div id="viewer3d" style="width:100%; height:360px; border-radius:8px; overflow:hidden;"></div>
                <div id="labels3d" style="position:absolute; inset:0; pointer-events:none;"></div>
                <div style="position:absolute; bottom:8px; right:8px; font-size:10px; color:rgba(200,220,255,0.55); pointer-events:none; line-height:1.5;">
                    Drag: Orbit &nbsp;|&nbsp; Shift+Drag: Pan &nbsp;|&nbsp; Scroll: Zoom
                </div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px;">
                <button class="sync-btn" onclick="set3DCamera('iso-fwd-ps')" id="cam3d-iso-fwd-ps">FWD-PS iso</button>
                <button class="sync-btn" onclick="set3DCamera('iso-fwd-sb')" id="cam3d-iso-fwd-sb">FWD-SB iso</button>
                <button class="sync-btn" onclick="set3DCamera('iso-aft-ps')" id="cam3d-iso-aft-ps">AFT-PS iso</button>
                <button class="sync-btn" onclick="set3DCamera('iso-aft-sb')" id="cam3d-iso-aft-sb">AFT-SB iso</button>
                <button class="sync-btn" onclick="set3DCamera('top')" id="cam3d-top">Top-down</button>
                <button class="sync-btn" onclick="set3DCamera('side')" id="cam3d-side">Side (SB)</button>
                <button class="sync-btn" onclick="set3DCamera('front')" id="cam3d-front">Front (bow)</button>
                <button class="sync-btn" onclick="set3DCamera('end')" id="cam3d-end">End (stern)</button>
            </div>
            <div class="section-title" style="justify-content:space-between; border-left:none; padding-left:0; margin-top:8px;">
                <span style="font-size:12px; color:var(--text-muted);">3D ballast view</span>
                <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
                    <label class="toggle-container" style="margin:0;">
                        <span style="font-size:11px;">Deck</span>
                        <input type="checkbox" id="deck3dToggle" checked onchange="set3DDeckVisible(this.checked)">
                    </label>
                </div>
            </div>
        </div>
    </div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CREST_SHEET_NAME = "CREST_301";
const CREST_START_ROW = 30;
const CREST_MAX_ROWS = 200;
const EXCEL_START_ROW = 14;
const AXLE_WIDTH_X = 0.86;
const AXLE_HEIGHT_Y = 0.945;
const AXLE_START_ROW = 124;
const AXLE_MAX_ROWS = 60;
const PUMP_SHEET_NAME = "BALLASTPLAN(mT)";
const PUMP_START_ROW = 33;
const PUMP_MAX_ROWS = 200;

const AXLE_STYLE = {
    fillColorDark:'245,158,11', fillColorLight:'245,158,11',
    fillOpacityDark:0.2, fillOpacityLight:0.25,
    borderColorDark:'#fbbf24', borderColorLight:'#b45309',
    borderWidth:0.2
};

let TANK_CONFIG = [];
let totalTanks = 0;
let BARGE_X_MIN=0, BARGE_X_MAX=113, BARGE_Y_MIN=-14.5, BARGE_Y_MAX=14.5;
let BARGE_NAME = CREST_SHEET_NAME;

function recomputeBargeExtents() {
    if (!TANK_CONFIG.length) return;
    BARGE_X_MIN = Math.min(...TANK_CONFIG.map(t=>t.x_start));
    BARGE_X_MAX = Math.max(...TANK_CONFIG.map(t=>t.x_end));
    BARGE_Y_MIN = Math.min(...TANK_CONFIG.map(t=>t.y_start));
    BARGE_Y_MAX = Math.max(...TANK_CONFIG.map(t=>t.y_end));
}

function computeTotalTankSpan() {
    if (!TANK_CONFIG.length) return {totalLength:0,totalWidth:0,numCols:0,numRows:0};
    const key = v => Math.round(v*1000)/1000;
    const colMap = new Map();
    TANK_CONFIG.forEach(t=>{
        const k=`${key(t.x_start)}_${key(t.x_end)}`;
        if(!colMap.has(k)) colMap.set(k,Math.abs(t.width));
    });
    const rowMap = new Map();
    TANK_CONFIG.forEach(t=>{
        const k=`${key(t.y_start)}_${key(t.y_end)}`;
        if(!rowMap.has(k)) rowMap.set(k,Math.abs(t.height));
    });
    return {
        totalLength:[...colMap.values()].reduce((s,w)=>s+w,0),
        totalWidth:[...rowMap.values()].reduce((s,h)=>s+h,0),
        numCols:colMap.size, numRows:rowMap.size
    };
}

function updateBargeInfoNote() {
    const note = document.getElementById('bargeInfoNote');
    if (!note) return;
    const {totalLength,totalWidth,numCols,numRows} = computeTotalTankSpan();
    note.textContent=`${BARGE_NAME} ·length ${totalLength.toFixed(2)}m (${numCols} tanks) × width ${totalWidth.toFixed(2)}m (${numRows} tanks)`;
}

// ---- state ----
let isOfficeInitialized = false;
let currentTrimDegrees = 0.0;
let currentHeelDegrees = 0.0;
let trailerAxles = [];
let showTrailer = true;
let pumpLocations = [];
let bargeCornerLabels = ['','','','','',''];
let tankData = [];

function rebuildTankDataFromConfig() {
    tankData = TANK_CONFIG.map(cfg=>({
        row:cfg.id, name:cfg.name, weight:0, percent:0.0,
        capacity:cfg.capacity, geometry:getTankGeometry(cfg.id)
    }));
}

function buildTankConfigFromCrest(geometryRows, nameWeightRows) {
    return geometryRows.map((g,idx)=>{
        const q=g.q, r=g.r, s=g.s, t=g.t;
        const width=r-q, height=t-s;
        const xLoc=q+(r-q)/2, yLoc=s+(t-s)/2;
        const extra=(nameWeightRows&&nameWeightRows[idx])?nameWeightRows[idx]:null;
        return {
            id:EXCEL_START_ROW+idx, crestRow:CREST_START_ROW+idx,
            name:extra&&extra.name?extra.name:`TANK ${idx+1}`,
            x_start:Math.min(q,r), x_end:Math.max(q,r),
            y_start:Math.min(s,t), y_end:Math.max(s,t),
            width:Math.abs(width), height:Math.abs(height),
            x:xLoc, y:yLoc,
            capacity:extra&&extra.capacity?extra.capacity:0
        };
    });
}

// ============================================================
// GEOMETRY HELPERS
// ============================================================
function getTankGeometry(tankId) {
    const cfg = TANK_CONFIG.find(t=>t.id===tankId);
    if (!cfg) return null;
    const cx=(cfg.x!==undefined)?cfg.x:(cfg.x_start+cfg.x_end)/2;
    const cy=(cfg.y!==undefined)?cfg.y:(cfg.y_start+cfg.y_end)/2;
    const w=(cfg.width!==undefined)?cfg.width:(cfg.x_end-cfg.x_start);
    const h=(cfg.height!==undefined)?cfg.height:(cfg.y_end-cfg.y_start);
    return {x:cx, y:cy, width:w, height:h, capacity:cfg.capacity};
}

function getTankColor(capacity) {
    if (capacity>250) return '#10b981';
    if (capacity>150) return '#38bdf8';
    if (capacity>50)  return '#f59e0b';
    return '#94a3b8';
}

function shortenTankName(name) {
    if (!name) return name;
    const m = String(name).match(/^WB-?(\d+)-(?:PS|SB|C)\.([A-Z])$/i);
    if (!m) return name;
    return `${parseInt(m[1],10)}${m[2].toUpperCase()}`;
}

// ---- Plan view mapping ----
const PLAN_PX_PER_METER = 9;
const PLAN_MARGIN_PX = 10;
const QUAY_X_START = -11.2;
const QUAY_X_END = -1.2;

function sizeTankPlanView() {
    const container = document.getElementById('tankContainer');
    if (!container || !TANK_CONFIG.length) return;
    const worldW=(BARGE_X_MAX-BARGE_X_MIN)+(QUAY_X_END-QUAY_X_START);
    const worldH=(BARGE_Y_MAX-BARGE_Y_MIN);
    const pxW=Math.max(700,Math.round(worldW*PLAN_PX_PER_METER)+PLAN_MARGIN_PX*2);
    const pxH=Math.max(260,Math.round(worldH*PLAN_PX_PER_METER)+PLAN_MARGIN_PX*2);
    container.style.width=pxW+'px';
    container.style.height=pxH+'px';
}

function worldToScreen(x, y) {
    const container=document.getElementById('tankContainer');
    const cssW=container?container.clientWidth:1100;
    const cssH=container?container.clientHeight:320;
    const worldXMin=QUAY_X_START, worldXMax=BARGE_X_MAX;
    const worldW=worldXMax-worldXMin;
    const plottableW=cssW-PLAN_MARGIN_PX*2;
    const plottableH=cssH-PLAN_MARGIN_PX*2;
    const xFrac=(x-worldXMin)/worldW;
    const sx=PLAN_MARGIN_PX+xFrac*plottableW;
    const yFrac=(BARGE_Y_MAX-y)/(BARGE_Y_MAX-BARGE_Y_MIN);
    const sy=PLAN_MARGIN_PX+yFrac*plottableH;
    return {sx, sy};
}

function getPlanScale() {
    const container=document.getElementById('tankContainer');
    const cssW=container?container.clientWidth:1100;
    const cssH=container?container.clientHeight:320;
    const worldW=BARGE_X_MAX-QUAY_X_START;
    const plottableW=cssW-PLAN_MARGIN_PX*2;
    const plottableH=cssH-PLAN_MARGIN_PX*2;
    return {scaleX:plottableW/worldW, scaleY:plottableH/(BARGE_Y_MAX-BARGE_Y_MIN)};
}

function drawHullOutline(ctx, w, h, fillStyle, strokeStyle, lineWidth) {
    const bowTaper=w*0.10, sternCut=w*0.09, sternRound=h*0.18;
    const left=-w/2, right=w/2, top=-h/2, bottom=h/2;
    ctx.beginPath();
    ctx.moveTo(left,top);
    ctx.lineTo(right,top);
    ctx.lineTo(right-bowTaper,bottom);
    ctx.lineTo(left+sternCut+sternRound,bottom);
    ctx.quadraticCurveTo(left+sternCut,bottom,left+sternCut*0.3,bottom-sternRound*0.8);
    ctx.lineTo(left,top);
    ctx.closePath();
    if (fillStyle){ctx.fillStyle=fillStyle;ctx.fill();}
    if (strokeStyle){ctx.strokeStyle=strokeStyle;ctx.lineWidth=lineWidth||2;ctx.stroke();}
}

// ============================================================
// RENDER TANKS
// ============================================================
function initTankMatrix() {
    totalTanks=TANK_CONFIG.length;
    const container=document.getElementById('tankContainer');
    container.innerHTML='';
    if (!totalTanks) return;
    sizeTankPlanView();
    const gapPx=parseFloat(getComputedStyle(container).getPropertyValue('--tank-gap'))||15;
    const inset=Math.min(gapPx/4,6);

    // Quay wall
    const quayBox=document.createElement('div');
    quayBox.className='quay-structure-box';
    const qTopLeft=worldToScreen(QUAY_X_START,BARGE_Y_MAX);
    const qBotRight=worldToScreen(QUAY_X_END,BARGE_Y_MIN);
    quayBox.style.left=qTopLeft.sx+'px';
    quayBox.style.top=qTopLeft.sy+'px';
    quayBox.style.width=Math.max(qBotRight.sx-qTopLeft.sx,40)+'px';
    quayBox.style.height=Math.max(qBotRight.sy-qTopLeft.sy,60)+'px';
    quayBox.innerHTML='<div class="quay-title">QUAY</div>';
    container.appendChild(quayBox);

    TANK_CONFIG.forEach((cfg,index)=>{
        const geo=getTankGeometry(cfg.id);
        if (!geo) return;
        const excelRow=EXCEL_START_ROW+index;
        const tank=tankData.find(t=>t.row===cfg.id);
        const pct=tank?tank.percent*100:0;
        const weight=tank?tank.weight:0;
        const isOverCapacity=parseFloat(weight)>cfg.capacity;

        const xStart=geo.x-geo.width/2, xEnd=geo.x+geo.width/2;
        const yTop=geo.y+geo.height/2, yBot=geo.y-geo.height/2;
        const topLeft=worldToScreen(xStart,yTop);
        const botRight=worldToScreen(xEnd,yBot);
        const pxLeft=topLeft.sx+inset, pxTop=topLeft.sy+inset;
        const pxW=Math.max(botRight.sx-topLeft.sx-inset*2,24);
        const pxH=Math.max(botRight.sy-topLeft.sy-inset*2,18);

        const box=document.createElement('div');
        box.className='tank-control-box';
        box.id=`tank_card_${cfg.id}`;
        box.style.left=pxLeft+'px';
        box.style.top=pxTop+'px';
        box.style.width=pxW+'px';
        box.style.height=pxH+'px';
        const borderColor=getTankColor(cfg.capacity);
        box.style.borderColor=borderColor;
        box.style.borderWidth='1.5px';

        const waterClass=pct>=85?'tank-water-level tank-water-high':'tank-water-level';
        const shortName=shortenTankName(cfg.name);
        box.innerHTML=`
            <div class="${waterClass}" style="height:${pct}%"></div>
            <div class="tank-header">
                <span class="tank-name">${shortName}</span>
                <span class="tank-coords-badge tank-dim-label">${geo.width.toFixed(2)}×${geo.height.toFixed(2)}m · Row ${excelRow}</span>
            </div>
            <div class="tank-inputs">
                <input type="number" step="any" class="weight-input${isOverCapacity?' weight-input-over':''}"
                       id="txt_Row${cfg.id}" value="${weight}"
                       onclick="this.select()" onchange="updateTankFill(${cfg.id},this.value)">
                <div class="load-percentage-label" id="lbl_Load${cfg.id}">${pct.toFixed(0)}% (Cap. ${cfg.capacity}t)</div>
                <div class="tank-warning" id="warn_Row${cfg.id}" style="display:${isOverCapacity?'':'none'};">${isOverCapacity?`⚠ Exceeds capacity (${cfg.capacity}t)`:''}</div>
            </div>`;
        box.title=`${cfg.name} — Row ${excelRow} — ${geo.width.toFixed(2)}m × ${geo.height.toFixed(2)}m @ (x=${geo.x.toFixed(2)}, y=${geo.y.toFixed(2)})`;
        container.appendChild(box);
    });

    renderBargeCornerLabels(container);
    renderPumpMarkers(container);
    applyDimensionVisibility();
}

function normalizeTankName(name) {
    return String(name||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
}

function formatCornerLabelText(text) {
    if (text===null||text===undefined||text==='') return text;
    return String(text).replace(/-?\d+(\.\d+)?/g,m=>parseFloat(m).toFixed(2));
}

function renderBargeCornerLabels(container) {
    container.querySelectorAll('.barge-corner-label,.barge-end-label,.barge-side-label').forEach(el=>el.remove());
    const midX=(BARGE_X_MIN+BARGE_X_MAX)/2;
    const anchors=[
        {text:bargeCornerLabels[0],x:BARGE_X_MIN,y:BARGE_Y_MAX,h:'left',v:'top'},
        {text:bargeCornerLabels[1],x:midX,y:BARGE_Y_MAX,h:'center',v:'top'},
        {text:bargeCornerLabels[2],x:BARGE_X_MAX,y:BARGE_Y_MAX,h:'right',v:'top'},
        {text:bargeCornerLabels[3],x:BARGE_X_MIN,y:BARGE_Y_MIN,h:'left',v:'bottom'},
        {text:bargeCornerLabels[4],x:midX,y:BARGE_Y_MIN,h:'center',v:'bottom'},
        {text:bargeCornerLabels[5],x:BARGE_X_MAX,y:BARGE_Y_MIN,h:'right',v:'bottom'}
    ];
    const outsidePx=8;
    anchors.forEach(a=>{
        if (!a.text) return;
        const p=worldToScreen(a.x,a.y);
        const lbl=document.createElement('div');
        lbl.className='barge-corner-label';
        lbl.textContent=formatCornerLabelText(a.text);
        lbl.style.position='absolute';
        lbl.style.left=p.sx+'px';
        if (a.h==='left') {lbl.style.transform='translateX(0)';lbl.style.textAlign='left';}
        else if (a.h==='right') {lbl.style.transform='translateX(-100%)';lbl.style.textAlign='right';}
        else {lbl.style.transform='translateX(-50%)';lbl.style.textAlign='center';}
        if (a.v==='top') {lbl.style.top=(p.sy-outsidePx)+'px';lbl.style.transform+=' translateY(-100%)';}
        else {lbl.style.top=(p.sy+outsidePx)+'px';}
        container.appendChild(lbl);
    });

    const aftP=worldToScreen(BARGE_X_MIN,(BARGE_Y_MIN+BARGE_Y_MAX)/2);
    const fwdP=worldToScreen(BARGE_X_MAX,(BARGE_Y_MIN+BARGE_Y_MAX)/2);

    const aftLbl=document.createElement('div');
    aftLbl.className='barge-end-label'; aftLbl.id='lbl_PlanAFT'; aftLbl.textContent='AFT';
    aftLbl.style.left=(aftP.sx-6)+'px'; aftLbl.style.top=aftP.sy+'px';
    aftLbl.style.transform='translate(-100%,-50%) rotate(-90deg)';
    container.appendChild(aftLbl);

    const fwdLbl=document.createElement('div');
    fwdLbl.className='barge-end-label'; fwdLbl.id='lbl_PlanFWD'; fwdLbl.textContent='FWD';
    fwdLbl.style.left=(fwdP.sx+6)+'px'; fwdLbl.style.top=fwdP.sy+'px';
    fwdLbl.style.transform='translate(0,-50%) rotate(90deg)';
    container.appendChild(fwdLbl);

    const psP=worldToScreen(midX,BARGE_Y_MAX);
    const sbP=worldToScreen(midX,BARGE_Y_MIN);

    const psLbl=document.createElement('div');
    psLbl.className='barge-end-label'; psLbl.id='lbl_PlanPS'; psLbl.textContent='PS';
    psLbl.style.left=(psP.sx+36)+'px'; psLbl.style.top=(psP.sy-outsidePx)+'px';
    psLbl.style.transform='translateY(-100%)';
    container.appendChild(psLbl);

    const sbLbl=document.createElement('div');
    sbLbl.className='barge-end-label'; sbLbl.id='lbl_PlanSB'; sbLbl.textContent='SB';
    sbLbl.style.left=(sbP.sx+36)+'px'; sbLbl.style.top=(sbP.sy+outsidePx)+'px';
    container.appendChild(sbLbl);
}

let tanksWithPump = new Set();
function renderPumpMarkers(container) {
    container.querySelectorAll('.pump-marker').forEach(el=>el.remove());
    tanksWithPump=new Set();
    if (!pumpLocations.length||!TANK_CONFIG.length){applyPumpInputRestriction();return;}
    pumpLocations.forEach(pump=>{
        const targetNorm=normalizeTankName(pump.tankName);
        const cfg=TANK_CONFIG.find(t=>normalizeTankName(t.name)===targetNorm);
        if (!cfg) return;
        const geo=getTankGeometry(cfg.id);
        if (!geo) return;
        tanksWithPump.add(cfg.id);

        // PS (+Y) → top-right corner; SB (-Y) → bottom-right corner
        const isPS = cfg.y >= 0;
        const cornerX = geo.x + geo.width/2;
        const cornerY = isPS ? (geo.y + geo.height/2) : (geo.y - geo.height/2);
        const p = worldToScreen(cornerX, cornerY);

        const marker=document.createElement('div');
        marker.className='pump-marker';
        marker.style.right=(container.clientWidth-p.sx+3)+'px';
        marker.style.top=(p.sy+(isPS?0:(-12)))+'px';
        marker.title=`Pump ${pump.pumpName} — ${pump.tankName}`;
        marker.innerHTML=`<span class="pump-marker-label">${pump.pumpName}</span><span class="pump-marker-dot"></span>`;
        container.appendChild(marker);
    });
    applyPumpInputRestriction();
}

let showDimensions=false;
function applyDimensionVisibility() {
    document.querySelectorAll('.tank-dim-label').forEach(el=>{el.style.display=showDimensions?'':'none';});
}
function toggleDimensionLabels() {
    showDimensions=document.getElementById('dimensionToggleCheckbox').checked;
    applyDimensionVisibility();
}

let pumpOnlyInput=false;
function applyPumpInputRestriction() {
    TANK_CONFIG.forEach(cfg=>{
        const input=document.getElementById(`txt_Row${cfg.id}`);
        if (!input) return;
        const shouldDisable=pumpOnlyInput&&!tanksWithPump.has(cfg.id);
        input.disabled=shouldDisable;
        input.classList.toggle('weight-input-disabled',shouldDisable);
    });
}
function togglePumpOnlyInput() {
    pumpOnlyInput=document.getElementById('pumpInputToggleCheckbox').checked;
    applyPumpInputRestriction();
}

function drawAttitudeGraphics() {
    const isLight=document.body.classList.contains('light-theme');
    const hullColor=isLight?'#0284c7':'#38bdf8';
    const waterlineColor='#10b981';
    const textColor=isLight?'#0f172a':'#94a3b8';

    const trimCanvas=document.getElementById('trimCanvas');
    if (trimCanvas) {
        const ctx=trimCanvas.getContext('2d');
        const cw=trimCanvas.width, ch=trimCanvas.height;
        const waterY=ch*0.58;
        ctx.clearRect(0,0,cw,ch);
        ctx.fillStyle=isLight?'rgba(2,132,199,0.05)':'rgba(14,116,144,0.2)';
        ctx.fillRect(0,waterY,cw,ch-waterY);
        ctx.strokeStyle=waterlineColor; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.moveTo(6,waterY); ctx.lineTo(cw-6,waterY); ctx.stroke();
        ctx.save(); ctx.translate(cw/2,waterY);
        ctx.rotate((currentTrimDegrees*Math.PI/180)*-1);
        drawHullOutline(ctx,cw*0.72,ch*0.32,isLight?'#cbd5e1':'#1e293b',hullColor,2);
        ctx.fillStyle=textColor; ctx.font='bold 7px sans-serif';
        ctx.fillText("AFT",-cw*0.30,-3); ctx.fillText("FWD",cw*0.20,-3);
        ctx.restore();
    }

    const heelCanvas=document.getElementById('heelCanvas');
    if (heelCanvas) {
        const ctx=heelCanvas.getContext('2d');
        const cw=heelCanvas.width, ch=heelCanvas.height;
        const waterY=ch*0.58;
        ctx.clearRect(0,0,cw,ch);
        ctx.fillStyle=isLight?'rgba(2,132,199,0.05)':'rgba(14,116,144,0.2)';
        ctx.fillRect(0,waterY,cw,ch-waterY);
        ctx.strokeStyle=waterlineColor; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.moveTo(6,waterY); ctx.lineTo(cw-6,waterY); ctx.stroke();
        ctx.save(); ctx.translate(cw/2,waterY);
        ctx.rotate((currentHeelDegrees*Math.PI/180)*-1);
        ctx.strokeStyle=hullColor; ctx.lineWidth=2;
        ctx.fillStyle=isLight?'#cbd5e1':'#1e293b';
        ctx.beginPath(); ctx.rect(-cw*0.34,-ch*0.18,cw*0.68,ch*0.36); ctx.fill(); ctx.stroke();
        ctx.fillStyle=textColor; ctx.font='bold 7px sans-serif';
        ctx.fillText("PS",-cw*0.30,-3); ctx.fillText("SB",cw*0.20,-3);
        ctx.restore();
    }
    updateTrimHeelGridLabels();
}

function updateTrimHeelGridLabels() {
    const trimAbs=Math.abs(currentTrimDegrees).toFixed(2)+'°';
    const heelAbs=Math.abs(currentHeelDegrees).toFixed(2)+'°';

    const aftEl=document.getElementById('lbl_GridAFT');
    const fwdEl=document.getElementById('lbl_GridFWD');
    const psEl=document.getElementById('lbl_GridPS');
    const sbEl=document.getElementById('lbl_GridSB');

    if (aftEl&&fwdEl) {
        aftEl.textContent=currentTrimDegrees>0?`AFT ${trimAbs}`:'AFT';
        fwdEl.textContent=currentTrimDegrees<0?`FWD ${trimAbs}`:'FWD';
        aftEl.classList.toggle('grid-side-label-active',currentTrimDegrees>0);
        fwdEl.classList.toggle('grid-side-label-active',currentTrimDegrees<0);
    }
    if (psEl&&sbEl) {
        psEl.textContent=currentHeelDegrees>0?`PS ${heelAbs}`:'PS';
        sbEl.textContent=currentHeelDegrees<0?`SB ${heelAbs}`:'SB';
        psEl.classList.toggle('grid-side-label-active',currentHeelDegrees>0);
        sbEl.classList.toggle('grid-side-label-active',currentHeelDegrees<0);
    }

    const planAft=document.getElementById('lbl_PlanAFT');
    const planFwd=document.getElementById('lbl_PlanFWD');
    const planPs=document.getElementById('lbl_PlanPS');
    const planSb=document.getElementById('lbl_PlanSB');
    if (planAft&&planFwd) {
        planAft.textContent=currentTrimDegrees>0?`AFT ${trimAbs}`:'AFT';
        planFwd.textContent=currentTrimDegrees<0?`FWD ${trimAbs}`:'FWD';
        planAft.classList.toggle('barge-end-label-active',currentTrimDegrees>0);
        planFwd.classList.toggle('barge-end-label-active',currentTrimDegrees<0);
    }
    if (planPs&&planSb) {
        planPs.textContent=currentHeelDegrees>0?`PS ${heelAbs}`:'PS';
        planSb.textContent=currentHeelDegrees<0?`SB ${heelAbs}`:'SB';
        planPs.classList.toggle('barge-end-label-active',currentHeelDegrees>0);
        planSb.classList.toggle('barge-end-label-active',currentHeelDegrees<0);
    }
}

// ============================================================
// TRAILER AXLE OVERLAY — 2D redesign: real axle wheel-pair drawing
// Each axle position = two wheel rectangles (left/right) connected
// by an axle beam line, plus a tyre pair indicator — like a real
// engineering plan view of a trailer axle set.
// ============================================================
function drawAxleOverlay() {
    const wrap=document.getElementById('tankGridWrap');
    const gridEl=document.getElementById('tankContainer');
    const canvas=document.getElementById('axleOverlayCanvas');
    if (!wrap||!gridEl||!canvas) return;

    const rect=gridEl.getBoundingClientRect();
    const wrapRect=wrap.getBoundingClientRect();
    const cssW=rect.width, cssH=rect.height;
    if (cssW===0||cssH===0) return;

    const dpr=window.devicePixelRatio||1;
    canvas.style.width=cssW+'px';
    canvas.style.height=cssH+'px';
    canvas.style.left=(rect.left-wrapRect.left)+'px';
    canvas.style.top=(rect.top-wrapRect.top)+'px';
    canvas.width=cssW*dpr;
    canvas.height=cssH*dpr;

    const ctx=canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);

    if (!showTrailer||!TANK_CONFIG.length) return;

    const isLight=document.body.classList.contains('light-theme');
    const {scaleX,scaleY}=getPlanScale();

    // Axle physical dimensions in real-world meters
    const WHEEL_W_M = AXLE_WIDTH_X;          // wheel block width (along X)
    const WHEEL_D_M = AXLE_HEIGHT_Y * 0.38;  // wheel depth (along Y) = tyre section height
    const AXLE_SPAN_M = AXLE_HEIGHT_Y;        // full span across Y (center to center of outer wheels)
    const PAIR_SPACING_M = 1.45;             // spacing between the two wheels in each pair (Y)

    // Convert to pixels
    const wheelWpx = Math.max(WHEEL_W_M*scaleX, 4);
    const wheelDpx = Math.max(WHEEL_D_M*scaleY, 3);
    const halfSpanPx = (PAIR_SPACING_M/2)*scaleY;

    const fillC   = isLight?`rgba(${AXLE_STYLE.fillColorLight},0.85)`:`rgba(${AXLE_STYLE.fillColorDark},0.85)`;
    const beamC   = isLight?AXLE_STYLE.borderColorLight:AXLE_STYLE.borderColorDark;
    const wheelC  = isLight?'rgba(180,83,9,0.9)':'rgba(251,191,36,0.92)';
    const labelC  = isLight?'#92400e':'#fef3c7';

    trailerAxles.forEach((axle,i)=>{
        const p=worldToScreen(axle.x, axle.y);
        const cx=p.sx, cy=p.sy;

        // Axle beam: horizontal line spanning the full Y width
        ctx.save();
        ctx.strokeStyle=beamC;
        ctx.lineWidth=2.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(cx, cy-halfSpanPx-wheelDpx/2);
        ctx.lineTo(cx, cy+halfSpanPx+wheelDpx/2);
        ctx.stroke();

        // Two wheel pairs — one at +halfSpan, one at -halfSpan
        [-halfSpanPx, halfSpanPx].forEach(yOff=>{
            const wy=cy+yOff;
            // Tyre block (filled amber rectangle)
            ctx.fillStyle=fillC;
            ctx.strokeStyle=wheelC;
            ctx.lineWidth=1.5;
            ctx.beginPath();
            ctx.rect(cx-wheelWpx/2, wy-wheelDpx/2, wheelWpx, wheelDpx);
            ctx.fill();
            ctx.stroke();
            // Inner tread line
            ctx.strokeStyle=beamC;
            ctx.lineWidth=0.8;
            ctx.setLineDash([2,2]);
            ctx.beginPath();
            ctx.moveTo(cx-wheelWpx/2+2, wy);
            ctx.lineTo(cx+wheelWpx/2-2, wy);
            ctx.stroke();
            ctx.setLineDash([]);
        });

        // Axle number label (small, above the axle center)
        ctx.fillStyle=labelC;
        ctx.font='bold 7px monospace';
        ctx.textAlign='center';
        ctx.fillText(`A${i+1}`, cx, cy-halfSpanPx-wheelDpx/2-3);

        ctx.restore();
    });
}

function refreshPlanView() {
    drawAxleOverlay();
    requestAnimationFrame(()=>drawAxleOverlay());
}
window.addEventListener('resize',()=>drawAxleOverlay());

// EXCEL SYNC
// ============================================================
async function pullExcelTankData() {
    if (!isOfficeInitialized) { generateMockSystemValues(); return; }
    try {
        await Excel.run(async(context)=>{
            const crestSheet=context.workbook.worksheets.getItem(CREST_SHEET_NAME);
            const editorSheet=context.workbook.worksheets.getItem("Load_Editor");
            crestSheet.load("name");
            const crestEndRow=CREST_START_ROW+CREST_MAX_ROWS-1;
            const rangeCrest=crestSheet.getRange(`Q${CREST_START_ROW}:T${crestEndRow}`);
            rangeCrest.load("values");
            const cellTrim=editorSheet.getRange("E8"); cellTrim.load("values");
            const cellHeel=editorSheet.getRange("E9"); cellHeel.load("values");
            const rangeCornerLabels=editorSheet.getRange("I1:I6"); rangeCornerLabels.load("values");
            const axleEndRow=AXLE_START_ROW+AXLE_MAX_ROWS-1;
            const rangeAxles=editorSheet.getRange(`E${AXLE_START_ROW}:F${axleEndRow}`);
            rangeAxles.load("values");
            let rangePumps=null;
            try {
                const pumpSheet=context.workbook.worksheets.getItem(PUMP_SHEET_NAME);
                const pumpEndRow=PUMP_START_ROW+PUMP_MAX_ROWS-1;
                rangePumps=pumpSheet.getRange(`A${PUMP_START_ROW}:E${pumpEndRow}`);
                rangePumps.load("values");
            } catch(e){}
            await context.sync();
            BARGE_NAME=crestSheet.name||CREST_SHEET_NAME;
            currentTrimDegrees=parseFloat(cellTrim.values[0][0]||0.0);
            currentHeelDegrees=parseFloat(cellHeel.values[0][0]||0.0);
            bargeCornerLabels=rangeCornerLabels.values.map(row=>(row[0]!==null&&row[0]!==undefined)?String(row[0]):'');
            if (rangePumps) {
                const pumpValues=rangePumps.values;
                const parsedPumps=[];
                for(let i=0;i<pumpValues.length;i++){
                    const rawTank=pumpValues[i][0], rawPump=pumpValues[i][4];
                    if(rawTank===''||rawTank===null||rawTank===undefined) break;
                    if(rawPump===''||rawPump===null||rawPump===undefined) continue;
                    parsedPumps.push({tankName:String(rawTank),pumpName:String(rawPump)});
                }
                pumpLocations=parsedPumps;
            } else { pumpLocations=[]; }
            const crestValues=rangeCrest.values;
            const geometryRows=[];
            for(let i=0;i<crestValues.length;i++){
                const [rawQ,rawR,rawS,rawT]=crestValues[i];
                if([rawQ,rawR,rawS,rawT].every(v=>v===''||v===null||v===undefined)) break;
                const q=parseFloat(rawQ),r=parseFloat(rawR),s=parseFloat(rawS),t=parseFloat(rawT);
                if([q,r,s,t].some(isNaN)) continue;
                geometryRows.push({q,r,s,t});
            }
            let nameWeightRows=[];
            if (geometryRows.length>0) {
                const editorEndRow=EXCEL_START_ROW+geometryRows.length-1;
                const rangeEditor=editorSheet.getRange(`B${EXCEL_START_ROW}:E${editorEndRow}`);
                rangeEditor.load("values");
                await context.sync();
                nameWeightRows=rangeEditor.values.map(row=>({
                    name:row[0]||null, weight:parseFloat(row[2]||0),
                    percent:parseFloat(row[3]||0), capacity:parseFloat(row[1]||0)||0
                }));
            }
            TANK_CONFIG=buildTankConfigFromCrest(geometryRows,nameWeightRows);
            recomputeBargeExtents(); rebuildTankDataFromConfig(); updateBargeInfoNote();
            tankData.forEach((tank,idx)=>{
                const extra=nameWeightRows[idx];
                if(extra){tank.weight=extra.weight.toFixed(2);tank.percent=extra.percent>1?extra.percent/100:extra.percent;}
            });
            const axleValues=rangeAxles.values;
            const parsedAxles=[];
            for(let i=0;i<axleValues.length;i++){
                const rawX=axleValues[i][0],rawY=axleValues[i][1];
                if((rawX===''||rawX===null||rawX===undefined)&&(rawY===''||rawY===null||rawY===undefined)) break;
                const x=parseFloat(rawX),y=parseFloat(rawY);
                if(isNaN(x)||isNaN(y)) continue;
                parsedAxles.push({row:AXLE_START_ROW+i,x,y});
            }
            trailerAxles=parsedAxles;
            initTankMatrix(); drawAttitudeGraphics(); refreshPlanView(); refresh3DView();
        });
    } catch(e) { console.warn("Excel sync error",e); generateMockSystemValues(); }
}

    ];
    const mockNames=["AFT P","AFT C","AFT S","C8 P","C8 C","C8 S","C7 P","C7 C","C7 S","C6 P","C6 C","C6 S","C5 P","C5 C","C5 S","C4 P","C4 C","C4 S","C3 P","C3 C","C3 S","C2 P","C2 C","C2 S","FWD P","FWD C","FWD S"];
    const mockCapacities=[280,380,280,240,320,240,220,300,220,200,270,200,180,250,180,150,210,150,130,180,130,110,150,110,90,120,90];
    const mockNameWeightRows=mockCrestRows.map((_,i)=>({name:mockNames[i]||`TANK ${i+1}`,weight:0,percent:0,capacity:mockCapacities[i]||0}));
    BARGE_NAME=CREST_SHEET_NAME;
    bargeCornerLabels=['I1','I2','I3','I4','I5','I6'];
    pumpLocations=[
        {tankName:'AFT C',pumpName:'P1'},{tankName:'C7 C',pumpName:'P2'},
        {tankName:'C5 C',pumpName:'P3'},{tankName:'C3 C',pumpName:'P4'},
        {tankName:'FWD C',pumpName:'P5'}
    ];
    TANK_CONFIG=buildTankConfigFromCrest(mockCrestRows,mockNameWeightRows);
    recomputeBargeExtents(); rebuildTankDataFromConfig(); updateBargeInfoNote();
    tankData.forEach((tank,i)=>{
        const base=60+(i*7);
        tank.weight=(base+(i%5)*1.8).toFixed(2);
        tank.percent=Math.min(0.10+(i*0.025),0.90);
    });
    currentTrimDegrees=2.8; currentHeelDegrees=-1.9;
    trailerAxles=[
        {row:AXLE_START_ROW,x:30,y:3.2},{row:AXLE_START_ROW+1,x:30,y:-3.2},
        {row:AXLE_START_ROW+2,x:45,y:3.2},{row:AXLE_START_ROW+3,x:45,y:-3.2},
        {row:AXLE_START_ROW+4,x:60,y:3.2},{row:AXLE_START_ROW+5,x:60,y:-3.2}
    ];
    initTankMatrix(); drawAttitudeGraphics(); refreshPlanView(); refresh3DView();
    document.getElementById('connectionStatus').innerHTML='Status: <span style="color:#eab308;">● Mock (no Excel)</span>';
}

// ============================================================
// UPDATE TANK FILL
// ============================================================
async function updateTankFill(row, value) {
    const parsed=parseFloat(value);
    if (isNaN(parsed)) return;
    const cfg=TANK_CONFIG.find(t=>t.id===row);
    if (!cfg) return;
    const mockMax=cfg.capacity||1000;
    const isOverCapacity=parsed>mockMax;
    let targetPct=Math.max(0,Math.min(parsed/mockMax,1.0));
    const pctNum=targetPct*100;
    const card=document.getElementById(`tank_card_${row}`);
    if (!card) return;
    const water=card.querySelector('.tank-water-level');
    const label=document.getElementById(`lbl_Load${row}`);
    const input=document.getElementById(`txt_Row${row}`);
    const warning=document.getElementById(`warn_Row${row}`);
    if(water){water.style.height=`${pctNum}%`;water.classList.toggle('tank-water-high',pctNum>=85);}
    if(label){label.textContent=`${pctNum.toFixed(0)}% (Cap. ${cfg.capacity}t)`;}
    if(input) input.classList.toggle('weight-input-over',isOverCapacity);
    if(warning){warning.style.display=isOverCapacity?'':'none';warning.textContent=isOverCapacity?`⚠ Exceeds capacity (${cfg.capacity}t)`:'';} 

    // Update 3D too
    const td=tankData.find(t=>t.row===row);
    if(td){td.weight=parsed;td.percent=targetPct;}
    update3DFillAndAttitude();

    if (!isOfficeInitialized) return;
    try {
        await Excel.run(async(context)=>{
            const sheet=context.workbook.worksheets.getItem("Load_Editor");
            sheet.getRange(`D${row}`).values=[[parsed]];
            await context.sync();
            setTimeout(pullExcelTankData,300);
        });
    } catch(e){console.warn("Excel write error",e);}
}

// ============================================================
// THEME TOGGLE — Day/Night shared with 3D sky
// ============================================================
function toggleDashboardTheme() {
    const checked=document.getElementById('themeToggleCheckbox').checked;
    document.body.classList.toggle('light-theme',checked);
    drawAttitudeGraphics();
    drawAxleOverlay();
    // Day/Night in 3D = only sky color changes
    set3DEnvironment(!checked); // night when toggled to dark
}

function toggleTrailerOverlay() {
    showTrailer=document.getElementById('trailerToggleCheckbox').checked;
    drawAxleOverlay();
    // Also update 3D axle visibility
    if(axleMeshes3d) axleMeshes3d.forEach(m=>{ if(m.parent) m.visible=showTrailer; });
}

// ============================================================
// OFFICE INIT
// ============================================================
if (typeof Office!=='undefined'&&Office&&typeof Office.onReady==='function') {
    Office.onReady((info)=>{
        if(info.host===Office.HostType.Excel){
            isOfficeInitialized=true;
            document.getElementById('connectionStatus').innerHTML='Status: <span style="color:var(--accent-green);">● Excel connected</span>';
            pullExcelTankData(); registerExcelAutoTrack();
        } else {
            document.getElementById('connectionStatus').innerHTML='Status: <span style="color:#eab308;">● Demo mode</span>';
            generateMockSystemValues();
        }
    });
} else {
    const statusEl=document.getElementById('connectionStatus');
    if(statusEl) statusEl.innerHTML='Status: <span style="color:#eab308;">● Demo mode (standalone)</span>';
    generateMockSystemValues();
}

async function registerExcelAutoTrack() {
    try {
        await Excel.run(async(context)=>{
            const sheet=context.workbook.worksheets.getItem("Load_Editor");
            sheet.onChanged.add(async()=>{await pullExcelTankData();});
            await context.sync();
        });
    } catch(e){}
}

window.addEventListener('load',()=>{if(!isOfficeInitialized) generateMockSystemValues();});
</script>

<script>
// ============================================================
// 3D BALLAST VIEW
// ============================================================
const TANK_DEPTH_M=6.0;
const DECK_THICKNESS_M=0.022;
const TANK_DECK_GAP_M=0.05;
const PUMP_HEIGHT_Z_M=1.25;
const AXLE_BOX={x:0.86,y:AXLE_HEIGHT_Y,z:1.4};
const BARGE_QUAY_GAP_M=1.2;
const QUAY_SLAB_THICKNESS_M=0.4;
const TANK_FOOTPRINT_GAP_M=0.12;

function worldYToZ3D(y){return -y;}

let scene3d,camera3d,renderer3d,hull3dGroup,world3dGroup,deckPlate3d;
let tankMeshes3d=[],pumpMeshes3d=[],axleMeshes3d=[],quayMeshes3d=[];
let isDragging3d=false,isPanning3d=false,lastX3d=0,lastY3d=0;
let theta3d=Math.PI/4,phi3d=0.95,radius3d=180;
let panOffsetX=0,panOffsetY=0;
let lookAtX3d=0;
let current3DCamera='iso-fwd-ps';
let ambientLight3d,dirLight3d,skyMesh3d,is3DNightMode=false;

// ---- Sky dome ----
// Day = light blue; Night = near-black. Only the sky changes.
const SKY_DAY_COLOR=0x5ba8d4;
const SKY_NIGHT_COLOR=0x04060c;

const CAM_PRESETS_3D={
    'iso-fwd-ps':{az:45,el:32,r:180},
    'iso-fwd-sb':{az:135,el:32,r:180},
    'iso-aft-ps':{az:-45,el:32,r:180},
    'iso-aft-sb':{az:-135,el:32,r:180},
    'top':{az:0,el:89,r:180},
    'side':{az:0,el:8,r:180},
    'front':{az:90,el:6,r:160},
    'end':{az:-90,el:6,r:160}
};

function init3DScene() {
    const container=document.getElementById('viewer3d');
    if (!container||scene3d) return;
    scene3d=new THREE.Scene();
    camera3d=new THREE.PerspectiveCamera(38,container.clientWidth/Math.max(container.clientHeight,1),0.1,2000);
    renderer3d=new THREE.WebGLRenderer({antialias:true,alpha:false});
    renderer3d.setSize(container.clientWidth,container.clientHeight);
    renderer3d.setPixelRatio(window.devicePixelRatio||1);
    container.appendChild(renderer3d.domElement);

    ambientLight3d=new THREE.AmbientLight(0xffffff,0.65);
    scene3d.add(ambientLight3d);
    dirLight3d=new THREE.DirectionalLight(0xffffff,0.9);
    dirLight3d.position.set(40,60,30);
    scene3d.add(dirLight3d);

    world3dGroup=new THREE.Group();
    scene3d.add(world3dGroup);
    hull3dGroup=new THREE.Group();
    world3dGroup.add(hull3dGroup);

    // Sky hemisphere — only fills upper hemisphere, not the whole scene
    // background, so the sky "area" is smaller and the barge is more prominent.
    // Using a hemisphere mesh (radius=600) so the sky is visible but tight.
    const skyGeo=new THREE.SphereGeometry(600,16,8,0,Math.PI*2,0,Math.PI*0.5);
    skyMesh3d=new THREE.Mesh(skyGeo,new THREE.MeshBasicMaterial({color:SKY_DAY_COLOR,side:THREE.BackSide,depthWrite:false}));
    scene3d.add(skyMesh3d);
    // Dark background fills areas the hemisphere doesn't cover (below horizon)
    renderer3d.setClearColor(0x0a1018,1);

    // Input handling: orbit (drag) + pan (shift+drag)
    container.addEventListener('mousedown',(e)=>{
        if(e.shiftKey){isPanning3d=true;}else{isDragging3d=true;}
        lastX3d=e.clientX; lastY3d=e.clientY;
    });
    window.addEventListener('mouseup',()=>{isDragging3d=false;isPanning3d=false;});
    window.addEventListener('mousemove',(e)=>{
        const dx=e.clientX-lastX3d, dy=e.clientY-lastY3d;
        lastX3d=e.clientX; lastY3d=e.clientY;
        if (isDragging3d){
            theta3d-=dx*0.006;
            phi3d=Math.max(0.05,Math.min(1.5,phi3d-dy*0.006));
            updateCamera3DPosition();
        } else if(isPanning3d){
            // Pan: move lookAt in the plane perpendicular to camera direction
            const panSpeed=0.08;
            // Right vector (camera local X)
            const camDir=new THREE.Vector3();
            camera3d.getWorldDirection(camDir);
            const right=new THREE.Vector3().crossVectors(camera3d.up,camDir).normalize();
            const up=new THREE.Vector3().crossVectors(camDir,right).normalize();
            panOffsetX+=(-dx*right.x+dy*up.x)*panSpeed;
            panOffsetY+=(-dx*right.z+dy*up.z)*panSpeed;
            updateCamera3DPosition();
        }
    });
    container.addEventListener('wheel',(e)=>{
        e.preventDefault();
        radius3d=Math.max(40,Math.min(600,radius3d+e.deltaY*0.10));
        updateCamera3DPosition();
    },{passive:false});

    // Touch support for mobile
    let lastTouchX=0,lastTouchY=0,lastTouchDist=0;
    container.addEventListener('touchstart',(e)=>{
        if(e.touches.length===1){lastTouchX=e.touches[0].clientX;lastTouchY=e.touches[0].clientY;}
        if(e.touches.length===2){lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
    });
    container.addEventListener('touchmove',(e)=>{
        e.preventDefault();
        if(e.touches.length===1){
            const dx=e.touches[0].clientX-lastTouchX, dy=e.touches[0].clientY-lastTouchY;
            theta3d-=dx*0.006; phi3d=Math.max(0.05,Math.min(1.5,phi3d-dy*0.006));
            lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
            updateCamera3DPosition();
        } else if(e.touches.length===2){
            const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
            radius3d=Math.max(40,Math.min(600,radius3d-(dist-lastTouchDist)*0.5));
            lastTouchDist=dist;
            updateCamera3DPosition();
        }
    },{passive:false});

    window.addEventListener('resize',()=>{
        if(!container.clientWidth) return;
        camera3d.aspect=container.clientWidth/Math.max(container.clientHeight,1);
        camera3d.updateProjectionMatrix();
        renderer3d.setSize(container.clientWidth,container.clientHeight);
    });

    function animate3d(){
        requestAnimationFrame(animate3d);
        if(renderer3d&&scene3d&&camera3d) renderer3d.render(scene3d,camera3d);
        if(typeof renderLabels3D==='function') renderLabels3D();
    }
    animate3d();
}

function azElToThetaPhi3D(az,el){
    return {theta:(az*Math.PI)/180,phi:((90-el)*Math.PI)/180};
}

function updateCamera3DPosition() {
    if (!camera3d) return;
    const lx=lookAtX3d+panOffsetX;
    const lz=panOffsetY;
    camera3d.position.x=lx+radius3d*Math.sin(phi3d)*Math.sin(theta3d);
    camera3d.position.z=lz+radius3d*Math.sin(phi3d)*Math.cos(theta3d);
    camera3d.position.y=radius3d*Math.cos(phi3d);
    camera3d.lookAt(lx,-1,lz);
}

function set3DCamera(name) {
    const p=CAM_PRESETS_3D[name];
    if (!p) return;
    current3DCamera=name;
    const tp=azElToThetaPhi3D(p.az,p.el);
    theta3d=tp.theta; phi3d=tp.phi;
    radius3d=p.r||180;
    panOffsetX=0; panOffsetY=0;
    updateCamera3DPosition();
    Object.keys(CAM_PRESETS_3D).forEach(k=>{
        const b=document.getElementById('cam3d-'+k);
        if(b) b.style.fontWeight=(k===name)?'700':'400';
    });
}

function set3DDeckVisible(visible){if(deckPlate3d) deckPlate3d.visible=visible;}

// Day/Night: ONLY sky color changes
function set3DEnvironment(isNight) {
    is3DNightMode=isNight;
    if(!scene3d) return;
    if(skyMesh3d) skyMesh3d.material.color.set(isNight?SKY_NIGHT_COLOR:SKY_DAY_COLOR);
    // Keep all other lighting constant regardless of mode
}

function disposeMeshDeep(obj){
    if(!obj) return;
    if(obj.children&&obj.children.length)[...obj.children].forEach(child=>disposeMeshDeep(child));
    if(obj.geometry) obj.geometry.dispose();
    if(obj.material) obj.material.dispose();
}

function clear3DGeometry(){
    if(!hull3dGroup) return;
    [...hull3dGroup.children].forEach(m=>{hull3dGroup.remove(m);disposeMeshDeep(m);});
    tankMeshes3d=[]; pumpMeshes3d=[]; axleMeshes3d=[];
    quayMeshes3d.forEach(m=>{if(m.parent) m.parent.remove(m);disposeMeshDeep(m);});
    quayMeshes3d=[]; deckPlate3d=null;
}

function rebuild3DGeometry(){
    if(!hull3dGroup||!TANK_CONFIG.length) return;
    clear3DGeometry();

    const TANK_TOP_Y=0;
    const DECK_UNDERSIDE_Y=TANK_TOP_Y+TANK_DECK_GAP_M;
    const DECK_TOP_Y=DECK_UNDERSIDE_Y+DECK_THICKNESS_M;
    const QUAY_TOP_Y=DECK_TOP_Y;
    const bargeLength3d=BARGE_X_MAX-BARGE_X_MIN;
    const bargeCenterX3d=(BARGE_X_MIN+BARGE_X_MAX)/2;
    const bargeWidth3d=BARGE_Y_MAX-BARGE_Y_MIN;
    lookAtX3d=bargeCenterX3d;

    // Hull bottom
    const bottomShell=new THREE.Mesh(
        new THREE.BoxGeometry(bargeLength3d,0.6,bargeWidth3d),
        new THREE.MeshPhongMaterial({color:0x4b5563})
    );
    bottomShell.position.set(bargeCenterX3d,TANK_TOP_Y-TANK_DEPTH_M-0.3,0);
    hull3dGroup.add(bottomShell);

    // Deck plate
    deckPlate3d=new THREE.Mesh(
        new THREE.BoxGeometry(bargeLength3d,DECK_THICKNESS_M,bargeWidth3d),
        new THREE.MeshPhongMaterial({color:0x9aa3ad,transparent:true,opacity:0.18,depthWrite:false,side:THREE.DoubleSide})
    );
    deckPlate3d.position.set(bargeCenterX3d,DECK_TOP_Y-DECK_THICKNESS_M/2,0);
    hull3dGroup.add(deckPlate3d);
    const deckToggle=document.getElementById('deck3dToggle');
    if(deckToggle) deckPlate3d.visible=deckToggle.checked;

    // Water plane — flat in world space
    const waterMesh=new THREE.Mesh(
        new THREE.PlaneGeometry(800,800),
        new THREE.MeshPhongMaterial({color:0x1d6fa5,transparent:true,opacity:0.32,side:THREE.DoubleSide})
    );
    waterMesh.rotation.x=-Math.PI/2;
    waterMesh.position.y=TANK_TOP_Y-TANK_DEPTH_M-3.2;
    world3dGroup.add(waterMesh);
    quayMeshes3d.push(waterMesh);

    // Tanks
    TANK_CONFIG.forEach(cfg=>{
        const w=Math.max(0.05,cfg.width-TANK_FOOTPRINT_GAP_M);
        const h=Math.max(0.05,cfg.height-TANK_FOOTPRINT_GAP_M);
        const shell=new THREE.Mesh(
            new THREE.BoxGeometry(w,TANK_DEPTH_M,h),
            new THREE.MeshPhongMaterial({color:0xb8c2cc,transparent:true,opacity:0.18})
        );
        shell.position.set(cfg.x,TANK_TOP_Y-TANK_DEPTH_M/2,worldYToZ3D(cfg.y));
        hull3dGroup.add(shell);
        const ballast=new THREE.Mesh(
            new THREE.BoxGeometry(w*0.92,0.01,h*0.92),
            new THREE.MeshPhongMaterial({color:0x3aa6e8})
        );
        ballast.position.set(cfg.x,TANK_TOP_Y-TANK_DEPTH_M+0.005,worldYToZ3D(cfg.y));
        hull3dGroup.add(ballast);
        tankMeshes3d.push({cfgId:cfg.id,shell,ballast,depth:TANK_DEPTH_M,topY:TANK_TOP_Y});
    });

    // Pump markers — top-right for PS (+Y), bottom-right for SB (-Y)
    pumpLocations.forEach(pump=>{
        const targetNorm=normalizeTankName(pump.tankName);
        const cfg=TANK_CONFIG.find(t=>normalizeTankName(t.name)===targetNorm);
        if (!cfg) return;
        const isPS=cfg.y>=0;
        const cornerX=cfg.x+cfg.width/2;
        // PS → top-right of tank footprint (max Y → min Z in 3D), SB → bottom-right (min Y → max Z)
        const cornerZ=worldYToZ3D(isPS?(cfg.y+cfg.height/2):(cfg.y-cfg.height/2));
        const post=new THREE.Mesh(
            new THREE.CylinderGeometry(0.35,0.35,PUMP_HEIGHT_Z_M,12),
            new THREE.MeshPhongMaterial({color:0xa855f7})
        );
        post.position.set(cornerX,DECK_TOP_Y+PUMP_HEIGHT_Z_M/2,cornerZ);
        hull3dGroup.add(post);
        const cap=new THREE.Mesh(
            new THREE.SphereGeometry(0.55,12,12),
            new THREE.MeshPhongMaterial({color:0xf5f3ff})
        );
        cap.position.set(cornerX,DECK_TOP_Y+PUMP_HEIGHT_Z_M,cornerZ);
        hull3dGroup.add(cap);
        pumpMeshes3d.push(post,cap);
    });

    // Axle markers — two boxes per axle, visibility tied to showTrailer
    const AXLE_PAIR_SPACING_M=1.45;
    trailerAxles.forEach(axle=>{
        const axleGroup=new THREE.Group();
        const halfSpacing=AXLE_PAIR_SPACING_M/2;
        [-halfSpacing,halfSpacing].forEach(offsetY=>{
            const box=new THREE.Mesh(
                new THREE.BoxGeometry(AXLE_BOX.x,AXLE_BOX.z,AXLE_BOX.y),
                new THREE.MeshPhongMaterial({color:0xf59e0b,transparent:true,opacity:0.88})
            );
            box.position.set(0,DECK_TOP_Y+AXLE_BOX.z/2,offsetY);
            axleGroup.add(box);
        });
        // Axle beam connecting the two pairs
        const beam=new THREE.Mesh(
            new THREE.BoxGeometry(AXLE_BOX.x*0.3,0.12,AXLE_PAIR_SPACING_M),
            new THREE.MeshPhongMaterial({color:0x78350f})
        );
        beam.position.set(0,DECK_TOP_Y+0.06,0);
        axleGroup.add(beam);
        axleGroup.position.set(axle.x,0,worldYToZ3D(axle.y));
        axleGroup.visible=showTrailer;
        hull3dGroup.add(axleGroup);
        axleMeshes3d.push(axleGroup);
    });

    // Quay
    const quayLen=10;
    const quayXEnd=BARGE_X_MIN-BARGE_QUAY_GAP_M;
    const quayXStart=quayXEnd-quayLen;
    const quayWidth=bargeWidth3d+14;
    const quayBodyTopY=QUAY_TOP_Y-QUAY_SLAB_THICKNESS_M;
    const quayBodyBottomY=TANK_TOP_Y-TANK_DEPTH_M-0.9;
    const quayBodyHeight=quayBodyTopY-quayBodyBottomY;
    const quayBody=new THREE.Mesh(
        new THREE.BoxGeometry(quayLen,quayBodyHeight,quayWidth),
        new THREE.MeshPhongMaterial({color:0x8a8f98})
    );
    quayBody.position.set(quayXStart+quayLen/2,quayBodyBottomY+quayBodyHeight/2,0);
    world3dGroup.add(quayBody);
    quayMeshes3d.push(quayBody);
    const quaySlab=new THREE.Mesh(
        new THREE.BoxGeometry(quayLen,QUAY_SLAB_THICKNESS_M,quayWidth),
        new THREE.MeshPhongMaterial({color:0x5a5e66})
    );
    quaySlab.position.set(quayXStart+quayLen/2,QUAY_TOP_Y-QUAY_SLAB_THICKNESS_M/2,0);
    world3dGroup.add(quaySlab);
    quayMeshes3d.push(quaySlab);
}

function update3DFillAndAttitude(){
    if(!hull3dGroup||!tankMeshes3d.length) return;
    tankMeshes3d.forEach(tm=>{
        const td=tankData.find(t=>t.row===tm.cfgId);
        const pct=td?Math.max(0,Math.min(1,td.percent)):0;
        const waterHeight=Math.max(0.002,pct*TANK_DEPTH_M);
        tm.ballast.scale.y=waterHeight/0.01;
        tm.ballast.position.y=0-TANK_DEPTH_M+waterHeight/2;
        const hot=pct>=0.85;
        tm.ballast.material.color.set(hot?0xf08a3c:0x3aa6e8);
    });
    // Sync axle visibility
    axleMeshes3d.forEach(m=>{ m.visible=showTrailer; });
    hull3dGroup.rotation.z=(currentTrimDegrees*Math.PI)/180;
    hull3dGroup.rotation.x=(-currentHeelDegrees*Math.PI)/180;
}

// ============================================================
// 3D LABELS — deduplication/anti-overlap + trim/heel in dir labels
// ============================================================
let labelAnchors3d=[];

function buildLabelAnchors3D(){
    labelAnchors3d.forEach(a=>{if(a.obj&&a.obj.parent) a.obj.parent.remove(a.obj);});
    labelAnchors3d=[];
    if(!hull3dGroup||!TANK_CONFIG.length) return;

    const midX=(BARGE_X_MIN+BARGE_X_MAX)/2;
    const labelY=2.0;

    function addAnchor(id,x,y,z,cls){
        const obj=new THREE.Object3D();
        obj.position.set(x,y,z);
        hull3dGroup.add(obj);
        labelAnchors3d.push({id,obj,cls});
    }

    // Direction labels (text computed live with trim/heel values)
    addAnchor('aft',BARGE_X_MIN,labelY,0,'edge');
    addAnchor('fwd',BARGE_X_MAX,labelY,0,'edge');
    addAnchor('ps',midX,labelY,worldYToZ3D(BARGE_Y_MAX),'edge');
    addAnchor('sb',midX,labelY,worldYToZ3D(BARGE_Y_MIN),'edge');

    // 6 corner labels from bargeCornerLabels
    addAnchor('corner0',BARGE_X_MIN,labelY,worldYToZ3D(BARGE_Y_MAX),'corner');
    addAnchor('corner1',midX,labelY,worldYToZ3D(BARGE_Y_MAX),'corner');
    addAnchor('corner2',BARGE_X_MAX,labelY,worldYToZ3D(BARGE_Y_MAX),'corner');
    addAnchor('corner3',BARGE_X_MIN,labelY,worldYToZ3D(BARGE_Y_MIN),'corner');
    addAnchor('corner4',midX,labelY,worldYToZ3D(BARGE_Y_MIN),'corner');
    addAnchor('corner5',BARGE_X_MAX,labelY,worldYToZ3D(BARGE_Y_MIN),'corner');

    // % fill labels — one per tank, at the tank's 3D centroid
    TANK_CONFIG.forEach(cfg=>{
        const obj=new THREE.Object3D();
        // Place at deck level above tank center
        obj.position.set(cfg.x,1.5,worldYToZ3D(cfg.y));
        hull3dGroup.add(obj);
        labelAnchors3d.push({id:`fill_${cfg.id}`,obj,cls:'fill',cfgId:cfg.id});
    });
}

// Simple overlap suppression: given an array of {sx,sy,text,priority},
// iterate sorted by priority (ascending = higher priority goes first),
// mark any that overlap with an already-placed label as hidden.
function suppressOverlaps(items, margin=8){
    const placed=[];
    items.forEach(item=>{
        if(item.hidden) return;
        const w=(item.text.length*6)+12;
        const h=16;
        const r={x:item.sx-w/2,y:item.sy-h/2,w,h};
        let overlaps=false;
        for(const p of placed){
            if(r.x<p.x+p.w+margin&&r.x+r.w>p.x-margin&&r.y<p.y+p.h+margin&&r.y+r.h>p.y-margin){
                overlaps=true; break;
            }
        }
        if(overlaps) item.hidden=true;
        else placed.push(r);
    });
}

function renderLabels3D(){
    const layer=document.getElementById('labels3d');
    const container=document.getElementById('viewer3d');
    if(!layer||!container||!camera3d||!labelAnchors3d.length) return;

    const w=container.clientWidth, h=container.clientHeight;
    const v=new THREE.Vector3();

    const trimAbs=Math.abs(currentTrimDegrees).toFixed(2);
    const heelAbs=Math.abs(currentHeelDegrees).toFixed(2);

    // Build label list with screen positions
    const items=[];

    labelAnchors3d.forEach(a=>{
        a.obj.getWorldPosition(v);
        v.project(camera3d);
        if(v.z>1) return; // behind camera
        const sx=(v.x*0.5+0.5)*w;
        const sy=(-v.y*0.5+0.5)*h;
        // Cull if off-screen
        if(sx<-50||sx>w+50||sy<-30||sy>h+30) return;

        if(a.cls==='edge'){
            let text='';
            if(a.id==='aft'){
                const trimText=currentTrimDegrees>0?` ${trimAbs}°↓`:(currentTrimDegrees<0?` ${trimAbs}°↑`:'');
                text='AFT'+trimText;
            } else if(a.id==='fwd'){
                const trimText=currentTrimDegrees<0?` ${trimAbs}°↓`:(currentTrimDegrees>0?` ${trimAbs}°↑`:'');
                text='FWD'+trimText;
            } else if(a.id==='ps'){
                const heelText=currentHeelDegrees>0?` ${heelAbs}°↓`:(currentHeelDegrees<0?` ${heelAbs}°↑`:'');
                text='PS'+heelText;
            } else if(a.id==='sb'){
                const heelText=currentHeelDegrees<0?` ${heelAbs}°↓`:(currentHeelDegrees>0?` ${heelAbs}°↑`:'');
                text='SB'+heelText;
            }
            const isActive=(a.id==='aft'&&currentTrimDegrees>0)||(a.id==='fwd'&&currentTrimDegrees<0)||
                            (a.id==='ps'&&currentHeelDegrees>0)||(a.id==='sb'&&currentHeelDegrees<0);
            items.push({sx,sy,text,cls:'edge',priority:0,isActive});
        } else if(a.cls==='corner'){
            const idx=parseInt(a.id.replace('corner',''),10);
            const text=formatCornerLabelText((bargeCornerLabels[idx]||'').trim());
            if(!text) return;
            items.push({sx,sy,text,cls:'corner',priority:1});
        } else if(a.cls==='fill'){
            const td=tankData.find(t=>t.row===a.cfgId);
            if(!td) return;
            const pct=Math.round((td.percent||0)*100);
            items.push({sx,sy,text:`${pct}%`,cls:'fill',priority:2});
        }
    });

    // Sort by priority so higher-priority labels claim space first
    items.sort((a,b)=>a.priority-b.priority);
    suppressOverlaps(items,6);

    let html='';
    items.forEach(item=>{
        if(item.hidden) return;
        if(item.cls==='edge'){
            const bg=item.isActive?'rgba(249,115,22,0.85)':'rgba(15,17,21,0.60)';
            const fc=item.isActive?'#fff7ed':'#fef3c7';
            html+=`<div style="position:absolute;left:${item.sx}px;top:${item.sy}px;transform:translate(-50%,-50%);font-size:11px;font-weight:700;letter-spacing:0.5px;color:${fc};background:${bg};padding:2px 6px;border-radius:4px;white-space:nowrap;">${item.text}</div>`;
        } else if(item.cls==='corner'){
            html+=`<div style="position:absolute;left:${item.sx}px;top:${item.sy}px;transform:translate(-50%,-50%);font-size:10px;color:#cbd5e1;background:rgba(15,17,21,0.5);padding:1px 5px;border-radius:4px;white-space:nowrap;">${item.text}</div>`;
        } else if(item.cls==='fill'){
            html+=`<div style="position:absolute;left:${item.sx}px;top:${item.sy}px;transform:translate(-50%,-50%);font-size:9px;font-weight:600;color:#7dd3fc;background:rgba(0,0,0,0.45);padding:1px 4px;border-radius:3px;white-space:nowrap;">${item.text}</div>`;
        }
    });

    layer.innerHTML=html;
}

let last3DSignature='';
function refresh3DView(){
    const container=document.getElementById('viewer3d');
    if(!container) return;
    if(!scene3d){
        init3DScene();
        set3DCamera('iso-fwd-ps');
        // Apply current day/night state to sky
        const isNight=!document.getElementById('themeToggleCheckbox').checked;
        set3DEnvironment(isNight);
    }
    const signature=TANK_CONFIG.length+'|'+trailerAxles.length+'|'+pumpLocations.length;
    if(signature!==last3DSignature){
        rebuild3DGeometry();
        buildLabelAnchors3D();
        last3DSignature=signature;
    }
    update3DFillAndAttitude();
    renderLabels3D();
}
