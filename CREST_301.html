<html lang="en">
<head>

    <title>CREST_301 Table Viewer-36</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

    <script src="https://cdn.jsdelivr.net/npm/hyperformula/dist/hyperformula.full.min.js"></script>

    <style>
        :root {
            \n --bg:#0f1115;
            --panel: #161a21;
            --border: #2a2f3a;
            --text: #e6e9ef;
            --text-muted: #8b93a3;
            \n --accent:#3b82f6;
            --accent-2: #10b981;
            --header-bg: #1c212b;
            --stripe: #141821;
            --hover: #1f2937;
            \n
        }

        \n * {
            box-sizing: border-box;
        }

        \n html, body {
            height: 100%;
        }

        \n body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Segoe UI, Arial, sans-serif;
            font-size: 12px;
            \n display:flex;
            flex-direction: column;
            overflow: hidden;
        }

        \n header {
            flex: 0 0 auto;
            z-index: 50;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            \n padding:10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

            \n header h1 {
                font-size: 15px;
                margin: 0;
                font-weight: 600;
                letter-spacing: 0.5px;
                display: flex;
                align-items: center;
                gap: 6px;
            }

        \n .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        \n .status-excel {
            background: #10b98120;
            color: #10b981;
            border: 1px solid #10b98140;
        }

        \n .status-cache {
            background: #3b82f620;
            color: #3b82f6;
            border: 1px solid #3b82f640;
        }

        \n .status-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }

        \n .btn-refresh {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            \n cursor:pointer;
            font-weight: 500;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

            \n .btn-refresh:hover {
                background: #2563eb;
            }

            \n .btn-refresh:disabled {
                background: var(--border);
                color: var(--text-muted);
                cursor: not-allowed;
            }

        \n \n /* Formula Bar */ \n .formula-bar {
            flex: 0 0 auto;
            background: #1a1f29;
            border-bottom: 1px solid var(--border);
            \n display:flex;
            align-items: center;
            padding: 4px 8px;
            gap: 4px;
        }

        \n .fb-addr {
            min-width: 50px;
            padding: 2px 6px;
            background: var(--panel);
            border: 1px solid var(--border);
            \n border-radius:3px;
            text-align: center;
            font-family: monospace;
            font-weight: bold;
            color: var(--accent-2);
        }

        \n .fb-fx {
            font-style: italic;
            font-weight: bold;
            color: var(--text-muted);
            padding: 0 4px;
            user-select: none;
        }

        \n .fb-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            \n padding:4px 8px;
            border-radius: 3px;
            font-family: Segoe UI,sans-serif;
            font-size: 12px;
        }

            \n .fb-input:focus {
                outline: none;
                border-color: var(--accent);
            }

        \n\n /* Main Grid Workspace */ \n .workspace {
            flex: 1;
            overflow: auto;
            position: relative;
            background: var(--bg);
        }

        \n table {
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            width: max-content;
        }

        \n th, td {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            \n padding:4px 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: middle;
        }

        \n th {
            background: var(--header-bg);
            color: var(--text-muted);
            font-weight: normal;
            \n position:sticky;
            top: 0;
            z-index: 20;
            user-select: none;
            text-align: center;
        }

            \n th.row-hdr {
                position: sticky;
                left: 0;
                z-index: 30;
                background: var(--header-bg);
                width: 40px;
                text-align: center;
            }

            \n th.col-hdr-top {
                text-align: center;
            }

            \n th.corner {
                position: sticky;
                top: 0;
                left: 0;
                z-index: 40;
                background: #222834;
            }

        \n \n td {
            background: var(--panel);
        }

        \n tr:nth-child(even) td:not(.selected) {
            background: var(--stripe);
        }

        \n tr:hover td:not(.selected) {
            background: var(--hover);
        }

        \n \n td.selected {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
            background: #3b82f615 !important;
        }

        \n td.has-formula::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            border-width: 3px;
            border-style: solid;
            border-color: var(--accent-2) var(--accent-2) transparent transparent;
        }

        \n \n .align-left {
            text-align: left;
        }

        \n .align-center {
            text-align: center;
        }

        \n .align-right {
            text-align: right;
        }

        \n
    </style>
</head>
<body>

    <header>
        <h1>📊 CREST_301 Data Viewer <span id="lblStatus" class="status-badge status-cache">Cache</span></h1>
        <button id="btnRefresh" class="btn-refresh" onclick="refreshData()">↻ Refresh</button>
        <span id="lblTime" class="status-time">Loaded: --:--:--</span>
    </header>

    <div class="formula-bar">
        <div id="fbAddr" class="fb-addr">—</div>
        <div class="fb-fx">fx</div>
        <input type="text" id="fbInput" class="fb-input" placeholder="Select a cell to view or evaluate formula expressions" disabled onkeydown="handleFbKeydown(event)" onblur="commitFormulaBar()">
    </div>

    <div class="workspace" id="gridHost"></div>

    <script>
        // ============================================================
        // 1. DATABASE CONFIG & STATE
        // ============================================================
        const FIREBASE_URL = "https://bargeballast-default-rtdb.firebaseio.com";
        const FIREBASE_NODE = "crest_301_cache";

        let currentData = {};
        let currentMeta = { rows: 60, cols: 20, colWidth: 90 };
        let selectedCell = null; // { r, c }
        let isOfficeInitialized = false;

        // HyperFormula Instance Configuration
        let hfInstance = null;
        let hfSheetId = null;

        // Built-in Static Backup Data Matrix
        const BAKED_DATA = {
            "B3": "CREST_301", "B4": "BALLAST SYSTEM CALCULATION ENGINE",
            "B6": "Tank Name", "C6": "Capacity (m³)", "D6": "Current Vol (m³)", "E6": "Fill %",
            "B7": "Ballast W1", "C7": "450.0", "D7": "225.0", "E7": "=D7/C7",
            "B8": "Ballast W2", "C8": "450.0", "D8": "450.0", "E8": "=D8/C8",
            "B9": "Ballast P1", "C9": "500.0", "D9": "100.0", "E9": "=D9/C9",
            "B10": "Ballast P2", "C10": "500.0", "D10": "0.0", "E10": "=D10/C10",
            "B12": "Total Fleet", "C12": "=SUM(C7:C10)", "D12": "=SUM(D7:D10)", "E12": "=D12/C12"
        };

        // Convert A1 string mapping coordinate to 0-indexed row/col numbers
        function a1ToCoord(a1) {
            const match = a1.match(/^([A-Z]+)([0-9]+)$/);
            if (!match) return null;
            const colStr = match[1];
            const rowStr = match[2];
            let col = 0;
            for (let i = 0; i < colStr.length; i++) {
                col = col * 26 + (colStr.charCodeAt(i) - 64);
            }
            return { r: parseInt(rowStr, 10) - 1, c: col - 1 };
        }

        function coordToA1(r, c) {
            let colStr = "";
            let temp = c;
            while (temp >= 0) {
                colStr = String.fromCharCode((temp % 26) + 65) + colStr;
                temp = Math.floor(temp / 26) - 1;
            }
            return colStr + (r + 1);
        }

        // ============================================================
        // 2. CALCULATION ENGINE (HYPERFORMULA ENGINE)
        // ============================================================
        function initHyperFormulaEngine() {
            if (window.HyperFormula) {
                hfInstance = window.HyperFormula.HyperFormula.buildEmpty({
                    licenseKey: 'gpl-v3',
                    chooseAddressMappingPolicy: 'dense'
                });
                hfSheetId = hfInstance.addSheet('CREST_301');
                console.log("HyperFormula Engine Initialized Successfully.");
            } else {
                console.error("HyperFormula Library not detected.");
            }
        }

        function syncDataToEngine() {
            if (!hfInstance) return;

            // Clear layout allocations
            hfInstance.clearSheet(hfSheetId);

            // Loop through items and push strings / formulas into the engine matrix
            for (const [a1, val] of Object.entries(currentData)) {
                const pt = a1ToCoord(a1);
                if (pt && pt.r < currentMeta.rows && pt.c < currentMeta.cols) {
                    hfInstance.setCellContents({ sheetId: hfSheetId, row: pt.r, col: pt.c }, [[val]]);
                }
            }
        }

        // ============================================================
        // 3. UI RENDER ENGINE
        // ============================================================
        function renderTable() {
            const host = document.getElementById("gridHost");
            if (!host) return;

            syncDataToEngine();

            const { rows, cols, colWidth } = currentMeta;
            let html = '<table>';

            // Header Columns
            html += '<tr><th class="corner"></th>';
            for (let c = 0; c < cols; c++) {
                let colName = "";
                let t = c;
                while (t >= 0) { colName = String.fromCharCode((t % 26) + 65) + colName; t = Math.floor(t / 26) - 1; }
                html += `<th style="width:${colWidth}px;" class="col-hdr-top">${colName}</th>`;
            }
            html += '</tr>';

            // Body Rows
            for (let r = 0; r < rows; r++) {
                html += `<tr><th class="row-hdr">${r + 1}</th>`;
                for (let c = 0; c < cols; c++) {
                    const a1 = coordToA1(r, c);

                    let rawValue = currentData[a1] || "";
                    let displayValue = rawValue;
                    let hasFormulaClass = false;

                    // Extract details from analytical engine if loaded
                    if (hfInstance) {
                        const cellValue = hfInstance.getCellValue({ sheetId: hfSheetId, row: r, col: c });
                        if (cellValue !== null && typeof cellValue === 'object' && cellValue.error) {
                            displayValue = cellValue.error;
                        } else if (cellValue !== null) {
                            if (typeof cellValue === 'number') {
                                // Smart layout formatting for decimals vs percent ratios
                                displayValue = (rawValue.includes('%') || String(rawValue).startsWith('=')) && (r === 11 || c === 4)
                                    ? (cellValue * 100).toFixed(1) + '%'
                                    : cellValue.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 3 });
                            } else {
                                displayValue = cellValue;
                            }
                        }
                        if (String(rawValue).startsWith('=')) {
                            hasFormulaClass = true;
                        }
                    }

                    const isSel = selectedCell && selectedCell.r === r && selectedCell.c === c ? "selected" : "";
                    const isFormulaStyle = hasFormulaClass ? "has-formula" : "";

                    // Smart horizontal text alignment heuristics
                    let alignClass = "align-left";
                    if (!isNaN(parseFloat(displayValue)) && isFinite(displayValue)) alignClass = "align-right";
                    if (r < 6 || displayValue === "CREST_301") alignClass = "align-center";

                    html += `<td id="cell_${r}_${c}"
                       class="${isSel} ${isFormulaStyle} ${alignClass}"
                       onclick="selectCell(${r}, ${c})"
                       ondblclick="makeCellEditable(${r}, ${c})">${displayValue}</td>`;
                }
                html += '</tr>';
            }
            html += '</table>';
            host.innerHTML = html;
        }

        function selectCell(r, c) {
            if (selectedCell) {
                const prev = document.getElementById(`cell_${selectedCell.r}_${selectedCell.c}`);
                if (prev) prev.classList.remove("selected");
            }

            selectedCell = { r, c };
            const curr = document.getElementById(`cell_${r}_${c}`);
            if (curr) curr.classList.add("selected");

            const a1 = coordToA1(r, c);
            document.getElementById("fbAddr").textContent = a1;

            const rawValue = currentData[a1] || "";
            const inp = document.getElementById("fbInput");
            inp.value = rawValue;
            inp.disabled = false;
        }

        function makeCellEditable(r, c) {
            selectCell(r, c);
            document.getElementById("fbInput").focus();
        }

        function handleFbKeydown(e) {
            if (e.key === "Enter") {
                commitFormulaBar();
                e.target.blur();
            } else if (e.key === "Escape") {
                if (selectedCell) {
                    const a1 = coordToA1(selectedCell.r, selectedCell.c);
                    e.target.value = currentData[a1] || "";
                }
                e.target.blur();
            }
        }

        async function commitFormulaBar() {
            if (!selectedCell) return;
            const { r, c } = selectedCell;
            const a1 = coordToA1(r, c);
            const inp = document.getElementById("fbInput");
            const newVal = inp.value.trim();

            if (newVal === "") {
                delete currentData[a1];
            } else {
                currentData[a1] = newVal;
            }

            // Refresh view internally and evaluate live calculations
            renderTable();

            // Keep changes local, push updates background to cloud
            try {
                await pushToFirebase(currentData, currentMeta);
            } catch (err) {
                console.warn("Auto-save sync deferred: ", err);
            }
        }

        // ============================================================
        // 4. FIREBASE SYNCHRONIZATION
        // ============================================================
        function setStatus(type, timestamp) {
            const lbl = document.getElementById("lblStatus");
            const time = document.getElementById("lblTime");
            if (type === 'excel') {
                lbl.textContent = "Live Excel";
                lbl.className = "status-badge status-excel";
            } else {
                lbl.textContent = "Cloud Cache";
                lbl.className = "status-badge status-cache";
            }
            if (timestamp) {
                time.textContent = "Synced: " + new Date(timestamp).toLocaleTimeString();
            }
        }

        async function pushToFirebase(data, meta) {
            const payload = { data, meta, updatedAt: Date.now() };
            await fetch(`${FIREBASE_URL}/${FIREBASE_NODE}.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        async function loadInitial() {
            initHyperFormulaEngine();
            try {
                const res = await fetch(`${FIREBASE_URL}/${FIREBASE_NODE}.json`, { cache: 'no-store' });
                const json = await res.json();
                if (json && json.data && json.meta) {
                    currentData = json.data;
                    currentMeta = json.meta;
                    setStatus('cache', json.updatedAt || Date.now());
                } else {
                    // Load embedded baseline fallback backup structural configuration matrix
                    currentData = Object.assign({}, BAKED_DATA);
                    setStatus('cache', Date.now());
                }
            } catch (e) {
                console.warn("Direct workspace isolated mode active:", e);
                currentData = Object.assign({}, BAKED_DATA);
                setStatus('cache', Date.now());
            }
            renderTable();
        }

        async function refreshData() {
            const btn = document.getElementById("btnRefresh");
            btn.disabled = true;
            btn.textContent = "⌛ Pulling...";

            try {
                if (isOfficeInitialized && typeof Excel !== 'undefined') {
                    await Excel.run(async (context) => {
                        const sheet = context.workbook.worksheets.getItem("CREST_301");
                        const range = sheet.getUsedRange();
                        range.load(["values", "formulas", "rowCount", "columnCount"]);
                        await context.sync();

                        const rows = Math.max(60, range.rowCount);
                        const cols = Math.max(20, range.columnCount);
                        const colWidth = 90;

                        let data = {};
                        for (let r = 0; r < range.rowCount; r++) {
                            for (let c = 0; c < range.columnCount; c++) {
                                const fv = range.formulas[r][c];
                                const vv = range.values[r][c];
                                const cellA1 = coordToA1(r, c);

                                if (fv && String(fv).startsWith('=')) {
                                    data[cellA1] = fv;
                                } else if (vv !== "" && vv !== null) {
                                    data[cellA1] = String(vv);
                                }
                            }
                        }
                        currentData = data;
                        currentMeta = { rows, cols, colWidth };
                    });
                    renderTable();
                    const lastUpdatedAt = Date.now();
                    setStatus('excel', lastUpdatedAt);
                    await pushToFirebase(currentData, currentMeta);
                } else {
                    const res = await fetch(`${FIREBASE_URL}/${FIREBASE_NODE}.json`, { cache: 'no-store' });
                    const json = await res.json();
                    if (json && json.data && json.meta) {
                        currentData = json.data;
                        currentMeta = json.meta;
                        renderTable();
                        setStatus('cache', json.updatedAt || Date.now());
                    } else {
                        alert('No current centralized snapshot discovered. Populating baseline dataset templates.');
                        currentData = Object.assign({}, BAKED_DATA);
                        renderTable();
                    }
                }
            } catch (e) {
                console.warn('Network sync sequence halted.', e);
                alert('Refresh notification: running internal cache fallback engine execution.');
            } finally {
                btn.disabled = false;
                btn.textContent = "↻ Refresh";
            }
        }

        // ============================================================
        // 5. RUNTIME INITIALIZATION
        // ============================================================
        if (typeof Office !== 'undefined' && Office && typeof Office.onReady === 'function') {
            Office.onReady((info) => {
                if (info && info.host === Office.HostType.Excel) {
                    isOfficeInitialized = true;
                }
                loadInitial();
            });
            setTimeout(() => { if (!selectedCell) loadInitial(); }, 600);
        } else {
            window.addEventListener('DOMContentLoaded', loadInitial);
        }
    </script>

</body>
</html>
